          type: object
          required: [graph, rationale, confidence, ai_generated]
          properties:
            graph: { type: object, additionalProperties: true }
            rationale: { type: string }
            confidence: { type: number, format: double }
            ai_generated: { type: boolean }
            model_id: { type: string }
        verify:
          type: object
          required: [compiled, compile_ms]
          properties:
            compiled: { type: boolean }
            graph_id: { type: string, format: uuid }
            compile_ms: { type: integer, format: int64 }
