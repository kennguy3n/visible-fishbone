        content:
          application/json:
            schema: { $ref: "#/components/schemas/TroubleshootKBEntryInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TroubleshootKBEntry" }
        "400": { $ref: "#/components/responses/Error" }

  /tenants/{tenant_id}/troubleshoot/kb/{id}:
    get:
      tags: [troubleshoot]
      operationId: getTroubleshootKBEntry
      summary: Get a knowledge base entry
      parameters:
        - $ref: "#/components/parameters/TenantPathID"
        - $ref: "#/components/parameters/ResourceID"
