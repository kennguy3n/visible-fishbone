              drift_type: { type: string, enum: [added, modified, removed] }
              details: { type: string }
        has_drift: { type: boolean }

    AISummarizeRequest:
      type: object
      properties:
        start: { type: string, format: date-time, description: "Start of the time range (RFC 3339). Defaults to 24h before end." }
        end: { type: string, format: date-time, description: "End of the time range (RFC 3339). Defaults to now." }
    AISummary:
      type: object
