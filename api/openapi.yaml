    BulkEnrollResponse:
      type: object
      properties:
        result: { $ref: "#/components/schemas/BulkResult" }
        tokens:
          type: array
          items:
            type: object
            properties:
              id: { type: string, format: uuid }
              token: { type: string, description: "One-time plaintext token (base64url)" }
              expires_at: { type: string, format: date-time }

    BulkRevokeRequest:
      type: object
      required: [device_ids]
      properties:
        device_ids:
          type: array
          items: { type: string, format: uuid }

    BulkResult:
      type: object
      properties:
        total: { type: integer }
        succeeded: { type: integer }
        failed: { type: integer }
        errors:
          type: array
          items: { type: string }

    # --- AI Suggestion Schemas ---

    AISuggestion:
      type: object
      required: [id, tenant_id, rule_id, category, suggestion_json, confidence, status, created_at]
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        rule_id: { type: string }
        category: { type: string, enum: [unused, shadowed, overly_permissive, deny_log] }
        suggestion_json: { type: object, additionalProperties: true }
        confidence: { type: number, format: double, minimum: 0, maximum: 1 }
        status: { type: string, enum: [pending, approved, rejected, applied, rolled_back] }
        created_at: { type: string, format: date-time }
        reviewed_at: { type: string, format: date-time }
        reviewer_id: { type: string, format: uuid }
        feedback: { type: string }

    AISuggestionPage:
      type: object
      required: [items, next_cursor]
      properties:
        items: { type: array, items: { $ref: "#/components/schemas/AISuggestion" } }
        next_cursor: { type: string }

    TighteningAnalyzeRequest:
      type: object
      required: [rules]
      properties:
        rules: { type: array, items: { type: object, additionalProperties: true } }
        hit_counts: { type: object, additionalProperties: { type: integer, format: int64 } }
        window_days: { type: integer, minimum: 1 }

    TighteningReport:
      type: object
      required: [tenant_id, recommendations, analysis_window_days, rules_analyzed, generated_at]
      properties:
        tenant_id: { type: string, format: uuid }
        recommendations:
          type: array
          items: { $ref: "#/components/schemas/TighteningRecommendation" }
        analysis_window_days: { type: integer }
        rules_analyzed: { type: integer }
        generated_at: { type: string, format: date-time }

    TighteningRecommendation:
      type: object
      required: [rule_id, category, suggested_change, confidence, reasoning]
      properties:
        rule_id: { type: string }
        category: { type: string, enum: [unused, shadowed, overly_permissive, deny_log] }
        suggested_change:
          type: object
          properties:
            action: { type: string }
            before_rule: { type: object, additionalProperties: true }
            after_rule: { type: object, additionalProperties: true }
            justification: { type: string }
        confidence: { type: number, format: double, minimum: 0, maximum: 1 }
        reasoning: { type: string }
    TroubleshootStartSessionRequest:
      type: object
      required: [issue]
      properties:
        issue: { type: string, description: "Operator's description of the issue." }
    TroubleshootSendMessageRequest:
      type: object
      required: [content]
      properties:
        content: { type: string }
    TroubleshootSessionMessage:
      type: object
      required: [role, content, timestamp, ai_generated]
      properties:
        role: { type: string, description: "operator or assistant." }
        content: { type: string }
        timestamp: { type: string, format: date-time }
        ai_generated: { type: boolean }
    TroubleshootDiagnosticResult:
      type: object
      required: [check_name, status, message, executed_at]
      properties:
        check_name: { type: string }
        status: { type: string, enum: [pass, warn, fail] }
        message: { type: string }
        details: { type: object, additionalProperties: true, nullable: true }
        executed_at: { type: string, format: date-time }
    TroubleshootSession:
      type: object
      required: [id, tenant_id, operator_id, issue, status, messages, diagnostic_results, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        operator_id: { type: string, format: uuid }
        issue: { type: string }
        status: { type: string, enum: [active, resolved, escalated] }
        messages:
          type: array
          items: { $ref: "#/components/schemas/TroubleshootSessionMessage" }
        diagnostic_results:
          type: array
          items: { $ref: "#/components/schemas/TroubleshootDiagnosticResult" }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    TroubleshootKBEntryInput:
      type: object
      required: [category, title, content]
      properties:
        category: { type: string, enum: [connectivity, policy, identity, performance, integration] }
        title: { type: string }
        content: { type: string }
        tags: { type: array, items: { type: string } }
    TroubleshootKBEntry:
      type: object
      required: [id, category, title, content, tags, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid, nullable: true }
        category: { type: string, enum: [connectivity, policy, identity, performance, integration] }
        title: { type: string }
        content: { type: string }
        tags: { type: array, items: { type: string } }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    IDPProviderType:
      type: string
      description: OIDC identity-provider family.
      enum: [google_workspace, microsoft365, zoho, okta, custom_oidc]
    IDPConfigRequest:
      type: object
      required: [provider_type, issuer_url, client_id]
      properties:
        provider_type: { $ref: "#/components/schemas/IDPProviderType" }
        issuer_url:
          type: string
          format: uri
          description: OIDC issuer URL; ID tokens must carry this as their `iss`.
        client_id:
          type: string
          description: OAuth client id; ID tokens must carry this in their `aud`.
        allowed_domains:
          type: array
          description: |
            Email / hosted-domain allow-list. Empty permits any domain
            the provider asserts.
          items: { type: string }
        group_claim_path:
          type: string
          description: Dotted path to the groups/roles claim in the ID token.
        enabled:
          type: boolean
          description: Defaults to true on create when omitted.
    IDPConfig:
      type: object
      required: [id, tenant_id, provider_type, issuer_url, client_id, allowed_domains, group_claim_path, enabled, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        provider_type: { $ref: "#/components/schemas/IDPProviderType" }
        issuer_url: { type: string, format: uri }
        client_id: { type: string }
        allowed_domains: { type: array, items: { type: string } }
        group_claim_path: { type: string }
        enabled: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    MobileTokenRequest:
      type: object
      required: [id_token, device_public_key]
      properties:
        id_token:
          type: string
          description: OIDC ID token obtained by the mobile agent's native sign-in.
        issuer:
          type: string
          format: uri
          description: |
            Optional issuer selector. When omitted the issuer is read
            from the (unverified) token's `iss` claim and matched
            against the tenant's enabled configs.
        device_public_key:
          type: string
          description: Base64 Ed25519 device public key the session is bound to.
    MobileRefreshRequest:
      type: object
      required: [refresh_token, issuer, device_public_key]
      properties:
        refresh_token:
          type: string
          description: IdP refresh token; exchanged for a fresh ID token and never persisted.
        issuer:
          type: string
          format: uri
          description: Issuer selecting which provider's token endpoint to call.
        device_public_key:
          type: string
          description: Base64 Ed25519 device public key the refreshed session is re-bound to.
    MobileIdentity:
      type: object
      required: [user_id, tenant_id, email, subject, provider, issuer]
      properties:
        user_id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        email: { type: string }
        subject:
          type: string
          description: OIDC `sub` claim — the stable user identifier the session is bound to.
        provider: { $ref: "#/components/schemas/IDPProviderType" }
        issuer: { type: string, format: uri }
        groups: { type: array, items: { type: string } }
    MobileBinding:
      type: object
      required: [device_public_key, user_subject]
      description: What the minted SNG session is cryptographically bound to.
      properties:
        device_public_key: { type: string }
        user_subject: { type: string }
    MobileSessionResponse:
      type: object
      required: [access_token, token_type, expires_in, expires_at, identity, binding]
      properties:
        access_token:
          type: string
          description: HS256 SNG session JWT accepted by the standard auth middleware.
        token_type: { type: string, enum: [Bearer] }
        expires_in: { type: integer, description: Session lifetime in seconds. }
        expires_at: { type: string, format: date-time }
        identity: { $ref: "#/components/schemas/MobileIdentity" }
        binding: { $ref: "#/components/schemas/MobileBinding" }
    PoP:
      type: object
      required: [id, region, provider, anycast_ip, dns_name, capacity_tier, enabled]
      properties:
        id: { type: string, format: uuid }
        region: { type: string, description: "Cloud region, e.g. us-east-1." }
        provider: { type: string, enum: [aws, gcp, azure] }
        anycast_ip: { type: string, description: "IPv4/IPv6 anycast address clients steer to." }
        dns_name: { type: string, description: "Steering hostname for this PoP." }
        capacity_tier: { type: string, enum: [small, medium, large] }
        enabled: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    PoPCreateRequest:
      type: object
      required: [region, provider, anycast_ip, dns_name, capacity_tier]
      properties:
        region: { type: string }
        provider: { type: string, enum: [aws, gcp, azure] }
        anycast_ip: { type: string }
        dns_name: { type: string }
        capacity_tier: { type: string, enum: [small, medium, large] }
        enabled:
          type: boolean
          description: Defaults to true on create when omitted; send false to stage a PoP.
    PoPHealthSnapshot:
      type: object
      required: [reported_at, cpu_pct, memory_pct, active_connections, bandwidth_mbps]
      properties:
        reported_at: { type: string, format: date-time }
        cpu_pct: { type: number, format: float }
        memory_pct: { type: number, format: float }
        active_connections: { type: integer }
        bandwidth_mbps: { type: number, format: float }
    PoPHealth:
      type: object
      required: [pop, healthy, overloaded]
      properties:
        pop: { $ref: "#/components/schemas/PoP" }
        healthy:
          type: boolean
          description: False when the latest beacon is older than the health TTL.
        overloaded:
          type: boolean
          description: True when the latest beacon is at or above the high-water mark.
        health: { $ref: "#/components/schemas/PoPHealthSnapshot" }
    PoPAssignmentRequest:
      type: object
      required: [pop_id]
      properties:
        pop_id: { type: string, format: uuid }
    PoPAssignment:
      type: object
      required: [tenant_id, pop_id, assigned_at, override]
      properties:
        tenant_id: { type: string, format: uuid }
        pop_id: { type: string, format: uuid }
        assigned_at: { type: string, format: date-time }
        override:
          type: boolean
          description: True for operator-pinned assignments the auto-rebalancer must not move.
    DEMTarget:
      type: object
      description: |
        An effective DEM probe target. Managed defaults carry
        `managed: true` and have no `id`/`tenant_id`; custom targets
        carry both and a tenant can override or disable a default by
        reusing its `target_key`.
      required: [target_key, name, probe_kind, address, enabled, interval_seconds, timeout_ms, managed]
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        target_key: { type: string }
        name: { type: string }
        probe_kind: { type: string, enum: [dns, tcp, http, https] }
        address: { type: string }
        port: { type: integer, minimum: 1, maximum: 65535 }
        enabled: { type: boolean }
        interval_seconds: { type: integer, minimum: 10, maximum: 3600 }
        timeout_ms: { type: integer, minimum: 100, maximum: 30000 }
        managed: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    DEMTargetRequest:
      type: object
      required: [target_key, name, probe_kind, address]
      properties:
        target_key: { type: string }
        name: { type: string }
        probe_kind: { type: string, enum: [dns, tcp, http, https] }
        address: { type: string }
        port: { type: integer, minimum: 1, maximum: 65535 }
        enabled:
          type: boolean
          description: Defaults to true when omitted; send false to disable a managed default by reusing its target_key.
        interval_seconds:
          type: integer
          minimum: 10
          maximum: 3600
          description: Probe cadence; defaults to 60 when omitted.
        timeout_ms:
          type: integer
          minimum: 100
          maximum: 30000
          description: Per-probe timeout; defaults to 5000 when omitted.
    DEMProbeResult:
      type: object
      description: |
        A single synthetic probe observation from the edge. Timings are
        milliseconds and populated only for the legs the probe ran.
        `error_detail` is accepted but never persisted (privacy);
        `observed_at_ms` is Unix epoch milliseconds.
      required: [target_key, target_name, probe_kind, success, observed_at_ms]
      properties:
        target_key: { type: string }
        target_name: { type: string }
        probe_kind: { type: string, enum: [dns, tcp, http, https] }
        success: { type: boolean }
        dns_ms: { type: number, format: double }
        tcp_ms: { type: number, format: double }
        tls_ms: { type: number, format: double }
        ttfb_ms: { type: number, format: double }
        total_ms: { type: number, format: double }
        http_status: { type: integer }
        error_kind: { type: string, enum: [timeout, dns, connect, tls, http, config, internal] }
        error_detail: { type: string }
        observed_at_ms: { type: integer, format: int64 }
    DEMProbeResultBatch:
      type: object
      required: [results]
      properties:
        results:
          type: array
          minItems: 1
          items: { $ref: "#/components/schemas/DEMProbeResult" }
    DEMExperienceScore:
      type: object
      description: |
        A rolling-window experience score (0–100, higher is better)
        composed from availability + latency for one target.
      required: [id, tenant_id, target_key, target_name, score, availability, sample_count, window_seconds, window_start, window_end, created_at]
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        target_key: { type: string }
        target_name: { type: string }
        score: { type: number, format: double }
        availability: { type: number, format: double }
        latency_p50_ms: { type: number, format: double }
        latency_p95_ms: { type: number, format: double }
        sample_count: { type: integer }
        window_seconds: { type: integer }
        window_start: { type: string, format: date-time }
        window_end: { type: string, format: date-time }
        created_at: { type: string, format: date-time }
    DEMIngestResult:
      type: object
      required: [accepted, scores]
      properties:
        accepted: { type: integer, description: Number of raw results stored. }
        scores:
          type: array
          items: { $ref: "#/components/schemas/DEMExperienceScore" }
