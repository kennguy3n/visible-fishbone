  /tenants/{tenant_id}/app-registry/overrides:
    parameters:
      - $ref: "#/components/parameters/TenantPathID"
    get:
      tags: [app-registry]
      operationId: listTenantAppRegistryOverrides
      summary: List tenant app-classification overrides
      responses:
        "200":
          description: overrides
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/AppRegistryOverride" }
                  next_cursor: { type: string }
    post:
      tags: [app-registry]
      operationId: createTenantAppRegistryOverride
      summary: Create a tenant override (promote / demote an app or custom domain)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AppRegistryOverrideRequest" }
      responses:
        "201":
          description: created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AppRegistryOverride" }
  /tenants/{tenant_id}/app-registry/overrides/{id}:
    parameters:
      - $ref: "#/components/parameters/TenantPathID"
      - $ref: "#/components/parameters/ResourceID"
    delete:
      tags: [app-registry]
      operationId: deleteTenantAppRegistryOverride
      summary: Remove a tenant override
      responses:
        "204": { description: removed }
  /tenants/{tenant_id}/app-registry/stats:
    parameters:
      - $ref: "#/components/parameters/TenantPathID"
    get:
      tags: [app-registry]
      operationId: getTenantAppRegistryStats
      summary: Per-class traffic distribution from telemetry
      description: |
        Returns the per-class event / byte distribution over a
        time window. The window's lower bound can be specified
        in one of two mutually-exclusive ways: `window_hours`
        (relative) or `since` (absolute RFC3339 timestamp).
        Passing both yields HTTP 400 `conflicting_window`. When
        neither is set, the window defaults to the trailing 7
        days.
      parameters:
        - name: window_hours
          in: query
          description: |
            Trailing window size in hours. Mutually exclusive
            with `since`.
          schema: { type: integer, minimum: 1 }
        - name: since
          in: query
          description: |
            Absolute lower bound (inclusive) for the window.
            Mutually exclusive with `window_hours`.
          schema: { type: string, format: date-time }
      responses:
        "200":
          description: per-class distribution
          content:
            application/json:
              schema:
                type: object
                properties:
                  since: { type: string, format: date-time }
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/TrafficClassStat" }
        "400":
          description: conflicting_window — both since and window_hours supplied
        "503":
          description: telemetry pipeline disabled
  /admin/audit-log:
    get:
      tags: [admin, audit]
      operationId: adminListGlobalAuditLog
      summary: List platform-scoped (tenant-less) audit entries
      description: >
        Returns append-only audit rows that have no owning tenant
        (tenant_id is null) — e.g. global app-registry catalog
        mutations and vendor-feed syncs. These are invisible to the
        tenant-scoped audit-log endpoint.


        Platform admin only: the caller must present a platform-scoped
        credential (no tenant_id claim) holding the
        `audit:read_platform` permission (or the platform wildcard).
        An MSP- or tenant-scoped grant does not satisfy it — a
        tenant-bound credential is rejected with 403.
      parameters:
        - in: query
          name: resource_type
          schema: { type: string }
        - in: query
          name: action
          schema: { type: string }
        - in: query
          name: actor_id
          schema: { type: string, format: uuid }
        - in: query
          name: from
          schema: { type: string, format: date-time }
        - in: query
          name: to
          schema: { type: string, format: date-time }
        - $ref: "#/components/parameters/After"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: page of platform-scoped audit entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/AuditEntry" }
                  next_cursor: { type: string }
        "401":
          description: missing or unauthenticated credential
        "403":
          description: >
            credential lacks the platform-scoped audit:read_platform
            grant, or is tenant-bound
  /admin/app-registry:
    get:
      tags: [admin, app-registry]
      operationId: adminListAppRegistry
      summary: List global app catalog entries
      responses:
        "200":
          description: catalog
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/AppRegistry" }
                  next_cursor: { type: string }
    post:
      tags: [admin, app-registry]
      operationId: adminCreateAppRegistry
      summary: Create a global app entry
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AppRegistryRequest" }
      responses:
        "201":
          description: created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AppRegistry" }
  /admin/app-registry/{id}:
    parameters:
      - $ref: "#/components/parameters/ResourceID"
    put:
      tags: [admin, app-registry]
      operationId: adminUpdateAppRegistry
      summary: Update a global app entry
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AppRegistryRequest" }
      responses:
        "200":
          description: updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AppRegistry" }
    delete:
      tags: [admin, app-registry]
      operationId: adminDeleteAppRegistry
      summary: Delete a global app entry
      responses:
        "204": { description: deleted }
  /admin/app-registry/sync:
    post:
      tags: [admin, app-registry]
      operationId: adminSyncAppRegistry
      summary: Trigger vendor-endpoint sync (Microsoft / Google / AWS / generic)
      responses:
        "200":
          description: sync results (one row per app with metadata_url)
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items: { $ref: "#/components/schemas/SyncResult" }
        "503":
          description: vendor sync not configured
  /tenants/{tenant_id}/baselines:
    parameters:
      - $ref: "#/components/parameters/TenantPathID"
    get:
      tags: [baseline]
      operationId: listBaselineModels
      summary: List baseline statistical models for the tenant
      description: |
        Returns one row per (dimension, window) currently
        modelled. Each row carries Welford + EWMA state plus
        the configured z-score threshold used by the anomaly
        detector.
      parameters:
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 200 }
        - name: cursor
          in: query
          schema: { type: string }
      responses:
        "200":
          description: page of baseline models
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/BaselineModel" }
                  next_cursor: { type: string }
  /tenants/{tenant_id}/baselines/{dimension}/{window_seconds}:
    parameters:
      - $ref: "#/components/parameters/TenantPathID"
      - name: dimension
        in: path
        required: true
        schema: { type: string }
      - name: window_seconds
        in: path
        required: true
        schema: { type: integer, minimum: 1 }
    get:
      tags: [baseline]
      operationId: getBaselineModel
      summary: Fetch a single baseline model
      responses:
        "200":
          description: baseline model
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BaselineModel" }
        "404":
          description: model not found
  /tenants/{tenant_id}/baselines/{dimension}/{window_seconds}/threshold:
    parameters:
      - $ref: "#/components/parameters/TenantPathID"
      - name: dimension
        in: path
        required: true
        schema: { type: string }
      - name: window_seconds
        in: path
        required: true
        schema: { type: integer, minimum: 1 }
    put:
      tags: [baseline]
      operationId: updateBaselineThreshold
      summary: Override the z-score threshold for this baseline
      description: |
        Threshold updates take effect on the next anomaly
        evaluation; the in-flight observation pipeline is not
        interrupted. The Feedback service may later re-tune
        this value from operator feedback.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [z_threshold]
              properties:
                z_threshold:
                  type: number
                  format: double
                  # OpenAPI 3.1.0 / JSON Schema 2020-12:
                  # exclusiveMinimum is the value above which
                  # the field is accepted. The handler in
                  # internal/handler/baseline.go rejects
                  # z_threshold <= 0 with HTTP 400, so the
                  # spec must encode strict-positivity, not
                  # just non-negativity (a `minimum: 0` would
                  # advertise zero as legal and contradict the
                  # implementation).
                  exclusiveMinimum: 0
      responses:
        "200":
          description: updated model
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BaselineModel" }
        "404":
          description: model not found
  /tenants/{tenant_id}/alerts:
    parameters:
      - $ref: "#/components/parameters/TenantPathID"
    get:
      tags: [alert]
      operationId: listAlerts
      summary: List alerts for the tenant
      parameters:
        - name: state
          in: query
          description: Filter by alert state (repeatable).
          style: form
          explode: true
          schema:
            type: array
            items: { type: string, enum: [open, acknowledged, resolved, suppressed] }
        - name: kind
          in: query
          description: Filter by alert kind (repeatable).
          style: form
          explode: true
          schema:
            type: array
            items: { type: string }
        - name: dimension
          in: query
          description: Filter by baseline dimension (repeatable).
          style: form
          explode: true
          schema:
            type: array
            items: { type: string }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 200 }
        - name: cursor
          in: query
          schema: { type: string }
      responses:
        "200":
          description: page of alerts
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/Alert" }
                  next_cursor: { type: string }
  /tenants/{tenant_id}/alerts/{alert_id}:
    parameters:
      - $ref: "#/components/parameters/TenantPathID"
      - name: alert_id
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [alert]
      operationId: getAlert
      summary: Fetch a single alert
      responses:
        "200":
          description: alert
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Alert" }
        "404":
          description: alert not found
  /tenants/{tenant_id}/alerts/{alert_id}/acknowledge:
    parameters:
      - $ref: "#/components/parameters/TenantPathID"
      - name: alert_id
        in: path
        required: true
        schema: { type: string, format: uuid }
    post:
      tags: [alert]
      operationId: acknowledgeAlert
      summary: Move an alert to the acknowledged state
      description: |
        The actor (acknowledged_by) is derived server-side from
        the authenticated principal (JWT `sub` claim or API-key
        owner). No request body is accepted — a client cannot
        override the actor in the audit trail.
      responses:
        "200":
          description: updated alert
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Alert" }
        "404":
          description: alert not found
        "409":
          description: alert is in a terminal state and cannot be acknowledged
  /tenants/{tenant_id}/alerts/{alert_id}/resolve:
    parameters:
      - $ref: "#/components/parameters/TenantPathID"
      - name: alert_id
        in: path
        required: true
        schema: { type: string, format: uuid }
    post:
      tags: [alert]
      operationId: resolveAlert
      summary: Move an alert to the resolved state
      description: |
        The actor (resolved_by) is derived server-side from
        the authenticated principal (JWT `sub` claim or
        API-key owner). No request body is accepted — a
        client cannot override the actor in the audit trail.
      responses:
        "200":
          description: updated alert
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Alert" }
        "404":
          description: alert not found
        "409":
          description: alert is in a terminal state and cannot be resolved
  /tenants/{tenant_id}/alert-suppressions:
    parameters:
      - $ref: "#/components/parameters/TenantPathID"
    get:
      tags: [alert]
      operationId: listAlertSuppressions
      summary: List active suppression rules for the tenant
      responses:
        "200":
          description: page of suppression rules
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/AlertSuppression" }
                  next_cursor: { type: string }
    post:
      tags: [alert]
      operationId: createAlertSuppression
      summary: Add a (Kind, Dimension) suppression rule
      description: |
        Creates a suppression rule that auto-routes matching future
        alerts into the terminal AlertStateSuppressed state at emit
        time. At least one of `kind` or `dimension` must be provided
        (the rule is the conjunction of the supplied matchers); both
        may be set for a tighter match. `reason` is required so the
        audit surface always carries a human-readable explanation
        for why a class of alerts is being filtered.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                kind:
                  type: string
                  description: "Alert kind to suppress, e.g. baseline_zscore_anomaly. Either `kind` or `dimension` must be set."
                dimension:
                  type: string
                  description: "Baseline dimension to suppress (e.g. flow_bytes_inbound). Either `kind` or `dimension` must be set."
                reason: { type: string, description: "Operator-visible audit note documenting why this rule exists." }
                expires_at:
                  type: string
                  format: date-time
                  description: "Optional auto-expiry; the rule stops applying once expires_at has passed (the row remains for audit)."
      responses:
        "201":
          description: rule created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AlertSuppression" }
        "400":
          description: "neither kind nor dimension provided, or reason missing"
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
  /tenants/{tenant_id}/alert-suppressions/{rule_id}:
    parameters:
      - $ref: "#/components/parameters/TenantPathID"
      - name: rule_id
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [alert]
      operationId: getAlertSuppression
      summary: Fetch a single suppression rule
      responses:
        "200":
          description: rule
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AlertSuppression" }
        "404":
          description: rule not found
    delete:
      tags: [alert]
      operationId: deleteAlertSuppression
      summary: Delete a suppression rule
      responses:
        "204":
          description: rule deleted
        "404":
          description: rule not found
  /tenants/{tenant_id}/alerts/{alert_id}/feedback:
    parameters:
      - $ref: "#/components/parameters/TenantPathID"
      - name: alert_id
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [alert]
      operationId: getAlertFeedback
      summary: Fetch operator feedback recorded for this alert
      responses:
        "200":
          description: feedback row
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AlertFeedback" }
        "404":
          description: no feedback recorded
    post:
      tags: [alert]
      operationId: submitAlertFeedback
      summary: Record operator feedback (true / false positive / noise)
      description: |
        Feedback is the input to the Feedback service's tuning
        loop. Submitting feedback may indirectly raise or lower
        the underlying baseline's z-score threshold the next
        time `Run` runs.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [decision]
              properties:
                decision:
                  type: string
                  enum: [true_positive, false_positive, noise]
                notes: { type: string, description: "Free-form operator note explaining the decision." }
      responses:
        "201":
          description: feedback recorded
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AlertFeedback" }
    delete:
      tags: [alert]
      operationId: deleteAlertFeedback
      summary: Remove operator feedback for this alert
      responses:
        "204":
          description: feedback deleted
        "404":
          description: no feedback recorded
  # Integration connectors (syslog / SIEM webhook / Jira /
  # ServiceNow) share the same Enqueue + DeliveryWorker lifecycle
  # as the legacy webhook endpoint. The REST surface is symmetric
  # with /webhooks on purpose so SDK consumers see one mental
  # model: webhooks are URL destinations, integrations are typed
  # destinations. The connector Secret is NEVER returned in JSON
  # responses; clients see a `secret_set` boolean and POST/PATCH
  # the secret out-of-band. Same invariant as webhook signing
  # secrets.
  /tenants/{tenant_id}/integrations:
    parameters: [ { $ref: "#/components/parameters/TenantPathID" } ]
    post:
      tags: [integration]
      operationId: createIntegrationConnector
      summary: Create an integration connector (syslog / SIEM / Jira / ServiceNow)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/IntegrationConnectorCreateRequest" }
      responses:
        "201":
          description: created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/IntegrationConnector" }
        "400":
          description: invalid connector kind or unsupported plugin
    get:
      tags: [integration]
      operationId: listIntegrationConnectors
      summary: List integration connectors (cursor paginated)
      parameters:
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 200 }
        - name: cursor
          in: query
          schema: { type: string }
      responses:
        "200":
          description: list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/IntegrationConnector" }
                  next_cursor: { type: string, nullable: true }
  /tenants/{tenant_id}/integrations/{id}:
    parameters:
      - $ref: "#/components/parameters/TenantPathID"
      - $ref: "#/components/parameters/ResourceID"
    get:
      tags: [integration]
      operationId: getIntegrationConnector
      summary: Fetch a single connector
      responses:
        "200":
          description: connector
          content:
            application/json:
              schema: { $ref: "#/components/schemas/IntegrationConnector" }
        "404": { description: not found }
    patch:
      tags: [integration]
      operationId: updateIntegrationConnector
      summary: Partial update — omit fields to leave them untouched
      description: |
        Every field is optional. Omitting `event_types` leaves the
        existing slice untouched (a `nil` slice means "no change",
        an empty `[]` means "match every event"). Blank
        `description` means "no change" — clearing the description
        currently requires delete + recreate.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/IntegrationConnectorUpdateRequest" }
      responses:
        "200":
          description: updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/IntegrationConnector" }
        "404": { description: not found }
    delete:
      tags: [integration]
      operationId: deleteIntegrationConnector
      summary: Remove the connector
      responses:
        "204": { description: removed }
        "404": { description: not found }
  /tenants/{tenant_id}/integrations/{id}/test:
    parameters:
      - $ref: "#/components/parameters/TenantPathID"
      - $ref: "#/components/parameters/ResourceID"
    post:
      tags: [integration]
      operationId: testIntegrationConnector
      summary: Synchronously probe the connector's destination
      description: |
        Invokes the plugin's `Test()` method against the
        configured destination. The updated row (including
        `last_test_at`, `last_test_result`, `last_test_error`) is
        returned even on probe failure so the operator portal can
        render the result in one round-trip. Probe failures
        surface as HTTP 502 with the connector body wrapped under
        an `error` object; non-probe failures (row not found, repo
        write failure) follow the standard repository→HTTP error
        map.
      responses:
        "200":
          description: probe succeeded
          content:
            application/json:
              schema: { $ref: "#/components/schemas/IntegrationConnector" }
        "502":
          description: probe failed but the result was recorded
          content:
            application/json:
              schema:
                type: object
                required: [connector, error]
                properties:
                  connector: { $ref: "#/components/schemas/IntegrationConnector" }
                  error:
                    type: object
                    required: [code, message]
                    properties:
                      code: { type: string, example: connector_test_failed }
                      message: { type: string }
        "404": { description: not found }
  /tenants/{tenant_id}/integrations/{id}/status:
    parameters:
      - $ref: "#/components/parameters/TenantPathID"
      - $ref: "#/components/parameters/ResourceID"
    post:
      tags: [integration]
      operationId: setIntegrationConnectorStatus
      summary: Enable or disable a connector
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status: { type: string, enum: [active, disabled] }
      responses:
        "200":
          description: updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/IntegrationConnector" }
        "400":
          description: status must be 'active' or 'disabled'
        "404": { description: not found }
  /tenants/{tenant_id}/integrations/{id}/deliveries:
    parameters:
      - $ref: "#/components/parameters/TenantPathID"
      - $ref: "#/components/parameters/ResourceID"
    get:
      tags: [integration]
      operationId: listIntegrationConnectorDeliveries
      summary: List delivery attempts for this connector
      parameters:
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 200 }
        - name: cursor
          in: query
          schema: { type: string }
      responses:
        "200":
          description: list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/IntegrationDelivery" }
                  next_cursor: { type: string, nullable: true }
  /tenants/{tenant_id}/integration-deliveries:
    parameters: [ { $ref: "#/components/parameters/TenantPathID" } ]
    get:
      tags: [integration]
      operationId: listIntegrationDeliveries
      summary: List delivery attempts across all connectors (tenant-wide)
      description: |
        Use `?connector_id=...` to scope to a single connector;
        without it the response is tenant-wide. Same cursor /
        limit semantics as the per-connector listing.
      parameters:
        - name: connector_id
          in: query
          schema: { type: string, format: uuid }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 200 }
        - name: cursor
          in: query
          schema: { type: string }
      responses:
        "200":
          description: list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/IntegrationDelivery" }
                  next_cursor: { type: string, nullable: true }
        "400":
          description: connector_id is not a valid UUID
  /tenants/{tenant_id}/integration-deliveries/{id}:
    parameters:
      - $ref: "#/components/parameters/TenantPathID"
      - $ref: "#/components/parameters/ResourceID"
    get:
      tags: [integration]
      operationId: getIntegrationDelivery
      summary: Fetch a single delivery row
      responses:
        "200":
          description: delivery
          content:
            application/json:
              schema: { $ref: "#/components/schemas/IntegrationDelivery" }
        "404": { description: not found }
  /msps:
    get:
      tags: [msps]
      operationId: listMSPs
      summary: List MSPs
      description: |
        Returns active and suspended MSPs by default. Soft-deleted
        rows (status='deleted', deleted_at != NULL) are excluded so
        the operator-facing listing matches the lifecycle invariant
        that `deleted` is terminal. Admin / audit callers wanting to
        see tombstoned rows pass `?include_deleted=true`.
      parameters:
        - $ref: "#/components/parameters/After"
        - $ref: "#/components/parameters/Limit"
        - name: include_deleted
          in: query
          required: false
          schema: { type: boolean, default: false }
          description: |
            When true, soft-deleted MSPs are included in the result
            set. Defaults to false. Only the canonical lower-case
            string "true" enables the flag; any other value
            (including absent) is treated as false.
      responses:
        "200":
          description: page of MSPs
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/MSP" }
                  next_cursor: { type: string }
    post:
      tags: [msps]
      operationId: createMSP
      summary: Create an MSP
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/MSPCreateRequest" }
      responses:
        "201":
          description: created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MSP" }
        "400": { $ref: "#/components/responses/Error" }
        "409": { $ref: "#/components/responses/Error" }
  /msps/{msp_id}:
    parameters: [ { $ref: "#/components/parameters/MSPPathID" } ]
    get:
      tags: [msps]
      operationId: getMSP
      summary: Get MSP by id
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MSP" }
        "404": { $ref: "#/components/responses/Error" }
    patch:
      tags: [msps]
      operationId: updateMSP
      summary: Update MSP (sparse PATCH)
      description: |
        Pointer-shaped patch semantics: omitting a field leaves
        the corresponding column untouched. Supplying an optional
        field as its zero value (e.g. `branding: {}`) clears it.

        Required fields (`name`, `slug`) cannot be cleared via
        PATCH. Posting `{"name": ""}` or `{"slug": ""}` returns
        400 `invalid_param` — omit the field to leave it unchanged.
        Round-11 of Devin Review on PR #42 caught the previous
        contract drift where this description told clients zero
        values would clear those fields, but the handler at
        `internal/handler/msp.go:436-444` rejects them to prevent
        row corruption (postgres would bind an empty string into
        the NOT NULL column; memory would silently no-op).

        `status` follows the same rule on PATCH — supplying `""`
        is treated as "no change" (the only legal transitions to
        `deleted` go through `DELETE /api/v1/msps/{msp_id}` or
        `POST /api/v1/msps/{msp_id}/status`, both of which stamp
        `deleted_at` alongside the status column).

        Same convention as `PATCH /tenants/{tenant_id}`.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/MSPPatchRequest" }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MSP" }
        "404": { $ref: "#/components/responses/Error" }
    delete:
      tags: [msps]
      operationId: deleteMSP
      summary: Soft-delete an MSP
      description: |
        Soft-delete: the row remains with `status=deleted`. The
        cascade removes every `msp_tenants` row for the MSP and
        clears the denormalised `tenants.msp_id` pointer on every
        owned tenant.
      responses:
        "204": { description: deleted }
        "403": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
  /msps/{msp_id}/status:
    parameters: [ { $ref: "#/components/parameters/MSPPathID" } ]
    post:
      tags: [msps]
      operationId: updateMSPStatus
      summary: Update MSP status
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status: { $ref: "#/components/schemas/MSPStatus" }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MSP" }
        "404": { $ref: "#/components/responses/Error" }
  /msps/{msp_id}/tenants:
    parameters: [ { $ref: "#/components/parameters/MSPPathID" } ]
    get:
      tags: [msps]
      operationId: listMSPTenants
      summary: List the tenant cohort under an MSP
      parameters:
        - $ref: "#/components/parameters/After"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: page of bindings
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/MSPTenantBinding" }
                  next_cursor: { type: string }
  /msps/{msp_id}/tenants/{tenant_id}:
    parameters:
      - $ref: "#/components/parameters/MSPPathID"
      - $ref: "#/components/parameters/TenantPathID"
    post:
      tags: [msps]
      operationId: assignMSPTenant
      summary: Bind a tenant to an MSP
      description: |
        Binds the (msp, tenant) pair with the given relationship.
        When `relationship=owner` (the default) the cascade also
        sets `tenants.msp_id = msp_id`, evicting any prior owner
        binding (the partial UNIQUE index in migration 015
        enforces at most one owner per tenant).
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/MSPAssignTenantRequest" }
      responses:
        "201":
          description: bound
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MSPTenantBinding" }
        "404": { $ref: "#/components/responses/Error" }
    delete:
      tags: [msps]
      operationId: unassignMSPTenant
      summary: Unbind a tenant from an MSP
      description: |
        If the binding was the owner, the cascade also clears
        `tenants.msp_id`. Non-owner bindings only remove the
        join row.
      responses:
        "204": { description: unbound }
        "404": { $ref: "#/components/responses/Error" }
  /msps/{msp_id}/bulk/policy-templates:
    parameters: [ { $ref: "#/components/parameters/MSPPathID" } ]
    post:
      tags: [msps]
      operationId: bulkApplyPolicyTemplate
      summary: Apply a policy graph to every authorized tenant under the MSP
      description: |
        Fans the supplied policy graph across the per-user
        authorized tenant subset. Concurrency is bounded by
        `DefaultBulkConcurrency` (16). Partial failures NEVER
        abort the run — every per-tenant outcome surfaces in
        the response body.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [template]
              properties:
                template:
                  type: object
                  additionalProperties: true
                  description: same shape `PUT /tenants/{tenant_id}/policies/graph` accepts
      responses:
        "202": { $ref: "#/components/responses/BulkResult" }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
  /msps/{msp_id}/bulk/sites:
    parameters: [ { $ref: "#/components/parameters/MSPPathID" } ]
    post:
      tags: [msps]
      operationId: bulkProvisionSites
      summary: Provision one site per authorized tenant under the MSP
      description: |
        The template is applied verbatim to every tenant. Slug
        collisions surface as per-tenant errors and do not abort
        the run.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                template: { type: string, enum: [branch, hub, cloud_only, home_office] }
                config:
                  type: object
                  additionalProperties: true
      responses:
        "202": { $ref: "#/components/responses/BulkResult" }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
  /msps/{msp_id}/bulk/claim-tokens:
    parameters: [ { $ref: "#/components/parameters/MSPPathID" } ]
    post:
      tags: [msps]
      operationId: bulkGenerateClaimTokens
      summary: Issue claim tokens for every authorized tenant under the MSP
      description: |
        Plaintext claim tokens are returned ONCE in the
        response body. They are NEVER persisted in plaintext
        anywhere else; operators must capture them at request
        time. Partial failures (e.g. issued 3 of 5 before a
        repo error) surface with the tokens-issued-so-far in
        the per-tenant outcome.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [count]
              properties:
                count: { type: integer, minimum: 1 }
                ttl_seconds:
                  type: integer
                  minimum: 0
                  description: |
                    Lifetime of each issued claim token, in
                    seconds. Omit the field or pass 0 to use the
                    platform-configured DefaultTokenTTL (set via
                    the server's claim-token TTL config). Operator
                    UIs typically rely on the fallback so the
                    platform setting remains the single source of
                    truth.
      responses:
        "202": { $ref: "#/components/responses/BulkResult" }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
  /tenants/{tenant_id}/branding:
    parameters: [ { $ref: "#/components/parameters/TenantPathID" } ]
    get:
      tags: [msps]
      operationId: getTenantBranding
      summary: Resolve the effective branding for a tenant
      description: |
        Walks the branding resolution chain tenant override >
        MSP default > platform default. Every response field is
        populated; the resolver guarantees a fully-resolved
        MSPBranding.
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MSPBranding" }
        "404": { $ref: "#/components/responses/Error" }
    put:
      tags: [msps]
      operationId: setTenantBranding
      summary: Write the per-tenant branding override
      description: |
        Per-field overlay: a tenant override that only sets
        `primary_color` inherits LogoURL etc from the MSP (or
        platform) default. The response body is the freshly
        resolved view (post-merge), so the client doesn't need
        a second roundtrip.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/MSPBranding" }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MSPBranding" }
        "404": { $ref: "#/components/responses/Error" }
    delete:
      tags: [msps]
      operationId: clearTenantBranding
      summary: Remove the per-tenant branding override
      description: |
        Restores full inheritance from the MSP (or platform)
        default. Unrelated keys in `tenants.settings` are
        preserved.
      responses:
        "204": { description: cleared }
        "404": { $ref: "#/components/responses/Error" }

