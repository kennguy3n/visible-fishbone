        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TroubleshootKBEntryInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TroubleshootKBEntry" }
        "404": { $ref: "#/components/responses/Error" }
