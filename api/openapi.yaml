      tags: [troubleshoot]
      operationId: deleteTroubleshootKBEntry
      summary: Delete a knowledge base entry
      parameters:
        - $ref: "#/components/parameters/TenantPathID"
        - $ref: "#/components/parameters/ResourceID"
      responses:
        "204": { description: deleted }
        "404": { $ref: "#/components/responses/Error" }

  /tenants/{tenant_id}/idp-configs:
    parameters: [ { $ref: "#/components/parameters/TenantPathID" } ]
    post:
      tags: [mobile-auth]
      operationId: createIdpConfig
      summary: Register an OIDC identity-provider config for a tenant
      description: |
        Register a per-tenant OIDC provider (Google Workspace,
        Microsoft 365, Zoho, Okta, or a custom OIDC issuer) that
        mobile agents may federate against. Only validation material
        (issuer, client_id, allowed domains, group-claim path) is
        stored; OIDC tokens are never persisted. Subject to the
        per-tenant provider cap.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/IDPConfigRequest" }
      responses:
        "201":
          description: created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/IDPConfig" }
        "400": { $ref: "#/components/responses/Error" }
        "409": { $ref: "#/components/responses/Error" }
        "429":
          description: |
            tenant has reached the per-tenant IdP-config cap; the
            response body carries `error.code = "resource_exhausted"`.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    get:
      tags: [mobile-auth]
      operationId: listIdpConfigs
      summary: List a tenant's OIDC provider configs
      description: |
        List every OIDC provider config registered for the tenant,
        newest first.
      responses:
        "200":
          description: list (newest first)
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/IDPConfig" }
  /tenants/{tenant_id}/idp-configs/{id}:
    parameters:
      - $ref: "#/components/parameters/TenantPathID"
      - $ref: "#/components/parameters/ResourceID"
    get:
      tags: [mobile-auth]
      operationId: getIdpConfig
      summary: Get an OIDC provider config by id
      description: |
        Fetch a single OIDC provider config by its id within the
        tenant.
      responses:
        "200":
          description: config
          content:
            application/json:
              schema: { $ref: "#/components/schemas/IDPConfig" }
        "404": { $ref: "#/components/responses/Error" }
    put:
      tags: [mobile-auth]
      operationId: updateIdpConfig
      summary: Replace an OIDC provider config
      description: |
        Replace an existing OIDC provider config in place. The full
        representation is supplied; toggle `enabled` to disable a
        provider without deleting it.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/IDPConfigRequest" }
      responses:
        "200":
          description: updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/IDPConfig" }
        "400": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
        "409": { $ref: "#/components/responses/Error" }
    delete:
      tags: [mobile-auth]
      operationId: deleteIdpConfig
      summary: Delete an OIDC provider config
      description: |
        Permanently remove an OIDC provider config. Mobile agents can
        no longer federate against the issuer once deleted.
      responses:
        "204": { description: removed }
        "404": { $ref: "#/components/responses/Error" }
  /tenants/{tenant_id}/auth/mobile/token:
    parameters: [ { $ref: "#/components/parameters/TenantPathID" } ]
    post:
      tags: [mobile-auth]
      operationId: mobileTokenExchange
      summary: Exchange a validated OIDC ID token for an SNG session
      description: |
        Public endpoint. A mobile agent that has completed native
        OIDC sign-in presents its ID token plus the enrolled
        device's Ed25519 public key. The control plane validates the
        token against the tenant's matching IdP config (signature via
        JWKS, iss/aud/exp/email claims, domain allow-list), maps it to
        an SNG user (auto-provisioning when enabled), and mints an SNG
        access token bound to BOTH the device key and the OIDC subject.
        OIDC tokens are never persisted.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/MobileTokenRequest" }
      responses:
        "200":
          description: minted SNG session
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MobileSessionResponse" }
        "400": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
  /tenants/{tenant_id}/auth/mobile/refresh:
    parameters: [ { $ref: "#/components/parameters/TenantPathID" } ]
    post:
      tags: [mobile-auth]
      operationId: mobileTokenRefresh
      summary: Refresh an SNG session using an IdP refresh token
      description: |
        Public endpoint. Exchanges the IdP refresh token at the
        provider's token endpoint for a fresh ID token, re-validates
        it, and mints a new SNG session re-bound to the same device.
        The refresh token is never persisted server-side.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/MobileRefreshRequest" }
      responses:
        "200":
          description: minted SNG session
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MobileSessionResponse" }
        "400": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
  /tenants/{tenant_id}/devices/mobile/enroll:
    parameters: [ { $ref: "#/components/parameters/TenantPathID" } ]
    post:
      tags: [mobile-devices]
      operationId: enrollMobileDevice
      summary: Self-enrol the calling mobile device
      description: |
        Authenticated by the device-bound mobile session JWT minted by
        `/auth/mobile/token` (token_type=mobile). The device key is
        taken from the session token's `device_key` claim — NOT the
        request body — so a session can only ever enrol the device it
        is bound to. A non-mobile credential (operator console / API
        key) is rejected with 403.

        Idempotent on (tenant_id, device_key): the first call creates an
        active ios/android device (201); re-enrolling the same key
        re-activates the existing device and returns it (200). A
        body-supplied `device_public_key`, when present, must equal the
        session's `device_key`. Re-enrolling a key under a different
        platform is rejected (400) — a device key is bound to one
        physical device.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/MobileEnrollRequest" }
      responses:
        "200":
          description: idempotent re-enrolment of an existing device
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MobileEnrollResponse" }
        "201":
          description: device created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MobileEnrollResponse" }
        "400": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
  /tenants/{tenant_id}/devices/mobile/posture:
    parameters: [ { $ref: "#/components/parameters/TenantPathID" } ]
    post:
      tags: [mobile-devices]
      operationId: reportMobilePosture
      summary: Report a posture snapshot for the calling mobile device
      description: |
        Authenticated by the mobile session JWT. The device is resolved
        from the session token's `device_key`, so a device may only ever
        update its OWN posture (there is no path id to address another
        device); a non-mobile credential is rejected with 403, and a
        device key that has not been enrolled yet yields 404.

        Posture is validated for platform/signal coherence — `jailbroken`
        is iOS-only and `root_detected` is Android-only; a wrong-platform
        signal is rejected (400). `collected_at` must fall within a sane
        window (not far-future, not stale); when omitted it is stamped
        with the server clock.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/MobilePostureReport" }
      responses:
        "200": { $ref: "#/components/responses/Device" }
        "400": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }

  /pops:
    get:
      tags: [pops]
      operationId: listPoPs
      summary: List available PoPs (public bootstrap)
      description: |
        Public, unauthenticated. Returns the enabled PoP fleet so a
        not-yet-enrolled client can resolve the DNS steering hostname
        and connect to its nearest PoP. Served from the in-memory
        registry, so there is no per-request DB hit on this hot path.
      security: []
      responses:
        "200":
          description: enabled PoP fleet
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/PoP" }
    post:
      tags: [pops]
      operationId: registerPoP
      summary: Register a new PoP (platform admin)
      description: |
        Platform-scoped (`pops:write`). A PoP is global
        infrastructure, so a tenant- or MSP-scoped grant does NOT
        satisfy the gate — only a platform-scoped grant (or the
        platform_admin wildcard) does.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PoPCreateRequest" }
      responses:
        "201": { $ref: "#/components/responses/PoP" }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
        "409": { $ref: "#/components/responses/Error" }
  /pops/{pop_id}/health:
    parameters: [ { $ref: "#/components/parameters/PoPPathID" } ]
    get:
      tags: [pops]
      operationId: getPoPHealth
      summary: Get a PoP's health (platform admin)
      description: |
        Platform-scoped (`pops:read`). Returns the PoP plus its
        latest health beacon and derived `healthy` / `overloaded`
        flags. `healthy` is false when the most recent beacon is
        older than the health TTL (the PoP is presumed dead); the
        `health` object is omitted entirely when no beacon has ever
        been seen.
      responses:
        "200": { $ref: "#/components/responses/PoPHealth" }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
  /tenants/{tenant_id}/pop-assignment:
    parameters: [ { $ref: "#/components/parameters/TenantPathID" } ]
    post:
      tags: [pops]
      operationId: setPoPAssignment
      summary: Pin a tenant to a specific PoP (operator override)
      description: |
        Tenant-scoped: the path `tenant_id` must match the caller's
        tenant (platform_admin may address any tenant). Pins the
        tenant to the named PoP and marks the assignment as an
        operator override so the auto-rebalancer never moves it. The
        target PoP must exist and be enabled.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PoPAssignmentRequest" }
      responses:
        "200": { $ref: "#/components/responses/PoPAssignment" }
        "400": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }

  /policy-templates:
    get:
      tags: [policy-templates]
      operationId: listPolicyTemplates
      summary: List the smart-default security baseline catalog
      description: |
        Returns the immutable, code-defined template catalog: one
        universal baseline, one per supported industry, and one per
        supported compliance regime. Global (not tenant-scoped);
        authenticated. An SME browses these, then previews/applies a
        selection.
      responses:
        "200":
          description: The full template catalog.
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/PolicyTemplate" }
  /policy-templates/{id}:
    parameters:
      - name: id
        in: path
        required: true
        description: "Template id, e.g. `baseline/global`, `industry/finance`, `compliance/eu-gdpr`."
        schema: { type: string }
    get:
      tags: [policy-templates]
      operationId: getPolicyTemplate
      summary: Get a single catalog template by id
      responses:
        "200":
          description: The catalog template.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PolicyTemplate" }
        "400": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
  /tenants/{tenant_id}/policy-templates/preview:
    parameters: [ { $ref: "#/components/parameters/TenantPathID" } ]
    post:
      tags: [policy-templates]
      operationId: previewPolicyTemplate
      summary: Preview the rendered Policy-Graph intent for a selection
      description: |
        Renders (without persisting) the composed deny-by-default
        Policy-Graph for an industry + country selection. A dry-run
        used by the setup wizard before apply.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PolicyTemplateSelection" }
      responses:
        "200":
          description: The rendered baseline preview.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PolicyTemplatePreview" }
        "400": { $ref: "#/components/responses/Error" }
  /tenants/{tenant_id}/policy-templates/apply:
    parameters: [ { $ref: "#/components/parameters/TenantPathID" } ]
    post:
      tags: [policy-templates]
      operationId: applyPolicyTemplate
      summary: Apply a baseline to the tenant (idempotent)
      description: |
        Renders the baseline for the selection and idempotently
        persists it as the tenant's active baseline. Re-applying the
        same selection is a no-op that returns the stored row;
        changing the selection re-renders and replaces it in place.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PolicyTemplateSelection" }
      responses:
        "200":
          description: The tenant's applied baseline.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AppliedPolicyTemplate" }
        "400": { $ref: "#/components/responses/Error" }
  /tenants/{tenant_id}/policy-templates/applied:
    parameters: [ { $ref: "#/components/parameters/TenantPathID" } ]
    get:
      tags: [policy-templates]
      operationId: getAppliedPolicyTemplate
      summary: Get the tenant's current applied baseline
      responses:
        "200":
          description: The tenant's applied baseline.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AppliedPolicyTemplate" }
        "404": { $ref: "#/components/responses/Error" }
  /tenants/{tenant_id}/dem/targets:
    parameters:
      - $ref: "#/components/parameters/TenantPathID"
    get:
      tags: [dem]
      operationId: listDEMTargets
      summary: List the tenant's effective DEM probe targets
      description: |
        The effective set is the managed default catalog overlaid with
        the tenant's custom targets (an enabled custom row overrides or
        adds by `target_key`; a disabled row removes a default). This is
        what an edge agent should probe. Managed defaults carry
        `managed: true` and have no `id`.
      responses:
        "200":
          description: effective target list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/DEMTarget" }
    post:
      tags: [dem]
      operationId: createDEMTarget
      summary: Create a custom DEM probe target
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DEMTargetRequest" }
      responses:
        "201":
          description: created target
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DEMTarget" }
        "400": { $ref: "#/components/responses/Error" }
        "409": { $ref: "#/components/responses/Error" }
  /tenants/{tenant_id}/dem/targets/{target_id}:
    parameters:
      - $ref: "#/components/parameters/TenantPathID"
      - name: target_id
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [dem]
      operationId: getDEMTarget
      summary: Fetch a single custom DEM target
      responses:
        "200":
          description: target
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DEMTarget" }
        "404": { $ref: "#/components/responses/Error" }
    put:
      tags: [dem]
      operationId: updateDEMTarget
      summary: Update a custom DEM target
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DEMTargetRequest" }
      responses:
        "200":
          description: updated target
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DEMTarget" }
        "400": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
    delete:
      tags: [dem]
      operationId: deleteDEMTarget
      summary: Delete a custom DEM target
      responses:
        "204": { description: deleted }
        "404": { $ref: "#/components/responses/Error" }
  /tenants/{tenant_id}/dem/results:
    parameters:
      - $ref: "#/components/parameters/TenantPathID"
    post:
      tags: [dem]
      operationId: ingestDEMResults
      summary: Ingest a batch of edge probe results
      description: |
        Edge/agent uploads a batch of synthetic probe results. The
        service stores the raw results durably and synchronously
        recomputes the rolling experience score for each distinct
        target in the batch, returning the freshly computed scores.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DEMProbeResultBatch" }
      responses:
        "202":
          description: results accepted, scores recomputed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DEMIngestResult" }
        "400": { $ref: "#/components/responses/Error" }
        "429": { $ref: "#/components/responses/Error" }
  /tenants/{tenant_id}/dem/scores:
    parameters:
      - $ref: "#/components/parameters/TenantPathID"
    get:
      tags: [dem]
      operationId: listLatestDEMScores
      summary: Latest experience score per target
      responses:
        "200":
          description: latest score per target
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/DEMExperienceScore" }
  /tenants/{tenant_id}/dem/scores/timeseries:
    parameters:
      - $ref: "#/components/parameters/TenantPathID"
    get:
      tags: [dem]
      operationId: listDEMScoreTimeseries
      summary: Experience score timeseries
      parameters:
        - name: target_key
          in: query
          description: Filter by target key (repeatable).
          style: form
          explode: true
          schema:
            type: array
            items: { type: string }
        - name: since
          in: query
          description: Only scores with created_at at/after this RFC3339 time.
          schema: { type: string, format: date-time }
        - name: until
          in: query
          description: Only scores with created_at at/before this RFC3339 time.
          schema: { type: string, format: date-time }
        - name: order
          in: query
          description: Sort order by created_at; defaults to desc.
          schema: { type: string, enum: [asc, desc] }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 200 }
        - name: cursor
          in: query
          schema: { type: string }
      responses:
        "200":
          description: page of score samples
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/DEMExperienceScore" }
                  next_cursor: { type: string }
  /tenants/{tenant_id}/dem/alerts:
    parameters:
      - $ref: "#/components/parameters/TenantPathID"
    get:
      tags: [dem]
      operationId: listDEMAlerts
      summary: List DEM degradation alerts for the tenant
      parameters:
        - name: state
          in: query
          description: Filter by alert state (repeatable).
          style: form
          explode: true
          schema:
            type: array
            items: { type: string, enum: [open, acknowledged, resolved, suppressed] }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 200 }
        - name: cursor
          in: query
          schema: { type: string }
      responses:
        "200":
          description: page of DEM alerts
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/Alert" }
                  next_cursor: { type: string }
  /tenants/{tenant_id}/compliance-auto/posture:
    parameters: [ { $ref: "#/components/parameters/TenantPathID" } ]
    get:
      tags: [compliance-auto]
      operationId: getComplianceAutoPosture
      summary: View continuous compliance posture
      description: |
        Returns the tenant's latest evaluated posture across all mapped
        frameworks (or a single framework when `framework` is supplied):
        per-control pass / fail / not-applicable with the evidence
        reference that backs each verdict.
      parameters:
        - name: framework
          in: query
          required: false
          schema: { type: string, enum: [SOC2, ISO_27001] }
          description: Restrict the posture to a single framework.
      responses:
        "200":
          description: The tenant's current compliance posture.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ComplianceAutoPosture" }
        "400": { $ref: "#/components/responses/Error" }
  /tenants/{tenant_id}/compliance-auto/collect:
    parameters: [ { $ref: "#/components/parameters/TenantPathID" } ]
    post:
      tags: [compliance-auto]
      operationId: collectComplianceAutoEvidence
      summary: Trigger an on-demand evidence collection
      description: |
        Runs an immediate evaluation sweep for the tenant — the same
        work the scheduled background loop performs fleet-wide — and
        returns the freshly computed posture. Read-only against platform
        state; persists the resulting control status and evidence.
      responses:
        "201":
          description: The freshly evaluated compliance posture.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ComplianceAutoPosture" }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
        "500": { $ref: "#/components/responses/Error" }
  /tenants/{tenant_id}/compliance-auto/evidence-pack:
    parameters: [ { $ref: "#/components/parameters/TenantPathID" } ]
    get:
      tags: [compliance-auto]
      operationId: exportComplianceAutoEvidencePack
      summary: Export a framework-mapped evidence pack
      description: |
        Builds an on-demand, framework-mapped evidence pack from the
        tenant's stored posture, as JSON (default) or CSV. Every control
        row carries its verdict, evidence summary, source subsystem,
        observation time, and structured evidence detail.
      parameters:
        - name: framework
          in: query
          required: true
          schema: { type: string, enum: [SOC2, ISO_27001] }
          description: The framework to export.
        - name: format
          in: query
          required: false
          schema: { type: string, enum: [json, csv], default: json }
          description: The export encoding.
      responses:
        "200":
          description: The evidence pack.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ComplianceAutoEvidencePack" }
            text/csv:
              schema: { type: string }
        "400": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
  /tenants/{tenant_id}/appid/catalog/current:
    parameters: [ { $ref: "#/components/parameters/TenantPathID" } ]
    get:
      tags: [appid]
      operationId: getTenantAppIDCatalogCurrent
      summary: Current App-ID catalog version metadata
      description: |
        Returns metadata for the current (highest-serial) published
        App-ID catalog version — serial, app count, schema version,
        and the SHA-256 checksum of the signed payload — so an edge
        can decide whether its cached bundle is stale without
        downloading the full bundle. The catalog is fleet-wide; the
        route is bound to the authenticated tenant only to keep the
        pull path on the same isolation rails as other tenant APIs.
      responses:
        "200":
          description: current catalog version metadata
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AppIDCatalogVersion" }
        "503":
          description: |
            catalog_unavailable — the catalog has not been published
            yet (transient boot condition); a `Retry-After` header is
            set and the edge should keep its last-good bundle and retry
  /tenants/{tenant_id}/appid/catalog/bundle:
    parameters: [ { $ref: "#/components/parameters/TenantPathID" } ]
    get:
      tags: [appid]
      operationId: getTenantAppIDCatalogBundle
      summary: Current signed App-ID catalog bundle
      description: |
        Returns the current version metadata together with the
        Ed25519-signed catalog bundle the edge verifies against the
        pinned public key and loads into the data-plane matcher. The
        signed payload is itself a self-contained catalog document, so
        an edge can verify and load it without any further calls.
      responses:
        "200":
          description: current version metadata + signed bundle envelope
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AppIDCatalogBundle" }
        "503":
          description: |
            catalog_unavailable — the catalog has not been published
            yet (transient boot condition); a `Retry-After` header is
            set and the edge should keep its last-good bundle and retry
  /admin/appid/catalog/versions:
    get:
      tags: [admin, appid]
      operationId: adminListAppIDCatalogVersions
      summary: List App-ID catalog version history
      description: |
        Returns published catalog versions newest-first. Platform
        admin only: the caller must present a platform-scoped
        credential holding `appid:read` (or the platform wildcard); an
        MSP- or tenant-scoped grant is rejected with 403.
      parameters:
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: page of catalog version metadata, newest-first
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AppIDCatalogVersions" }
        "401":
          description: missing or unauthenticated credential
        "403":
          description: credential lacks the platform-scoped appid:read grant
    post:
      tags: [admin, appid]
      operationId: adminPublishAppIDCatalog
      summary: Publish (re-sign) the App-ID catalog as a new version
      description: |
        Signs and stores the current catalog content as a new
        monotonic version (operator-triggered redistribution or key
        rotation). The body is optional; an `{"note": "..."}` annotates
        the version. Platform admin only: the caller must hold
        `appid:publish` (or the platform wildcard); an MSP- or
        tenant-scoped grant is rejected with 403.
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AppIDPublishRequest" }
      responses:
        "201":
          description: the newly published catalog version metadata
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AppIDCatalogVersion" }
        "401":
          description: missing or unauthenticated credential
        "403":
          description: credential lacks the platform-scoped appid:publish grant

  /tenants/{tenant_id}/threat-content/posture:
    parameters: [ { $ref: "#/components/parameters/TenantPathID" } ]
    get:
      tags: [threat-content]
      operationId: getManagedThreatContentPosture
      summary: Get the managed threat-content posture for a tenant
      description: >-
        Returns the managed (curated) threat content the tenant
        receives. The content is fleet-wide — identical for every
        tenant by design (the no-ops managed model) — so the route is
        tenant-scoped only for access control, not because the content
        differs per tenant. Read from the persisted bundle + ingest
        state, so it is correct on every replica (ingestion runs only
        on the elected leader).
      responses:
        "200":
          description: managed threat-content posture
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ManagedThreatContentPosture" }
        "403": { $ref: "#/components/responses/Error" }

  /threat-content/refresh:
    post:
      tags: [threat-content]
      operationId: refreshManagedThreatContent
      summary: Trigger a managed threat-content ingestion cycle
      description: >-
        System-scoped manual refresh of the managed threat-content
        bundle. It produces fleet-wide content, so it requires the
        platform-level `threatcontent:write` permission. Returns 409
        when the kill switch (MANAGED_THREAT_CONTENT_ENABLED) is off.
        Ingestion is idempotent and bounded; when the assembled content
        is identical to the current bundle no new version is minted
        (`unchanged: true`).
      responses:
        "200":
          description: refresh result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ManagedThreatContentRefreshResult" }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
        "409": { $ref: "#/components/responses/Error" }
        "500": { $ref: "#/components/responses/Error" }

components:
  securitySchemes:
    BearerJWT:
      type: http
      scheme: bearer
      bearerFormat: JWT
    APIKey:
      type: apiKey
      in: header
      name: X-SNG-API-Key
  parameters:
    # All tenant-scoped routes use `{tenant_id}` uniformly so the
    # Go router's RequireTenant middleware (which keys off the
    # literal path-segment name `tenant_id`) can be applied with a
    # single MountTenantScoped wrapper. Generated SDKs end up with
    # a consistent `tenant_id` parameter name on every tenant
    # method, including the top-level `/tenants/{tenant_id}` CRUD
    # routes — a previous revision used `{id}` here, which
    # produced confusingly-named `id` parameters on a handful of
    # methods.
    TenantPathID:
      in: path
      name: tenant_id
      required: true
      schema: { type: string, format: uuid }
    ResourceID:
      in: path
      name: id
      required: true
      schema: { type: string, format: uuid }
    MSPPathID:
      in: path
      name: msp_id
      required: true
      schema: { type: string, format: uuid }
    PoPPathID:
      in: path
      name: pop_id
      required: true
      schema: { type: string, format: uuid }
    After:
      in: query
      name: after
      schema: { type: string }
    Limit:
      in: query
      name: limit
      schema: { type: integer, minimum: 1, maximum: 200 }
  responses:
    Tenant:
      description: tenant
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Tenant" }
    Site:
      description: site
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Site" }
    Device:
      description: device
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Device" }
    BulkResult:
      description: per-tenant bulk operation result
      content:
        application/json:
          schema: { $ref: "#/components/schemas/MSPBulkResult" }
    Error:
      description: error
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    PoP:
      description: pop
      content:
        application/json:
          schema: { $ref: "#/components/schemas/PoP" }
    PoPHealth:
      description: pop health view
      content:
        application/json:
          schema: { $ref: "#/components/schemas/PoPHealth" }
    PoPAssignment:
      description: tenant-to-pop assignment
      content:
        application/json:
          schema: { $ref: "#/components/schemas/PoPAssignment" }
    TenantMigration:
      description: cross-region tenant migration record
      content:
        application/json:
          schema: { $ref: "#/components/schemas/TenantMigration" }
  schemas:
    ManagedThreatContentPosture:
      type: object
      description: >-
        Read-only managed threat-content posture a tenant receives. The
        bundle is fleet-wide (identical for every tenant by design).
      required: [enabled, generated_at, bundle, sources]
      properties:
        enabled:
          type: boolean
          description: Kill-switch state; true when managed content is active.
        generated_at:
          type: string
          format: date-time
          description: When this posture view was assembled.
        bundle:
          nullable: true
          description: Latest distributed bundle metadata, or null if none yet.
          allOf:
            - $ref: "#/components/schemas/ManagedThreatContentBundleSummary"
        sources:
          type: array
          description: Per-feed ingestion health, sorted by name.
          items: { $ref: "#/components/schemas/ManagedThreatContentSourceStatus" }
    ManagedThreatContentBundleSummary:
      type: object
      description: Metadata for the latest signed, versioned content bundle.
      required:
        [serial, schema_version, generated_at, key_id, algorithm,
         indicator_count, size_bytes, digest, counts_by_type]
      properties:
        serial:
          type: integer
          format: int64
          description: Monotonic bundle version.
        schema_version: { type: integer }
        generated_at: { type: string, format: date-time }
        key_id:
          type: string
          description: Identifier of the Ed25519 key the bundle is signed with.
        algorithm:
          type: string
          description: Signature algorithm (ed25519).
        indicator_count: { type: integer, format: int64 }
        size_bytes:
          type: integer
          format: int64
          description: Size of the signed envelope in bytes.
        digest:
          type: string
          description: SHA-256 over the indicator set (stable content identity).
        counts_by_type:
          type: object
          additionalProperties: { type: integer }
          description: Indicator counts keyed by type (domain/ip/url/hash).
    ManagedThreatContentSourceStatus:
      type: object
      description: Per-feed ingestion health row.
      required:
        [name, display_name, kind, weight, enabled, indicator_count,
         consecutive_failures, stale]
      properties:
        name: { type: string }
        display_name: { type: string }
        kind:
          type: string
          description: Indicator kind the feed contributes.
          enum: [domain, ip, url, hash, mixed]
        weight:
          type: number
          format: double
          description: Source trust weight used in corroboration scoring.
        enabled: { type: boolean }
        indicator_count: { type: integer, format: int64 }
        last_success_at: { type: string, format: date-time }
        last_attempt_at: { type: string, format: date-time }
        last_error: { type: string }
        consecutive_failures: { type: integer, format: int64 }
        stale:
          type: boolean
          description: >-
            True when the feed has never succeeded, is currently
            failing, or its last success is older than the staleness
            window.
    ManagedThreatContentRefreshResult:
      type: object
      description: Outcome of a manual managed threat-content refresh.
      required: [skipped, unchanged, degraded, serial, indicators, published, sources]
      properties:
        skipped:
          type: boolean
          description: True when the refresh was skipped (kill switch off).
        unchanged:
          type: boolean
          description: >-
            True when the assembled content matched the current bundle,
            so no new version was minted.
        degraded:
          type: boolean
          description: >-
            True when the cycle kept serving the last good bundle because
            it could not produce a complete fresh result (every upstream
            down). Distinct from unchanged so monitoring can tell a healthy
            no-change refresh from one silently serving stale content.
        serial:
          type: integer
          format: int64
          description: Version of the resulting (or current) bundle.
        indicators:
          type: integer
          description: Total indicators in the assembled bundle.
        published:
          type: boolean
          description: True when the bundle was distributed this cycle.
        sources:
          type: array
          items: { $ref: "#/components/schemas/ManagedThreatContentRefreshSourceStat" }
    ManagedThreatContentRefreshSourceStat:
      type: object
      description: Per-feed outcome of a manual refresh.
      required: [source, indicators]
      properties:
        source: { type: string }
        indicators: { type: integer }
        not_modified:
          type: boolean
          description: True when the upstream returned 304 Not Modified.
        used_cache:
          type: boolean
          description: True when last-known-good was reused (fetch/parse failed).
        disabled:
          type: boolean
          description: >
            True when the source is switched off in the registry and was
            skipped this cycle (distinguishes a disabled feed from one that
            ran but produced no indicators).
        error: { type: string }
    ComplianceAutoControl:
      type: object
      description: One control's evaluated status with its evidence reference.
      properties:
        control_id: { type: string, example: "CC6.1" }
        framework: { type: string, enum: [SOC2, ISO_27001] }
        title: { type: string }
        statement: { type: string }
        category: { type: string }
        collector_id: { type: string, example: "policy_default_deny" }
        status: { type: string, enum: [pass, fail, not_applicable] }
        summary: { type: string }
        source: { type: string, example: "policy_graph" }
        observed_at: { type: string, format: date-time }
        evidence:
          type: object
          additionalProperties: true
          description: Structured facts backing the verdict (collector-specific).
    ComplianceAutoFramework:
      type: object
      description: A tenant's posture for a single framework.
      properties:
        framework: { type: string, enum: [SOC2, ISO_27001] }
        total: { type: integer }
        pass: { type: integer }
        fail: { type: integer }
        not_applicable: { type: integer }
        score_percent:
          type: integer
          description: Pass rate over in-scope (non-not-applicable) controls, 0-100.
        controls:
          type: array
          items: { $ref: "#/components/schemas/ComplianceAutoControl" }
    ComplianceAutoPosture:
      type: object
      description: A tenant's compliance posture across all mapped frameworks.
      properties:
        tenant_id: { type: string, format: uuid }
        generated_at: { type: string, format: date-time }
        frameworks:
          type: array
          items: { $ref: "#/components/schemas/ComplianceAutoFramework" }
    ComplianceAutoEvidencePackControl:
      type: object
      description: One control row in an exported evidence pack.
      properties:
        control_id: { type: string }
        framework: { type: string, enum: [SOC2, ISO_27001] }
        title: { type: string }
        statement: { type: string }
        category: { type: string }
        collector_id: { type: string }
        status: { type: string, enum: [pass, fail, not_applicable] }
        summary: { type: string }
        source: { type: string }
        observed_at: { type: string, format: date-time }
        evidence:
          type: object
          additionalProperties: true
    ComplianceAutoEvidencePack:
      type: object
      description: A framework-mapped, exportable evidence pack for a tenant.
      properties:
        tenant_id: { type: string, format: uuid }
        framework: { type: string, enum: [SOC2, ISO_27001] }
        generated_at: { type: string, format: date-time }
        summary:
          type: object
          properties:
            total: { type: integer }
            pass: { type: integer }
            fail: { type: integer }
            not_applicable: { type: integer }
        controls:
          type: array
          items: { $ref: "#/components/schemas/ComplianceAutoEvidencePackControl" }
    AppIDCatalogVersion:
      type: object
      description: |
        Metadata for one published App-ID catalog version. `serial` is
        the monotonic version number (higher = newer); `checksum` is the
        SHA-256 (hex) of the canonical signed payload.
      properties:
        serial: { type: integer, format: int64 }
        schema_version: { type: integer }
        app_count: { type: integer }
        checksum: { type: string }
        note: { type: string }
        generated_at: { type: string, format: date-time }
      required: [serial, schema_version, app_count, checksum]
    AppIDSignedBundle:
      type: object
      description: |
        An Ed25519-signed catalog envelope. `public_key`, `payload`,
        and `signature` are base64-encoded; the payload is a canonical,
        self-contained catalog document. A verifier checks `signature`
        over `payload` with `public_key` (pinned at the edge) before
        loading the catalog — fail-closed.
      properties:
        alg: { type: string, description: "signature algorithm (ed25519)" }
        key_id: { type: string, description: "optional key identifier for rotation/pinning" }
        public_key: { type: string, description: "base64-encoded Ed25519 public key (32 bytes)" }
        payload: { type: string, description: "base64-encoded canonical catalog payload" }
        signature: { type: string, description: "base64-encoded Ed25519 signature (64 bytes)" }
      required: [alg, public_key, payload, signature]
    AppIDCatalogBundle:
      type: object
      description: Current version metadata plus the signed bundle envelope.
      properties:
        version: { $ref: "#/components/schemas/AppIDCatalogVersion" }
        bundle: { $ref: "#/components/schemas/AppIDSignedBundle" }
      required: [version, bundle]
    AppIDCatalogVersions:
      type: object
      description: A newest-first page of catalog version metadata.
      properties:
        versions:
          type: array
          items: { $ref: "#/components/schemas/AppIDCatalogVersion" }
      required: [versions]
    AppIDPublishRequest:
      type: object
      description: Optional annotation for a catalog publish request.
      properties:
        note: { type: string }
    PolicyTemplate:
      type: object
      description: |
        A catalog template. `kind` is one of `baseline`, `industry`,
        or `compliance`; `industry` is set only for industry templates
        and `regime` only for compliance templates. `spec` carries the
        URL categories, DLP detectors, and firewall posture the
        renderer composes into a Policy-Graph.
      properties:
        id: { type: string, example: "industry/finance" }
        kind: { type: string, enum: [baseline, industry, compliance] }
        name: { type: string }
        description: { type: string }
        industry: { type: string }
        regime: { type: string }
        spec: { type: object, additionalProperties: true }
    PolicyTemplateSelection:
      type: object
      required: [industry, country]
      description: An SME's industry + country pick.
      properties:
        industry:
          type: string
          description: "Industry token, e.g. `finance`, `healthcare`, `retail`, `general`."
          example: finance
        country:
          type: string
          description: "ISO-3166 alpha-2 country code (case-insensitive), e.g. `DE`, `GB`, `US`."
          example: DE
    PolicyTemplatePreview:
      type: object
      description: The rendered (non-persisted) baseline for a selection.
      properties:
        selection: { $ref: "#/components/schemas/PolicyTemplateSelection" }
        regime:
          type: string
          description: "Resolved compliance regime, e.g. `eu-gdpr`, `uk-dpa`, `us-baseline`."
        template_ids:
          type: array
          items: { type: string }
          description: "The catalog templates composing the graph: [baseline, industry, compliance]."
        graph_hash:
          type: string
          description: SHA-256 of the canonical Policy-Graph JSON; the idempotency key.
        graph:
          type: object
          additionalProperties: true
          description: The rendered, validated deny-by-default Policy-Graph intent.
    AppliedPolicyTemplate:
      type: object
      description: A tenant's persisted active baseline (one row per tenant).
      properties:
        tenant_id: { type: string, format: uuid }
        industry: { type: string }
        country: { type: string }
        regime: { type: string }
        template_ids:
          type: array
          items: { type: string }
        graph_hash: { type: string }
        graph:
          type: object
          additionalProperties: true
        version: { type: integer }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code: { type: string }
            message: { type: string }
            details: { }
    DevicePlatform:
      type: string
      enum: [windows, macos, linux, ios, android]
    TenantCreateRequest:
      type: object
      required: [name, tier]
      properties:
        name: { type: string }
        slug: { type: string }
        region: { type: string }
        tier: { type: string, enum: [starter, professional, enterprise] }
        settings: { type: object }
    TenantUpdateRequest:
      type: object
      properties:
        name: { type: string }
        region: { type: string }
        tier: { type: string, enum: [starter, professional, enterprise] }
        settings: { type: object }
    Tenant:
      type: object
      required: [id, name, slug, status, tier, settings, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        slug: { type: string }
        status: { type: string, enum: [active, suspended, deleted] }
        region: { type: string }
        tier: { type: string, enum: [starter, professional, enterprise] }
        settings: { type: object }
        msp_id:
          type: string
          format: uuid
          description: |
            The owning MSP, if any. Mirrors the denormalised
            `tenants.msp_id` column kept in sync with the
            `msp_tenants` row whose `relationship='owner'`. Omitted
            when the tenant is unmanaged (direct platform customer
            with no MSP owner). See migration 015 for the storage
            rationale and `/msps/{msp_id}/tenants` for the
            authoritative listing surface.
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    MigrateRegionRequest:
      type: object
      required: [target_region]
      properties:
        target_region:
          type: string
          description: >
            The region to move the tenant to. Must be a non-empty
            region token and differ from the tenant's current region.
    TenantMigration:
      type: object
      required:
        [id, tenant_id, source_region, target_region, state, dual_read,
         attempts, checkpoint, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        source_region: { type: string }
        target_region: { type: string }
        state:
          type: string
          enum:
            [pending, rewrapping_keys, copying_telemetry, copying_objects,
             reassigning_pop, updating_region, completed, rolling_back,
             rolled_back, failed]
        dual_read:
          type: boolean
          description: >
            True while the tenant is served from both source and target
            regions during an in-flight migration, so no traffic is lost.
        detail:
          type: string
          description: Human-readable detail for the current state (e.g. failure cause).
        attempts: { type: integer }
        checkpoint:
          type: object
          description: >
            Opaque per-step checkpoint the state machine resumes from;
            defaults to an empty object before the first step records.
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        started_at: { type: string, format: date-time }
        completed_at: { type: string, format: date-time }
    SiteCreateRequest:
      type: object
      required: [name]
      properties:
        name: { type: string }
        slug: { type: string }
        template: { type: string, enum: [branch, hub, cloud_only, home_office] }
        config: { type: object }
    SiteUpdateRequest:
      type: object
      properties:
        name: { type: string }
        template: { type: string, enum: [branch, hub, cloud_only, home_office] }
        config: { type: object }
    Site:
      type: object
      required: [id, tenant_id, name, slug, template, config, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        name: { type: string }
        slug: { type: string }
        template: { type: string, enum: [branch, hub, cloud_only, home_office] }
        config: { type: object }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    ClaimToken:
      type: object
      required: [id, token, expires_at]
      properties:
        id: { type: string, format: uuid }
        token: { type: string, description: "plaintext, shown once" }
        expires_at: { type: string, format: date-time }
    DeviceEnrollRequest:
      type: object
      required: [claim_token, name, platform, public_key_ed25519]
      properties:
        claim_token: { type: string }
        name: { type: string }
        platform: { $ref: "#/components/schemas/DevicePlatform" }
        public_key_ed25519: { type: string }
        posture: { type: object }
    Device:
      type: object
      required: [id, tenant_id, name, platform, status, posture, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        site_id: { type: string, format: uuid }
        name: { type: string }
        platform: { $ref: "#/components/schemas/DevicePlatform" }
        public_key_ed25519: { type: string }
        enrolled_at: { type: string, format: date-time }
        last_seen_at: { type: string, format: date-time }
        status: { type: string, enum: [pending, active, suspended, deleted] }
        posture: { type: object }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    MobilePosture:
      type: object
      description: |
        Mobile device posture snapshot. All signals are tri-state
        (present=known, absent=unknown). `jailbroken` is meaningful
        only on iOS and `root_detected` only on Android; reporting the
        wrong-platform signal is rejected by the server. Desktop/general
        signals (`disk_encrypted`, `firewall_enabled`, `screen_lock`,
        `patch_level`) are not part of the mobile contract and are
        rejected if present.
      properties:
        os_version: { type: string }
        agent_version: { type: string }
        collected_at:
          type: string
          format: date-time
          description: |
            When the snapshot was collected on-device. Rejected if too
            far in the future or stale; defaults to the server clock
            when omitted.
        passcode_set: { type: boolean }
        jailbroken: { type: boolean, description: "iOS only" }
        root_detected: { type: boolean, description: "Android only" }
        biometric_ready: { type: boolean }
        mdm_enrolled: { type: boolean }
        extra: { type: object, description: "free-form additional signals" }
    MobileEnrollRequest:
      type: object
      required: [platform]
      properties:
        platform: { type: string, enum: [ios, android] }
        name: { type: string }
        device_public_key:
          type: string
          description: |
            Optional. When present MUST equal the session token's
            device_key; it never overrides the token.
        posture: { $ref: "#/components/schemas/MobilePosture" }
    MobileEnrollResponse:
      type: object
      required: [device, created]
      properties:
        device: { $ref: "#/components/schemas/Device" }
        created:
          type: boolean
          description: "true on first create (201), false on idempotent re-enrol (200)"
    MobilePostureReport:
      type: object
      required: [posture]
      properties:
        posture: { $ref: "#/components/schemas/MobilePosture" }
    Role:
      type: object
      required: [id, name, permissions, scope]
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        name: { type: string }
        permissions:
          type: array
          items: { type: string }
        scope: { type: string, enum: [platform, msp, tenant, site] }
    RoleCreateRequest:
      type: object
      required: [name, scope, permissions]
      properties:
        name: { type: string }
        scope: { type: string, enum: [platform, msp, tenant, site] }
        permissions:
          type: array
          items: { type: string }
    RoleAssignRequest:
      type: object
      required: [role_id]
      properties:
        role_id: { type: string, format: uuid }
        scope_id: { type: string, format: uuid }
    PolicyGraph:
      type: object
      required: [id, tenant_id, version, graph, created_at]
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        version: { type: integer }
        graph: { type: object }
        compiled_at: { type: string, format: date-time }
        compiler_version: { type: string }
        created_at: { type: string, format: date-time }
    PolicyBundle:
      type: object
      required: [id, policy_graph_id, target_type, created_at]
      properties:
        id: { type: string, format: uuid }
        policy_graph_id: { type: string, format: uuid }
        target_type: { type: string, enum: [edge, endpoint, cloud, mobile] }
        key_id: { type: string, description: stable short id of the signing key }
        bundle: { type: string, description: base64 of MessagePack payload }
        signature: { type: string, description: base64 of Ed25519 signature }
        created_at: { type: string, format: date-time }
    PolicySigningKey:
      type: object
      required: [id, tenant_id, key_id, algorithm, public_key, status, activated_at, created_at]
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        key_id: { type: string }
        algorithm: { type: string, enum: [ed25519] }
        public_key: { type: string, description: base64 of the Ed25519 public key (32 bytes) }
        status: { type: string, enum: [active, rotated, revoked] }
        activated_at: { type: string, format: date-time }
        rotated_at: { type: string, format: date-time }
        revoked_at: { type: string, format: date-time }
        created_at: { type: string, format: date-time }
    PolicyPublicKey:
      type: object
      required: [key_id, algorithm, public_key, status]
      properties:
        key_id: { type: string }
        algorithm: { type: string, enum: [ed25519] }
        public_key: { type: string, description: base64 of the Ed25519 public key (32 bytes) }
        status: { type: string, enum: [active, rotated, revoked] }
    PolicyCompileResult:
      type: object
      required: [graph_id, compiled_at, bundles]
      properties:
        graph_id: { type: string, format: uuid }
        compiled_at: { type: string, format: date-time }
        bundles:
          type: array
          items: { $ref: "#/components/schemas/PolicyBundle" }
    PolicyRecommendationGenerateRequest:
      type: object
      description: All fields optional; defaults to the last 24h with default synthesis tuning.
      properties:
        since: { type: string, format: date-time }
        until: { type: string, format: date-time }
        max_events: { type: integer, description: Cap on observed envelopes; 0 uses the server default. }
        options:
          type: object
          properties:
            ipv4_prefix_len: { type: integer, description: CIDR aggregation prefix for IPv4 flow destinations (default 24). }
            ipv6_prefix_len: { type: integer, description: CIDR aggregation prefix for IPv6 flow destinations (default 64). }
            max_rules: { type: integer, description: Cap on synthesized allow rules; highest-frequency groups win. }
            min_observations: { type: integer, description: Drop traffic groups observed fewer than this many times. }
    PolicyRecommendation:
      type: object
      required: [id, tenant_id, status, window_start, window_end, coverage, rule_count, candidate_graph, summary, created_at]
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        status: { type: string, enum: [pending, applied, dismissed] }
        window_start: { type: string, format: date-time }
        window_end: { type: string, format: date-time }
        coverage: { type: number, format: double, description: "Fraction (0..1) of observed permitted traffic the candidate still permits." }
        rule_count: { type: integer }
        candidate_graph: { type: object, description: "The synthesized least-privilege policy graph (a valid PolicyGraph document)." }
        summary: { type: object, description: "Typed evidence — synthesis stats, coverage, and prev-vs-next impact." }
        applied_graph_id: { type: string, format: uuid, nullable: true }
        created_at: { type: string, format: date-time }
        applied_at: { type: string, format: date-time, nullable: true }
    PolicyRecommendationList:
      type: object
      required: [items, next_cursor]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/PolicyRecommendation" }
        next_cursor: { type: string }
    PolicyRecommendationApplyResult:
      type: object
      required: [recommendation, draft_graph_id]
      properties:
        recommendation: { $ref: "#/components/schemas/PolicyRecommendation" }
        draft_graph_id: { type: string, format: uuid }
    AuditEntry:
      type: object
      required: [id, tenant_id, action, resource_type, created_at]
      properties:
        id: { type: string, format: uuid }
        tenant_id:
          type: string
          format: uuid
          nullable: true
          description: >
            Owning tenant, or null for platform-scoped rows returned by
            the admin audit-log endpoint (global catalog mutations and
            vendor syncs have no owning tenant).
        actor_id: { type: string, format: uuid }
        action: { type: string }
        resource_type: { type: string }
        resource_id: { type: string, format: uuid }
        details: { type: object }
        created_at: { type: string, format: date-time }
    WebhookCreateRequest:
      type: object
      required: [url, events]
      properties:
        url: { type: string, format: uri }
        events:
          type: array
          items: { type: string }
    WebhookEndpoint:
      type: object
      required: [id, tenant_id, url, events, status, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        url: { type: string }
        events:
          type: array
          items: { type: string }
        secret: { type: string, description: only returned at create time }
        status: { type: string, enum: [active, disabled] }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    # Integration connector schemas. The Secret payload is
    # write-only: clients POST/PATCH the raw bytes, and the wire
    # response only ever exposes a `secret_set` boolean. This
    # mirrors the webhook signing-secret contract.
    IntegrationConnectorType:
      type: string
      enum: [syslog, siem_webhook, jira, servicenow]
      description: |
        - syslog: emit alert events as RFC 5424 messages
        - siem_webhook: generic JSON webhook for SIEM ingest
        - jira: open a Jira issue per event
        - servicenow: open a ServiceNow incident per event
    IntegrationConnectorStatus:
      type: string
      enum: [active, disabled]
    IntegrationConnectorTestResult:
      type: string
      enum: [never, success, failure]
      description: |
        - never: no test probe has ever been invoked for this connector
        - success: most recent probe succeeded
        - failure: most recent probe failed (see last_test_error)
    IntegrationConnectorCreateRequest:
      type: object
      required: [type, name]
      properties:
        type: { $ref: "#/components/schemas/IntegrationConnectorType" }
        name: { type: string, description: "operator-readable label, e.g. soc-pagerduty-siem" }
        description: { type: string }
        event_types:
          type: array
          description: |
            Event types this connector subscribes to. An empty
            array (or omitting the field entirely) means "match
            every event" — `nil` and `[]` are treated identically
            on CREATE. To restrict the connector to a subset,
            supply the explicit list (e.g. `["alert.created",
            "alert.acknowledged"]`).
          items: { type: string }
        config:
          description: |
            Plugin-specific operator-readable configuration. For
            `syslog`: `{address, transport, app_name, facility}`.
            For `siem_webhook`: `{url}`. For `jira` /
            `servicenow`: `{base_url, project_key | table}`. The
            plugin's Validate() is the source of truth.
          type: object
          additionalProperties: true
        secret:
          description: |
            Opaque plugin-specific secret material (e.g. Jira API
            token, ServiceNow basic-auth blob, SIEM HMAC secret).
            Write-only — never returned in any response. Encoded
            as a base64 string or a structured object depending on
            the plugin; treat as raw bytes.
    IntegrationConnectorUpdateRequest:
      type: object
      description: |
        Partial update. Every field is optional. Omitting
        `event_types` leaves the existing slice untouched (`nil` =
        no change, `[]` = match every event). Blank
        `description` means "no change".
      properties:
        name: { type: string }
        description: { type: string }
        event_types:
          type: array
          items: { type: string }
        config:
          type: object
          additionalProperties: true
        secret:
          description: write-only; setting overwrites the stored secret
    IntegrationConnector:
      type: object
      required:
        - id
        - tenant_id
        - type
        - name
        - event_types
        - secret_set
        - status
        - last_test_result
        - created_at
        - updated_at
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        type: { $ref: "#/components/schemas/IntegrationConnectorType" }
        name: { type: string }
        description: { type: string }
        event_types:
          type: array
          items: { type: string }
        config:
          description: |
            Operator-readable plugin configuration. Decoded back
            from the stored JSON blob; falls back to a raw string
            if the stored blob is not valid JSON.
          type: object
          additionalProperties: true
        secret_set:
          type: boolean
          description: |
            true when a secret is stored. The secret bytes are
            never returned over the wire. To rotate, PATCH a new
            `secret` value.
        status: { $ref: "#/components/schemas/IntegrationConnectorStatus" }
        last_test_result: { $ref: "#/components/schemas/IntegrationConnectorTestResult" }
        last_test_at: { type: string, format: date-time }
        last_test_error:
          type: string
          description: most recent probe failure message; empty after a successful test
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    IntegrationDeliveryStatus:
      type: string
      enum: [pending, processing, delivered, failed, exhausted]
      description: |
        - pending: queued, no attempt yet (or backed off after
          transient failure)
        - processing: claimed by a worker via SKIP LOCKED
        - delivered: terminal — the connector accepted the payload
        - failed: a single attempt failed; will retry if attempts
          < max_attempts, else transitions to exhausted
        - exhausted: terminal — exhausted retries, operator-visible
          failure that needs manual triage
    IntegrationDelivery:
      type: object
      required:
        - id
        - tenant_id
        - connector_id
        - event_type
        - status
        - attempts
        - next_retry_at
        - created_at
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        connector_id: { type: string, format: uuid }
        event_type: { type: string, description: "logical event class, e.g. alert.created" }
        status: { $ref: "#/components/schemas/IntegrationDeliveryStatus" }
        attempts: { type: integer, minimum: 0 }
        last_attempt_at: { type: string, format: date-time }
        last_error: { type: string }
        next_retry_at:
          type: string
          format: date-time
          description: when the worker will reconsider this row
        response_status:
          type: integer
          description: |
            HTTP status returned by the destination on the most
            recent attempt. Omitted for transports without an HTTP
            layer (syslog) and on rows that have never been
            attempted.
        external_reference:
          type: string
          description: |
            Connector-supplied identifier (Jira issue key,
            ServiceNow incident number, etc.) recorded once the
            destination accepts the payload.
        created_at: { type: string, format: date-time }
    MSPStatus:
      type: string
      enum: [active, suspended, deleted]
      description: |
        Lifecycle states for an MSP. `deleted` is the soft-delete
        terminal state — the row stays in the table; only the
        cascade clears `tenants.msp_id` pointers for the cohort.
    MSPCreateStatus:
      type: string
      enum: [active, suspended]
      description: |
        Status values accepted on POST `/api/v1/msps` and PATCH
        `/api/v1/msps/{msp_id}`. The terminal `deleted` state is
        intentionally excluded so generated SDK enums match the
        handler validator: callers wanting to soft-delete an MSP
        must use DELETE `/api/v1/msps/{msp_id}` or POST
        `/api/v1/msps/{msp_id}/status` with status="deleted"
        (whose dedicated MSPStatus enum covers the full
        lifecycle), both of which fire the cascade that clears
        `tenants.msp_id`. Posting status="deleted" via Create or
        PATCH would land an inconsistent (status='deleted',
        deleted_at=NULL) row, which the handler rejects with 400
        invalid_param. Round-13 of Devin Review on PR #42 caught
        the SDK divergence: previously both bodies referenced
        the full MSPStatus enum, so generated clients saw
        `deleted` as legal at Create/PATCH and only discovered
        the restriction at runtime.
    MSPRelationship:
      type: string
      enum: [owner, co_manager]
      description: |
        Distinguishes the primary owner from co-managers in the
        msp_tenants join. At most one `owner` per tenant — the
        partial UNIQUE index in migration 015 enforces it.
    MSPBranding:
      type: object
      description: |
        Shared visual identity an MSP applies to its tenant
        cohort. All fields are optional in the source object;
        when surfaced via `GET /tenants/{tenant_id}/branding`
        every field is guaranteed populated by the resolver.
      properties:
        logo_url: { type: string }
        primary_color: { type: string }
        secondary_color: { type: string }
        custom_domain: { type: string }
        portal_support_to: { type: string }
    MSP:
      type: object
      required: [id, name, slug, status, branding, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        slug: { type: string }
        status: { $ref: "#/components/schemas/MSPStatus" }
        branding: { $ref: "#/components/schemas/MSPBranding" }
        settings:
          type: object
          additionalProperties: true
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    MSPCreateRequest:
      type: object
      required: [name, slug]
      properties:
        name: { type: string }
        slug: { type: string }
        status: { $ref: "#/components/schemas/MSPCreateStatus" }
        branding: { $ref: "#/components/schemas/MSPBranding" }
        settings:
          type: object
          additionalProperties: true
    MSPPatchRequest:
      type: object
      description: |
        Pointer-shaped sparse PATCH. Omitting a field leaves the
        corresponding column untouched. Supplying a field as
        its zero value clears it.
      properties:
        name: { type: string }
        slug: { type: string }
        status: { $ref: "#/components/schemas/MSPCreateStatus" }
        branding: { $ref: "#/components/schemas/MSPBranding" }
        settings:
          type: object
          additionalProperties: true
    MSPTenantBinding:
      type: object
      required: [msp_id, tenant_id, relationship, created_at]
      properties:
        msp_id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        relationship: { $ref: "#/components/schemas/MSPRelationship" }
        created_at: { type: string, format: date-time }
    MSPAssignTenantRequest:
      type: object
      properties:
        relationship: { $ref: "#/components/schemas/MSPRelationship" }
      description: |
        Optional body. When omitted, the binding defaults to
        `owner` and cascades to set `tenants.msp_id`.
    MSPBulkOutcome:
      type: object
      required: [tenant_id]
      properties:
        tenant_id: { type: string, format: uuid }
        error:
          type: string
          description: per-tenant failure message; omitted on success
        policy_version:
          type: integer
          description: new policy graph version (ApplyPolicyTemplate only)
        site_id:
          type: string
          format: uuid
          description: provisioned site id (BulkProvisionSites only)
        claim_tokens:
          type: array
          items: { type: string }
          description: |
            plaintext claim tokens issued (BulkGenerateClaimTokens
            only). Captured ONCE in this response; never
            persisted in plaintext anywhere else.
    MSPBulkResult:
      type: object
      required: [successes, failures, started_at, ended_at]
      properties:
        successes:
          type: array
          items: { $ref: "#/components/schemas/MSPBulkOutcome" }
        failures:
          type: array
          items: { $ref: "#/components/schemas/MSPBulkOutcome" }
        started_at: { type: string, format: date-time }
        ended_at: { type: string, format: date-time }
    APIKeyCreateRequest:
      type: object
      required: [name, subject]
      properties:
        name: { type: string, description: "human-readable label, e.g. ci-prod" }
        subject: { type: string, description: "stable identity injected into auth context, e.g. bot:ci" }
        expires_at:
          type: string
          format: date-time
          description: optional RFC3339 absolute deadline; omit for non-expiring
    APIKey:
      type: object
      required: [id, tenant_id, name, subject, status, created_at]
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        name: { type: string }
        subject: { type: string }
        status: { type: string, enum: [active, revoked] }
        expires_at: { type: string, format: date-time }
        last_used_at: { type: string, format: date-time }
        created_by: { type: string, format: uuid }
        created_at: { type: string, format: date-time }
        revoked_at: { type: string, format: date-time }
        plaintext: { type: string, description: only returned on create }
    AppRegistry:
      type: object
      required: [id, name, traffic_class, scope, domains, is_system, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        vendor: { type: string }
        traffic_class:
          type: string
          enum: [trusted_direct, trusted_media_bypass, inspect_lite, inspect_full, tunnel_private, block]
        scope: { type: string, enum: [global, regional] }
        regions:
          type: array
          items: { type: string }
        domains:
          type: array
          items: { type: string }
        ip_ranges:
          type: array
          items: { type: string }
        cert_pins:
          type: array
          items: { type: string }
        metadata_url: { type: string }
        category: { type: string }
        is_system: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    AppRegistryRequest:
      type: object
      description: |
        Create / update body for the global app catalog.

        Optional scalar fields (`vendor`, `metadata_url`, `category`)
        follow PUT-replacement semantics: omitting the field from
        the JSON body inherits the existing value (or leaves it
        empty on create), while setting the field to an empty
        string explicitly clears it. This lets clients fully
        replace an entry on PUT without having to delete and
        recreate it.
      required: [name, traffic_class, scope, domains]
      properties:
        name: { type: string }
        vendor:
          type: string
          description: |
            Vendor name. Send `""` on PUT to clear; omit to
            inherit the existing value.
        traffic_class:
          type: string
          enum: [trusted_direct, trusted_media_bypass, inspect_lite, inspect_full, tunnel_private, block]
        scope: { type: string, enum: [global, regional] }
        regions:
          type: array
          items: { type: string }
        domains:
          type: array
          items: { type: string }
        ip_ranges:
          type: array
          items: { type: string }
        cert_pins:
          type: array
          items: { type: string }
        metadata_url:
          type: string
          description: |
            Vendor-published endpoint document URL (auto-sync
            source). Send `""` on PUT to clear; omit to inherit.
        category:
          type: string
          description: |
            Category label. Send `""` on PUT to clear; omit to
            inherit.
        is_system: { type: boolean }
    AppRegistryOverride:
      type: object
      required: [id, tenant_id, traffic_class_override, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        app_id: { type: string, format: uuid, description: "set when override targets a global app entry" }
        custom_domains:
          type: array
          items: { type: string }
          description: "set when override targets domains not present in the global catalog"
        traffic_class_override:
          type: string
          enum: [trusted_direct, trusted_media_bypass, inspect_lite, inspect_full, tunnel_private, block]
        reason: { type: string }
        expires_at: { type: string, format: date-time, description: "TTL-based auto-cleanup; omit for permanent" }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    AppRegistryOverrideRequest:
      type: object
      required: [traffic_class_override]
      description: |
        Exactly one of `app_id` or `custom_domains` must be set.
        - `app_id` references an entry in the global `app_registry`.
        - `custom_domains` defines a tenant-local pattern list for
          apps that are not in the global catalog.
        Supplying neither (or both) returns 400
        `invalid_override_target`. Empty / whitespace-only
        custom-domain entries return 400 `invalid_custom_domain`
        because they would never match any flow and would install
        a silently-dead override.
      properties:
        app_id: { type: string, format: uuid }
        custom_domains:
          type: array
          items: { type: string }
        traffic_class_override:
          type: string
          enum: [trusted_direct, trusted_media_bypass, inspect_lite, inspect_full, tunnel_private, block]
        reason: { type: string }
        expires_at: { type: string, format: date-time }
    EffectiveApp:
      type: object
      required: [app, effective_class, source]
      properties:
        app: { $ref: "#/components/schemas/AppRegistry" }
        effective_class:
          type: string
          enum: [trusted_direct, trusted_media_bypass, inspect_lite, inspect_full, tunnel_private, block]
        source: { type: string, enum: [global, override] }
        override_id: { type: string, format: uuid }
        override_expires_at: { type: string, format: date-time }
        override_reason: { type: string }
    TrafficClassStat:
      type: object
      required: [class, events, bytes]
      properties:
        class: { type: string }
        events: { type: integer, format: int64 }
        bytes: { type: integer, format: int64 }
    SyncResult:
      type: object
      required: [app_id, app_name, metadata_url]
      properties:
        app_id: { type: string, format: uuid }
        app_name: { type: string }
        metadata_url: { type: string }
        domains_before: { type: integer }
        domains_after: { type: integer }
        ip_ranges_before: { type: integer }
        ip_ranges_after: { type: integer }
        updated: { type: boolean }
        error: { type: string }
    BaselineModel:
      type: object
      required:
        - id
        - tenant_id
        - dimension
        - window_seconds
        - samples
        - mean
        - stddev
        - ewma
        - ewma_stddev
        - alpha
        - z_threshold
        - created_at
        - version
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        dimension: { type: string }
        window_seconds: { type: integer, format: int64 }
        samples: { type: integer, format: int64 }
        mean: { type: number, format: double }
        stddev: { type: number, format: double }
        ewma: { type: number, format: double }
        ewma_stddev: { type: number, format: double }
        alpha: { type: number, format: double }
        z_threshold: { type: number, format: double }
        last_observed_at: { type: string, format: date-time }
        last_updated_at: { type: string, format: date-time }
        created_at: { type: string, format: date-time }
        version: { type: integer, format: int64 }
    Alert:
      type: object
      required:
        - id
        - tenant_id
        - kind
        - severity
        - dimension
        - observed_value
        - baseline_mean
        - baseline_stddev
        - z_score
        - window_start
        - window_end
        - window_seconds
        - summary
        - state
        - created_at
        - updated_at
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        kind: { type: string, description: "Detector kind, e.g. baseline_zscore_anomaly." }
        severity: { type: string, enum: [info, warning, critical] }
        dimension: { type: string, description: "Baseline dimension the alert was generated against." }
        observed_value: { type: number, format: double, description: "Observation that tripped the detector." }
        baseline_mean: { type: number, format: double }
        baseline_stddev: { type: number, format: double }
        z_score:
          description: max(|z_welford|, |z_ewma|) — the deviation score that tripped the detector
          type: number
          format: double
        window_start: { type: string, format: date-time }
        window_end: { type: string, format: date-time }
        window_seconds:
          type: integer
          minimum: 1
          description: "Baseline window size (in seconds) the alert was generated against. Identifies which (dimension, window_seconds) baseline bucket emitted this alert — the same dimension can have multiple buckets (e.g. 60 vs 3600)."
        summary: { type: string, description: "Human-readable rationale string the detector emitted with the alert." }
        evidence:
          description: "Detector-supplied JSON payload (statistical context, thresholds, etc.)."
          type: object
          additionalProperties: true
        state: { type: string, enum: [open, acknowledged, resolved, suppressed] }
        suppressed_by: { type: string, format: uuid, description: "Suppression rule ID that auto-routed this alert to the suppressed state, if any." }
        acknowledged_by: { type: string, format: uuid }
        acknowledged_at: { type: string, format: date-time }
        resolved_by: { type: string, format: uuid }
        resolved_at: { type: string, format: date-time }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    AlertSuppression:
      type: object
      required: [id, tenant_id, reason, created_at]
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        kind:
          type: string
          description: "Alert kind matched by this rule. Either kind or dimension (or both) is set; nil means match any kind within the supplied dimension."
        dimension:
          type: string
          description: "Baseline dimension matched by this rule. Either kind or dimension (or both) is set; nil means match any dimension within the supplied kind."
        reason: { type: string }
        created_by:
          type: string
          format: uuid
          description: "Operator who created the rule. Derived from the JWT sub / API-key owner server-side."
        created_at: { type: string, format: date-time }
        expires_at: { type: string, format: date-time }
    AlertFeedback:
      type: object
      required: [id, alert_id, tenant_id, decision, created_at]
      properties:
        id: { type: string, format: uuid }
        alert_id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        decision: { type: string, enum: [true_positive, false_positive, noise] }
        notes: { type: string }
        created_by:
          type: string
          format: uuid
          description: "Operator who recorded the feedback. Derived from the JWT sub / API-key owner server-side — clients must not set this."
        created_at: { type: string, format: date-time }
    # --- SCIM schemas --------------------------------------------------------
    SCIMUser:
      type: object
      required: [schemas, userName]
      properties:
        schemas:
          type: array
