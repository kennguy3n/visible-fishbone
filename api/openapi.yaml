openapi: 3.1.0
info:
  title: ShieldNet Gateway Control Plane API
  description: |
    REST API for ShieldNet Gateway (SNG) — multi-tenant control plane.
    All operator endpoints are mounted under `/api/v1`. Auth is
    either a bearer JWT (operator console) or `X-SNG-API-Key`
    (machine-to-machine).
  version: "0.1.0"
  contact:
    name: ShieldNet Gateway Team
servers:
  - url: https://control.shieldnet.example/api/v1
    description: Production
  - url: http://localhost:8080/api/v1
    description: Local dev
security:
  - BearerJWT: []
  - APIKey: []
tags:
  - name: tenants
  - name: sites
  - name: devices
  - name: rbac
  - name: policy
  - name: audit
  - name: webhooks
  - name: scim
    description: SCIM 2.0 provisioning endpoints (RFC 7643/7644)
  - name: enrollment
    description: Device enrollment flow (claim-token pattern)
  - name: ai
  - name: mobile-auth
    description: |
      Control-plane IdP federation for mobile native OIDC SSO.
      Tenant-scoped CRUD for OIDC provider configs, plus the public
      mobile token-exchange / refresh endpoints that validate an
      OIDC ID token and mint an SNG session bound to both the
      device's Ed25519 key and the user's OIDC subject.
  - name: mobile-devices
    description: |
      Device-bound mobile self-service: a mobile agent holding a
      session JWT (token_type=mobile) self-enrols its device and
      reports posture snapshots. The device identity comes from the
      token's device_key claim, so a session only ever acts on its
      own device.
  - name: policy-templates
    description: |
      Smart-default security baselines. An SME picks an industry +
      country and gets a deny-by-default Policy-Graph (safe-browsing
      category filtering, per-regime DLP detector sensitivity, and a
      baseline firewall posture). The catalog (one baseline, one per
      industry, one per compliance regime) is global, immutable, and
      code-defined; preview renders the composed graph without
      persisting, and apply idempotently stores it as the tenant's
      active baseline (one row per tenant).
  - name: appid
    description: |
      Application-ID signature catalog. A fleet-wide, versioned,
      Ed25519-signed catalog of L7 application signatures (TLS SNI /
      HTTP host suffixes, JA3 hints, bounded byte-probes, port /
      transport modifiers) that the data plane loads to identify
      applications beyond the hard-coded protocol set. The catalog is
      centrally managed (no per-tenant configuration — no-ops):
      tenants PULL the current signed bundle from a tenant-scoped read
      endpoint and verify it against the pinned public key, while
      platform operators publish new versions and inspect history via
      the platform-scoped admin routes.
  - name: pops
    description: |
      Cloud PoP (Point-of-Presence) service. A PoP is a shared,
      multi-tenant deployment of the sng-edge binary in a cloud
      region that serves tenants without an on-premise edge VM. The
      `pops` registry is GLOBAL infrastructure (not tenant-owned):
      the admin register/health routes are platform-scoped
      (`pops:write` / `pops:read`), and `GET /pops` is public so a
      not-yet-enrolled client can bootstrap. The per-tenant override
      route is tenant-scoped (RLS on `tenant_pop_assignments`).
  - name: dem
    description: |
      Digital Experience Monitoring (DEM). Edge/agent runs cheap,
      bounded synthetic probes (DNS / TCP / HTTP(S)) against a small
      set of critical SaaS targets and uploads structured results; the
      control plane rolls them into per-tenant, per-target experience
      scores (availability + latency composite, 0–100) over rolling
      windows, detects degradation against an EWMA baseline, and raises
      alerts. Every tenant gets a managed default target catalog so an
      SME configures nothing; a tenant may add custom targets or
      disable a default by reusing its `target_key`.
  - name: threat-content
    description: |
      Managed (curated) threat content. A NEW producer alongside the
      operator-configured threat-intel feeds: SNG ingests a built-in
      set of reputable open feeds (domain/IP/URL/hash), then
      normalizes, deduplicates, scores, and expires the indicators
      centrally before signing and versioning a single content bundle
      distributed to ALL tenants by default with zero per-tenant
      configuration (no-ops). The per-tenant posture route is a
      read-only view of the fleet-wide bundle a tenant receives; the
      system-scoped refresh trigger is platform-gated
      (`threatcontent:write`).
  - name: compliance-auto
    description: |
      Continuous compliance evidence (WP6). Maps real platform state
      (policy-graph default-deny, RLS tenant isolation, identity
      federation, policy bundle signing + key rotation, audit trail,
      data residency / retention) to SOC 2 / ISO 27001 controls. A
      leader-gated, bounded background sweep evaluates each control to
      pass / fail / not-applicable with an evidence reference; packs are
      exported framework-mapped (JSON or CSV) on demand.
paths:
  /tenants:
    post:
      tags: [tenants]
      operationId: createTenant
      summary: Create a tenant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TenantCreateRequest"
      responses:
        "201": { $ref: "#/components/responses/Tenant" }
        "400": { $ref: "#/components/responses/Error" }
        "409": { $ref: "#/components/responses/Error" }
    get:
      tags: [tenants]
      operationId: listTenants
      summary: List tenants
      parameters:
        - $ref: "#/components/parameters/After"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: page of tenants
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/Tenant" }
                  next_cursor: { type: string }
  /tenants/{tenant_id}:
    parameters: [ { $ref: "#/components/parameters/TenantPathID" } ]
    get:
      tags: [tenants]
      operationId: getTenant
      summary: Get tenant by id
      responses:
        "200": { $ref: "#/components/responses/Tenant" }
        "404": { $ref: "#/components/responses/Error" }
    patch:
      tags: [tenants]
      operationId: updateTenant
      summary: Update tenant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TenantUpdateRequest"
      responses:
        "200": { $ref: "#/components/responses/Tenant" }
    delete:
      tags: [tenants]
      operationId: deleteTenant
      summary: Soft-delete tenant
      responses:
        "204": { description: deleted }
  /tenants/{tenant_id}/suspend:
    parameters: [ { $ref: "#/components/parameters/TenantPathID" } ]
    post:
      tags: [tenants]
      operationId: suspendTenant
      summary: Suspend tenant
      responses:
        "200": { $ref: "#/components/responses/Tenant" }
  /tenants/{tenant_id}/migrate-region:
    parameters: [ { $ref: "#/components/parameters/TenantPathID" } ]
    post:
      tags: [tenants]
      operationId: migrateTenantRegion
      summary: Start a cross-region migration for the tenant
      description: >
        Drives a resumable migration state machine that re-wraps the
        tenant's data-encryption keys under the target region's KEK,
        copies telemetry and object storage, re-pins the tenant onto a
        target-region PoP, and finally flips the authoritative
        tenants.region column. Any step failure rolls back every
        completed step in reverse; the tenant is dual-read throughout so
        no traffic is lost. Returns 202 with the migration record on a
        successful run, 200 with a terminal record (rolled_back/failed)
        if the run rolled back, 409 if a migration is already in flight,
        and 422 if the tenant has no source region to migrate from.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/MigrateRegionRequest" }
      responses:
        "202": { $ref: "#/components/responses/TenantMigration" }
        "200": { $ref: "#/components/responses/TenantMigration" }
        "400": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
        "409": { $ref: "#/components/responses/Error" }
        "422": { $ref: "#/components/responses/Error" }
  /tenants/{tenant_id}/migration-status:
    parameters: [ { $ref: "#/components/parameters/TenantPathID" } ]
    get:
      tags: [tenants]
      operationId: getTenantMigrationStatus
      summary: Get the tenant's most recent migration record
      responses:
        "200": { $ref: "#/components/responses/TenantMigration" }
        "404": { $ref: "#/components/responses/Error" }
  /tenants/{tenant_id}/sites:
    parameters: [ { $ref: "#/components/parameters/TenantPathID" } ]
    get:
      tags: [sites]
      operationId: listSites
      summary: List sites
      responses:
        "200":
          description: page of sites
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/Site" }
                  next_cursor: { type: string }
    post:
      tags: [sites]
      operationId: createSite
      summary: Create site
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SiteCreateRequest" }
      responses:
        "201": { $ref: "#/components/responses/Site" }
  /tenants/{tenant_id}/sites/{id}:
    parameters:
      - $ref: "#/components/parameters/TenantPathID"
      - $ref: "#/components/parameters/ResourceID"
    get:
      tags: [sites]
      operationId: getSite
      summary: Get site
      responses:
        "200": { $ref: "#/components/responses/Site" }
    patch:
      tags: [sites]
      operationId: updateSite
      summary: Update site
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SiteUpdateRequest" }
      responses:
        "200": { $ref: "#/components/responses/Site" }
    delete:
      tags: [sites]
      operationId: deleteSite
      summary: Delete site
      responses:
        "204": { description: deleted }
  /tenants/{tenant_id}/claim-tokens:
    parameters: [ { $ref: "#/components/parameters/TenantPathID" } ]
    post:
      tags: [devices]
      operationId: createClaimToken
      summary: Generate a single-use claim token for device enrolment
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                ttl_seconds: { type: integer, minimum: 60 }
      responses:
        "201":
          description: token created (plaintext returned once)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ClaimToken" }
  /tenants/{tenant_id}/devices/enroll:
    parameters: [ { $ref: "#/components/parameters/TenantPathID" } ]
    post:
      tags: [devices]
      operationId: enrollTenantDevice
      summary: Redeem claim token and enrol a device
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DeviceEnrollRequest" }
      responses:
        "201": { $ref: "#/components/responses/Device" }
        "404": { $ref: "#/components/responses/Error" }
  /tenants/{tenant_id}/devices:
    parameters: [ { $ref: "#/components/parameters/TenantPathID" } ]
    get:
      tags: [devices]
      operationId: listDevices
      summary: List enrolled devices
      parameters:
        - in: query
          name: platform
          schema: { $ref: "#/components/schemas/DevicePlatform" }
        - in: query
          name: status
          schema: { type: string, enum: [pending, active, suspended, deleted] }
        - in: query
          name: site_id
          schema: { type: string, format: uuid }
        - $ref: "#/components/parameters/After"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: page of devices
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/Device" }
                  next_cursor: { type: string }
  /tenants/{tenant_id}/devices/{id}:
    parameters:
      - $ref: "#/components/parameters/TenantPathID"
      - $ref: "#/components/parameters/ResourceID"
    get:
      tags: [devices]
      operationId: getDevice
      summary: Get device by id
      responses:
        "200": { $ref: "#/components/responses/Device" }
  /tenants/{tenant_id}/roles:
    parameters: [ { $ref: "#/components/parameters/TenantPathID" } ]
    get:
      tags: [rbac]
      operationId: listRoles
      summary: List roles
      responses:
        "200":
          description: roles
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/Role" }
    post:
      tags: [rbac]
      operationId: createRole
      summary: Create custom role
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RoleCreateRequest" }
      responses:
        "201":
          description: created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Role" }
  /tenants/{tenant_id}/users/{user_id}/roles:
    parameters:
      - $ref: "#/components/parameters/TenantPathID"
      - in: path
        name: user_id
        required: true
        schema: { type: string, format: uuid }
    post:
      tags: [rbac]
      operationId: assignUserRole
      summary: Assign role to user
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RoleAssignRequest" }
      responses:
        "204": { description: assigned }
  /tenants/{tenant_id}/users/{user_id}/roles/{role_id}:
    parameters:
      - $ref: "#/components/parameters/TenantPathID"
      - in: path
        name: user_id
        required: true
        schema: { type: string, format: uuid }
      - in: path
        name: role_id
        required: true
        schema: { type: string, format: uuid }
    delete:
      tags: [rbac]
      operationId: revokeUserRole
      summary: Revoke role
      responses:
        "204": { description: revoked }
  /tenants/{tenant_id}/policy:
    parameters: [ { $ref: "#/components/parameters/TenantPathID" } ]
    get:
      tags: [policy]
      operationId: getPolicyGraph
      summary: Get latest policy graph
      responses:
        "200":
          description: graph
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PolicyGraph" }
    put:
      tags: [policy]
      operationId: updatePolicyGraph
      summary: Publish a new policy graph version
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        "201":
          description: graph
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PolicyGraph" }
  /tenants/{tenant_id}/policy/compile:
    parameters: [ { $ref: "#/components/parameters/TenantPathID" } ]
    post:
      tags: [policy]
      operationId: compilePolicyBundles
      summary: Compile the latest graph into signed bundles
      responses:
        "202":
          description: compile result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PolicyCompileResult" }
  /tenants/{tenant_id}/policy/bundles/{target_type}:
    parameters:
      - $ref: "#/components/parameters/TenantPathID"
      - in: path
        name: target_type
        required: true
        schema:
          type: string
          enum: [edge, endpoint, cloud, mobile]
    get:
      tags: [policy]
      operationId: getPolicyBundleMetadata
      summary: Fetch latest signed bundle for a target
      responses:
        "200":
          description: bundle (bytes are base64-encoded)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PolicyBundle" }
  /tenants/{tenant_id}/policy/bundles/{target_type}/payload:
    parameters:
      - $ref: "#/components/parameters/TenantPathID"
      - in: path
        name: target_type
        required: true
        schema:
          type: string
          enum: [edge, endpoint, cloud, mobile]
    get:
      tags: [policy]
      operationId: getPolicyBundlePayload
      summary: Download the raw signed bundle payload (agent-pull)
      description: |
        Returns the MessagePack-encoded bundle bytes for agent
        consumption. The Ed25519 signature is delivered in the
        `X-Sng-Policy-Signature` response header (base64) and the
        signing key id in `X-Sng-Policy-Key-Id` so the agent can
        fetch the matching public key from the publication
        endpoint. Supports `If-None-Match` against the strong
        ETag (`sha256(bundle)`) for cache validation.
      parameters:
        - in: header
          name: If-None-Match
          schema: { type: string }
      responses:
        "200":
          description: bundle bytes
          headers:
            ETag:
              schema: { type: string }
              description: Strong validator (sha256 of bundle bytes).
            X-Sng-Policy-Signature:
              schema: { type: string }
              description: Base64-encoded Ed25519 signature over the bundle bytes.
            X-Sng-Policy-Key-Id:
              schema: { type: string }
              description: Stable short id of the signing key.
            X-Sng-Policy-Bundle-Id:
              schema: { type: string }
            X-Sng-Policy-Graph-Id:
              schema: { type: string }
          content:
            application/vnd.sng.policy-bundle:
              schema: { type: string, format: binary }
        "304":
          description: bundle unchanged (ETag matched If-None-Match)
    head:
      tags: [policy]
      operationId: headPolicyBundlePayload
      summary: Probe latest bundle ETag without transferring bytes
      responses:
        "200":
          description: bundle metadata in headers
  /tenants/{tenant_id}/policy/signing-keys:
    parameters: [ { $ref: "#/components/parameters/TenantPathID" } ]
    get:
      tags: [policy]
      operationId: listPolicySigningKeys
      summary: List the tenant's signing-key rotation history
      responses:
        "200":
          description: page of signing keys
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/PolicySigningKey" }
  /tenants/{tenant_id}/policy/signing-keys/rotate:
    parameters: [ { $ref: "#/components/parameters/TenantPathID" } ]
    post:
      tags: [policy]
      operationId: rotatePolicySigningKey
      summary: Provision an initial key, or rotate the current active key
      responses:
        "200":
          description: rotated key (active key existed)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PolicySigningKey" }
        "201":
          description: created key (no active key existed)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PolicySigningKey" }
  /tenants/{tenant_id}/policy/signing-keys/{key_id}/revoke:
    parameters:
      - $ref: "#/components/parameters/TenantPathID"
      - in: path
        name: key_id
        required: true
        schema: { type: string }
    post:
      tags: [policy]
      operationId: revokePolicySigningKey
      summary: Revoke a signing key
      responses:
        "200":
          description: revoked key
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PolicySigningKey" }
  /tenants/{tenant_id}/policy/signing-keys/{key_id}/public-key:
    parameters:
      - $ref: "#/components/parameters/TenantPathID"
      - in: path
        name: key_id
        required: true
        schema: { type: string, description: "key_id or the literal 'active'" }
    get:
      tags: [policy]
      operationId: getPolicySigningKeyPublic
      summary: Publish a signing key's public half for bundle verification
      description: |
        Returns the public half of the signing key that produced a
        given bundle's `kid`. Receivers verifying a bundle pulled
        from this tenant resolve the `kid` here.

        When the deployment is running in file-backed signing mode
        (POLICY_SIGNING_KEY_PATH set), the file-backed signer's kid
        and the literal 'active' both resolve to the same uniform
        key for every tenant — the file-backed signer is
        process-global. The same response (key_id, public_key,
        status='active') is returned across all tenant scopes.
        Other key_ids fall through to the DB-backed rotation history
        so historical (pre-file-backed) bundles still resolve.
      responses:
        "200":
          description: public key
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PolicyPublicKey" }
  /tenants/{tenant_id}/policy/recommendations:
    parameters: [ { $ref: "#/components/parameters/TenantPathID" } ]
    get:
      tags: [policy]
      operationId: listPolicyRecommendations
      summary: List traffic-derived policy recommendations
      parameters:
        - in: query
          name: status
          schema: { type: string, enum: [pending, applied, dismissed] }
          description: Filter by lifecycle status.
        - in: query
          name: limit
          schema: { type: integer }
        - in: query
          name: after
          schema: { type: string }
          description: Opaque pagination cursor from a prior response's next_cursor.
      responses:
        "200":
          description: page of recommendations
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PolicyRecommendationList" }
    post:
      tags: [policy]
      operationId: generatePolicyRecommendation
      summary: Synthesize a least-privilege recommendation from observed traffic
      description: |
        Observes the tenant's recent flow / DNS / HTTP telemetry,
        synthesizes a minimal default-deny least-privilege policy
        graph, compiles it through the deterministic policy compiler,
        and proves both coverage (how much observed permitted traffic
        the candidate still permits) and prev-vs-next impact against
        the tenant's current live policy. The result is persisted as a
        pending recommendation. Requires the telemetry hot tier;
        returns 503 when it is not configured.
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PolicyRecommendationGenerateRequest" }
      responses:
        "201":
          description: synthesized recommendation
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PolicyRecommendation" }
        "400": { $ref: "#/components/responses/Error" }
        "503": { $ref: "#/components/responses/Error" }
  /tenants/{tenant_id}/policy/recommendations/{recommendation_id}:
    parameters:
      - $ref: "#/components/parameters/TenantPathID"
      - in: path
        name: recommendation_id
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [policy]
      operationId: getPolicyRecommendation
      summary: Fetch a single policy recommendation
      responses:
        "200":
          description: recommendation
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PolicyRecommendation" }
        "404": { $ref: "#/components/responses/Error" }
  /tenants/{tenant_id}/policy/recommendations/{recommendation_id}/apply:
    parameters:
      - $ref: "#/components/parameters/TenantPathID"
      - in: path
        name: recommendation_id
        required: true
        schema: { type: string, format: uuid }
    post:
      tags: [policy]
      operationId: applyPolicyRecommendation
      summary: Stage a recommendation's candidate graph as a policy draft
      description: |
        Stages the candidate graph as a policy draft (feeding the
        existing canary-rollout path) and atomically marks the
        recommendation applied. Returns 409 when the recommendation is
        no longer pending.
      responses:
        "200":
          description: applied recommendation + staged draft graph id
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PolicyRecommendationApplyResult" }
        "404": { $ref: "#/components/responses/Error" }
        "409": { $ref: "#/components/responses/Error" }
  /tenants/{tenant_id}/policy/recommendations/{recommendation_id}/dismiss:
    parameters:
      - $ref: "#/components/parameters/TenantPathID"
      - in: path
        name: recommendation_id
        required: true
        schema: { type: string, format: uuid }
    post:
      tags: [policy]
      operationId: dismissPolicyRecommendation
      summary: Dismiss a pending policy recommendation
      responses:
        "200":
          description: dismissed recommendation
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PolicyRecommendation" }
        "404": { $ref: "#/components/responses/Error" }
        "409": { $ref: "#/components/responses/Error" }
  /tenants/{tenant_id}/audit-log:
    parameters: [ { $ref: "#/components/parameters/TenantPathID" } ]
    get:
      tags: [audit]
      operationId: listAuditLog
      summary: List audit entries (append-only)
      parameters:
        - in: query
          name: resource_type
          schema: { type: string }
        - in: query
          name: action
          schema: { type: string }
        - in: query
          name: actor_id
          schema: { type: string, format: uuid }
        - in: query
          name: from
          schema: { type: string, format: date-time }
        - in: query
          name: to
          schema: { type: string, format: date-time }
        - $ref: "#/components/parameters/After"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: page of audit entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/AuditEntry" }
                  next_cursor: { type: string }
  /tenants/{tenant_id}/webhooks:
    parameters: [ { $ref: "#/components/parameters/TenantPathID" } ]
    post:
      tags: [webhooks]
      operationId: createWebhook
      summary: Register an outbound webhook endpoint
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/WebhookCreateRequest" }
      responses:
        "201":
          description: registered (secret returned once)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WebhookEndpoint" }
    get:
      tags: [webhooks]
      operationId: listWebhooks
      summary: List webhook endpoints
      responses:
        "200":
          description: list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/WebhookEndpoint" }
  /tenants/{tenant_id}/webhooks/{id}:
    parameters:
      - $ref: "#/components/parameters/TenantPathID"
      - $ref: "#/components/parameters/ResourceID"
    delete:
      tags: [webhooks]
      operationId: deleteWebhook
      summary: Unregister webhook
      responses:
        "204": { description: removed }
  /tenants/{tenant_id}/api-keys:
    parameters: [ { $ref: "#/components/parameters/TenantPathID" } ]
    post:
      tags: [api-keys]
      operationId: createApiKey
      summary: Mint a tenant API key
      description: |
        Creates a new tenant-scoped API key. The plaintext secret is
        returned in the response body of THIS request only — it is
        never persisted in plaintext and cannot be recovered. The
        operator is expected to surface it to the human owner
        immediately and discard it.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/APIKeyCreateRequest" }
      responses:
        "201":
          description: minted (plaintext returned once)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/APIKey" }
        "429":
          description: |
            tenant has reached the per-tenant active-key cap; the
            response body carries `error.code = "resource_exhausted"`
            with a human-readable message identifying the current
            count and the cap. Callers should revoke unused keys
            or escalate to the platform owner to raise the cap
            (configured via AUTH_API_KEY_MAX_ACTIVE_PER_TENANT).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    get:
      tags: [api-keys]
      operationId: listApiKeys
      summary: List tenant API keys
      responses:
        "200":
          description: list (plaintext omitted)
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/APIKey" }
  /tenants/{tenant_id}/api-keys/{id}:
    parameters:
      - $ref: "#/components/parameters/TenantPathID"
      - $ref: "#/components/parameters/ResourceID"
    get:
      tags: [api-keys]
      operationId: getApiKey
      summary: Get tenant API key metadata
      responses:
        "200":
          description: api key
          content:
            application/json:
              schema: { $ref: "#/components/schemas/APIKey" }
    delete:
      tags: [api-keys]
      operationId: deleteApiKey
      summary: Revoke tenant API key
      responses:
        "204": { description: revoked }
  /tenants/{tenant_id}/app-registry:
    parameters:
      - $ref: "#/components/parameters/TenantPathID"
    get:
      tags: [app-registry]
      operationId: listTenantAppRegistry
      summary: List effective app classifications (global + tenant overrides)
      responses:
        "200":
