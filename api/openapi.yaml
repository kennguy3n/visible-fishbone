          content:
            application/json:
              schema: { $ref: "#/components/schemas/TroubleshootKBEntry" }
        "404": { $ref: "#/components/responses/Error" }
    put:
      tags: [troubleshoot]
      operationId: updateTroubleshootKBEntry
      summary: Update a knowledge base entry
      parameters:
        - $ref: "#/components/parameters/TenantPathID"
