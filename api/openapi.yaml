    post:
      tags: [ai]
      operationId: aiSuggestPolicy
      summary: AI-proposed policy changes
      description: |
        Asks the LLM to propose a policy graph delta, then compiles
        the suggestion through the deterministic policy compiler.
        Returns a verified, ready-to-queue change with dry-run
        metadata. Requires an LLM endpoint; returns 503 when AI is
