        recommended_actions: { type: array, items: { type: string } }
        evidence_refs: { type: array, items: { type: string } }
        ai_generated: { type: boolean, description: "true when an LLM polished the output; false for template-only." }
        model_id: { type: string }
        latency_ms: { type: integer, format: int64 }
    AISuggestPolicyRequest:
      type: object
      required: [prompt]
      properties:
        prompt: { type: string, description: "Natural-language description of the desired policy change." }
    AIVerifiedSuggestion:
