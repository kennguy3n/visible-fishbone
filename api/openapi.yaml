              schema: { $ref: "#/components/schemas/TroubleshootSession" }
        "404": { $ref: "#/components/responses/Error" }

  /tenants/{tenant_id}/troubleshoot/diagnostics/run:
    post:
      tags: [troubleshoot]
      operationId: runTroubleshootDiagnostics
      summary: Run all diagnostic checks against tenant state
      parameters:
        - $ref: "#/components/parameters/TenantPathID"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items: { $ref: "#/components/schemas/TroubleshootDiagnosticResult" }

  /tenants/{tenant_id}/troubleshoot/diagnostics/{check}:
    post:
      tags: [troubleshoot]
      operationId: runTroubleshootDiagnosticCheck
      summary: Run a single named diagnostic check
      parameters:
        - $ref: "#/components/parameters/TenantPathID"
        - in: path
          name: check
          required: true
          schema:
            type: string
            enum: [connectivity, policy_consistency, cert_health, integration_health, performance]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TroubleshootDiagnosticResult" }
        "404": { $ref: "#/components/responses/Error" }

  /tenants/{tenant_id}/troubleshoot/kb:
    get:
      tags: [troubleshoot]
