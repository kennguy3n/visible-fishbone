  /tenants/{tenant_id}/ai/summarize:
    parameters: [ { $ref: "#/components/parameters/TenantPathID" } ]
    post:
      tags: [ai]
      operationId: aiSummarize
      summary: Trigger AI-assisted incident summarization
      description: |
        Queries ClickHouse for recent alerts, baselines, and policy
        verdicts in the requested time range, then produces a
        structured summary. When an LLM is configured, the
        deterministic template output is polished; on any LLM
        failure the template output is returned verbatim. The
        `ai_generated` flag indicates which mode produced the
        response.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AISummarizeRequest" }
