  # --- Device enrollment endpoints ------------------------------------------
  /enroll:
    post:
      tags: [enrollment]
      operationId: enrollDevice
      summary: Redeem a claim token and enroll a device
      description: |
        No auth required — the claim token is the auth. Binds the
        Ed25519 public key to the device and returns a short-lived
        mTLS certificate.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EnrollDeviceRequest" }
      responses:
        "201":
          description: Enrolled
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EnrollDeviceResponse" }
        "400": { $ref: "#/components/responses/Error" }
        "409": { $ref: "#/components/responses/Error" }
  /tenants/{tenant_id}/devices/{id}/refresh-cert:
    post:
      tags: [enrollment]
      operationId: refreshDeviceCert
      summary: Refresh device certificate
      parameters:
        - name: tenant_id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RefreshCertResponse" }
        "403": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
  /tenants/{tenant_id}/devices/{id}/revoke:
    post:
      tags: [enrollment]
      operationId: revokeDevice
      summary: Revoke a device enrollment
      parameters:
        - name: tenant_id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204": { description: Revoked }
        "404": { $ref: "#/components/responses/Error" }
  /tenants/{tenant_id}/devices/{id}/status:
    get:
      tags: [enrollment]
      operationId: getDeviceEnrollmentStatus
      summary: Get device enrollment status
      parameters:
        - name: tenant_id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EnrollmentStatusResponse" }
        "404": { $ref: "#/components/responses/Error" }

components:
  securitySchemes:
    BearerJWT:
      type: http
      scheme: bearer
      bearerFormat: JWT
    APIKey:
      type: apiKey
      in: header
      name: X-SNG-API-Key
  parameters:
    # All tenant-scoped routes use `{tenant_id}` uniformly so the
    # Go router's RequireTenant middleware (which keys off the
    # literal path-segment name `tenant_id`) can be applied with a
    # single MountTenantScoped wrapper. Generated SDKs end up with
    # a consistent `tenant_id` parameter name on every tenant
    # method, including the top-level `/tenants/{tenant_id}` CRUD
    # routes — a previous revision used `{id}` here, which
    # produced confusingly-named `id` parameters on a handful of
    # methods.
    TenantPathID:
      in: path
      name: tenant_id
      required: true
      schema: { type: string, format: uuid }
    ResourceID:
      in: path
      name: id
      required: true
      schema: { type: string, format: uuid }
    MSPPathID:
      in: path
      name: msp_id
      required: true
      schema: { type: string, format: uuid }
    After:
      in: query
      name: after
      schema: { type: string }
    Limit:
      in: query
      name: limit
      schema: { type: integer, minimum: 1, maximum: 200 }
  responses:
    Tenant:
      description: tenant
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Tenant" }
    Site:
      description: site
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Site" }
    Device:
      description: device
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Device" }
    BulkResult:
      description: per-tenant bulk operation result
      content:
        application/json:
          schema: { $ref: "#/components/schemas/MSPBulkResult" }
    Error:
      description: error
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code: { type: string }
            message: { type: string }
            details: { }
    DevicePlatform:
      type: string
      enum: [windows, macos, linux, ios, android]
    TenantCreateRequest:
      type: object
      required: [name, tier]
      properties:
        name: { type: string }
        slug: { type: string }
        region: { type: string }
        tier: { type: string, enum: [starter, professional, enterprise] }
        settings: { type: object }
    TenantUpdateRequest:
      type: object
      properties:
        name: { type: string }
        region: { type: string }
        tier: { type: string, enum: [starter, professional, enterprise] }
        settings: { type: object }
    Tenant:
      type: object
      required: [id, name, slug, status, tier, settings, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        slug: { type: string }
        status: { type: string, enum: [active, suspended, deleted] }
        region: { type: string }
        tier: { type: string, enum: [starter, professional, enterprise] }
        settings: { type: object }
        msp_id:
          type: string
          format: uuid
          description: |
            The owning MSP, if any. Mirrors the denormalised
            `tenants.msp_id` column kept in sync with the
            `msp_tenants` row whose `relationship='owner'`. Omitted
            when the tenant is unmanaged (direct platform customer
            with no MSP owner). See migration 015 for the storage
            rationale and `/msps/{msp_id}/tenants` for the
            authoritative listing surface.
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    SiteCreateRequest:
      type: object
      required: [name]
      properties:
        name: { type: string }
        slug: { type: string }
        template: { type: string, enum: [branch, hub, cloud_only, home_office] }
        config: { type: object }
    SiteUpdateRequest:
      type: object
      properties:
        name: { type: string }
        template: { type: string, enum: [branch, hub, cloud_only, home_office] }
        config: { type: object }
    Site:
      type: object
      required: [id, tenant_id, name, slug, template, config, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        name: { type: string }
        slug: { type: string }
        template: { type: string, enum: [branch, hub, cloud_only, home_office] }
        config: { type: object }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    ClaimToken:
      type: object
      required: [id, token, expires_at]
      properties:
        id: { type: string, format: uuid }
        token: { type: string, description: "plaintext, shown once" }
        expires_at: { type: string, format: date-time }
    DeviceEnrollRequest:
      type: object
      required: [claim_token, name, platform, public_key_ed25519]
      properties:
        claim_token: { type: string }
        name: { type: string }
        platform: { $ref: "#/components/schemas/DevicePlatform" }
        public_key_ed25519: { type: string }
        posture: { type: object }
    Device:
      type: object
      required: [id, tenant_id, name, platform, status, posture, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        site_id: { type: string, format: uuid }
        name: { type: string }
        platform: { $ref: "#/components/schemas/DevicePlatform" }
        public_key_ed25519: { type: string }
        enrolled_at: { type: string, format: date-time }
        last_seen_at: { type: string, format: date-time }
        status: { type: string, enum: [pending, active, retired] }
        posture: { type: object }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    Role:
      type: object
      required: [id, name, permissions, scope]
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        name: { type: string }
        permissions:
          type: array
          items: { type: string }
        scope: { type: string, enum: [platform, msp, tenant, site] }
    RoleCreateRequest:
      type: object
      required: [name, scope, permissions]
      properties:
        name: { type: string }
        scope: { type: string, enum: [platform, msp, tenant, site] }
        permissions:
          type: array
          items: { type: string }
    RoleAssignRequest:
      type: object
      required: [role_id]
      properties:
        role_id: { type: string, format: uuid }
        scope_id: { type: string, format: uuid }
    PolicyGraph:
      type: object
      required: [id, tenant_id, version, graph, created_at]
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        version: { type: integer }
        graph: { type: object }
        compiled_at: { type: string, format: date-time }
        compiler_version: { type: string }
        created_at: { type: string, format: date-time }
    PolicyBundle:
      type: object
      required: [id, policy_graph_id, target_type, created_at]
      properties:
        id: { type: string, format: uuid }
        policy_graph_id: { type: string, format: uuid }
        target_type: { type: string, enum: [edge, endpoint, cloud, mobile] }
        key_id: { type: string, description: stable short id of the signing key }
        bundle: { type: string, description: base64 of MessagePack payload }
        signature: { type: string, description: base64 of Ed25519 signature }
        created_at: { type: string, format: date-time }
    PolicySigningKey:
      type: object
      required: [id, tenant_id, key_id, algorithm, public_key, status, activated_at, created_at]
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        key_id: { type: string }
        algorithm: { type: string, enum: [ed25519] }
        public_key: { type: string, description: base64 of the Ed25519 public key (32 bytes) }
        status: { type: string, enum: [active, rotated, revoked] }
        activated_at: { type: string, format: date-time }
        rotated_at: { type: string, format: date-time }
        revoked_at: { type: string, format: date-time }
        created_at: { type: string, format: date-time }
    PolicyPublicKey:
      type: object
      required: [key_id, algorithm, public_key, status]
      properties:
        key_id: { type: string }
        algorithm: { type: string, enum: [ed25519] }
        public_key: { type: string, description: base64 of the Ed25519 public key (32 bytes) }
        status: { type: string, enum: [active, rotated, revoked] }
    PolicyCompileResult:
      type: object
      required: [graph_id, compiled_at, bundles]
      properties:
        graph_id: { type: string, format: uuid }
        compiled_at: { type: string, format: date-time }
        bundles:
          type: array
          items: { $ref: "#/components/schemas/PolicyBundle" }
    AuditEntry:
      type: object
      required: [id, tenant_id, action, resource_type, created_at]
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        actor_id: { type: string, format: uuid }
        action: { type: string }
        resource_type: { type: string }
        resource_id: { type: string, format: uuid }
        details: { type: object }
        created_at: { type: string, format: date-time }
    WebhookCreateRequest:
      type: object
      required: [url, events]
      properties:
        url: { type: string, format: uri }
        events:
          type: array
          items: { type: string }
    WebhookEndpoint:
      type: object
      required: [id, tenant_id, url, events, status, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        url: { type: string }
        events:
          type: array
          items: { type: string }
        secret: { type: string, description: only returned at create time }
        status: { type: string, enum: [active, disabled] }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    # Integration connector schemas. The Secret payload is
    # write-only: clients POST/PATCH the raw bytes, and the wire
    # response only ever exposes a `secret_set` boolean. This
    # mirrors the webhook signing-secret contract.
    IntegrationConnectorType:
      type: string
      enum: [syslog, siem_webhook, jira, servicenow]
      description: |
        - syslog: emit alert events as RFC 5424 messages
        - siem_webhook: generic JSON webhook for SIEM ingest
        - jira: open a Jira issue per event
        - servicenow: open a ServiceNow incident per event
    IntegrationConnectorStatus:
      type: string
      enum: [active, disabled]
    IntegrationConnectorTestResult:
      type: string
      enum: [never, success, failure]
      description: |
        - never: no test probe has ever been invoked for this connector
        - success: most recent probe succeeded
        - failure: most recent probe failed (see last_test_error)
    IntegrationConnectorCreateRequest:
      type: object
      required: [type, name]
      properties:
        type: { $ref: "#/components/schemas/IntegrationConnectorType" }
        name: { type: string, description: "operator-readable label, e.g. soc-pagerduty-siem" }
        description: { type: string }
        event_types:
          type: array
          description: |
            Event types this connector subscribes to. An empty
            array (or omitting the field entirely) means "match
            every event" — `nil` and `[]` are treated identically
            on CREATE. To restrict the connector to a subset,
            supply the explicit list (e.g. `["alert.created",
            "alert.acknowledged"]`).
          items: { type: string }
        config:
          description: |
            Plugin-specific operator-readable configuration. For
            `syslog`: `{address, transport, app_name, facility}`.
            For `siem_webhook`: `{url}`. For `jira` /
            `servicenow`: `{base_url, project_key | table}`. The
            plugin's Validate() is the source of truth.
          type: object
          additionalProperties: true
        secret:
          description: |
            Opaque plugin-specific secret material (e.g. Jira API
            token, ServiceNow basic-auth blob, SIEM HMAC secret).
            Write-only — never returned in any response. Encoded
            as a base64 string or a structured object depending on
            the plugin; treat as raw bytes.
    IntegrationConnectorUpdateRequest:
      type: object
      description: |
        Partial update. Every field is optional. Omitting
        `event_types` leaves the existing slice untouched (`nil` =
        no change, `[]` = match every event). Blank
        `description` means "no change".
      properties:
        name: { type: string }
        description: { type: string }
        event_types:
          type: array
          items: { type: string }
        config:
          type: object
          additionalProperties: true
        secret:
          description: write-only; setting overwrites the stored secret
    IntegrationConnector:
      type: object
      required:
        - id
        - tenant_id
        - type
        - name
        - event_types
        - secret_set
        - status
        - last_test_result
        - created_at
        - updated_at
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        type: { $ref: "#/components/schemas/IntegrationConnectorType" }
        name: { type: string }
        description: { type: string }
        event_types:
          type: array
          items: { type: string }
        config:
          description: |
            Operator-readable plugin configuration. Decoded back
            from the stored JSON blob; falls back to a raw string
            if the stored blob is not valid JSON.
          type: object
          additionalProperties: true
        secret_set:
          type: boolean
          description: |
            true when a secret is stored. The secret bytes are
            never returned over the wire. To rotate, PATCH a new
            `secret` value.
        status: { $ref: "#/components/schemas/IntegrationConnectorStatus" }
        last_test_result: { $ref: "#/components/schemas/IntegrationConnectorTestResult" }
        last_test_at: { type: string, format: date-time }
        last_test_error:
          type: string
          description: most recent probe failure message; empty after a successful test
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    IntegrationDeliveryStatus:
      type: string
      enum: [pending, processing, delivered, failed, exhausted]
      description: |
        - pending: queued, no attempt yet (or backed off after
          transient failure)
        - processing: claimed by a worker via SKIP LOCKED
        - delivered: terminal — the connector accepted the payload
        - failed: a single attempt failed; will retry if attempts
          < max_attempts, else transitions to exhausted
        - exhausted: terminal — exhausted retries, operator-visible
          failure that needs manual triage
    IntegrationDelivery:
      type: object
      required:
        - id
        - tenant_id
        - connector_id
        - event_type
        - status
        - attempts
        - next_retry_at
        - created_at
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        connector_id: { type: string, format: uuid }
        event_type: { type: string, description: "logical event class, e.g. alert.created" }
        status: { $ref: "#/components/schemas/IntegrationDeliveryStatus" }
        attempts: { type: integer, minimum: 0 }
        last_attempt_at: { type: string, format: date-time }
        last_error: { type: string }
        next_retry_at:
          type: string
          format: date-time
          description: when the worker will reconsider this row
        response_status:
          type: integer
          description: |
            HTTP status returned by the destination on the most
            recent attempt. Omitted for transports without an HTTP
            layer (syslog) and on rows that have never been
            attempted.
        external_reference:
          type: string
          description: |
            Connector-supplied identifier (Jira issue key,
            ServiceNow incident number, etc.) recorded once the
            destination accepts the payload.
        created_at: { type: string, format: date-time }
    MSPStatus:
      type: string
      enum: [active, suspended, deleted]
      description: |
        Lifecycle states for an MSP. `deleted` is the soft-delete
        terminal state — the row stays in the table; only the
        cascade clears `tenants.msp_id` pointers for the cohort.
    MSPCreateStatus:
      type: string
      enum: [active, suspended]
      description: |
        Status values accepted on POST `/api/v1/msps` and PATCH
        `/api/v1/msps/{msp_id}`. The terminal `deleted` state is
        intentionally excluded so generated SDK enums match the
        handler validator: callers wanting to soft-delete an MSP
        must use DELETE `/api/v1/msps/{msp_id}` or POST
        `/api/v1/msps/{msp_id}/status` with status="deleted"
        (whose dedicated MSPStatus enum covers the full
        lifecycle), both of which fire the cascade that clears
        `tenants.msp_id`. Posting status="deleted" via Create or
        PATCH would land an inconsistent (status='deleted',
        deleted_at=NULL) row, which the handler rejects with 400
        invalid_param. Round-13 of Devin Review on PR #42 caught
        the SDK divergence: previously both bodies referenced
        the full MSPStatus enum, so generated clients saw
        `deleted` as legal at Create/PATCH and only discovered
        the restriction at runtime.
    MSPRelationship:
      type: string
      enum: [owner, co_manager]
      description: |
        Distinguishes the primary owner from co-managers in the
        msp_tenants join. At most one `owner` per tenant — the
        partial UNIQUE index in migration 015 enforces it.
    MSPBranding:
      type: object
      description: |
        Shared visual identity an MSP applies to its tenant
        cohort. All fields are optional in the source object;
        when surfaced via `GET /tenants/{tenant_id}/branding`
        every field is guaranteed populated by the resolver.
      properties:
        logo_url: { type: string }
        primary_color: { type: string }
        secondary_color: { type: string }
        custom_domain: { type: string }
        portal_support_to: { type: string }
    MSP:
      type: object
      required: [id, name, slug, status, branding, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        slug: { type: string }
        status: { $ref: "#/components/schemas/MSPStatus" }
        branding: { $ref: "#/components/schemas/MSPBranding" }
        settings:
          type: object
          additionalProperties: true
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    MSPCreateRequest:
      type: object
      required: [name, slug]
      properties:
        name: { type: string }
        slug: { type: string }
        status: { $ref: "#/components/schemas/MSPCreateStatus" }
        branding: { $ref: "#/components/schemas/MSPBranding" }
        settings:
          type: object
          additionalProperties: true
    MSPPatchRequest:
      type: object
      description: |
        Pointer-shaped sparse PATCH. Omitting a field leaves the
        corresponding column untouched. Supplying a field as
        its zero value clears it.
      properties:
        name: { type: string }
        slug: { type: string }
        status: { $ref: "#/components/schemas/MSPCreateStatus" }
        branding: { $ref: "#/components/schemas/MSPBranding" }
        settings:
          type: object
          additionalProperties: true
    MSPTenantBinding:
      type: object
      required: [msp_id, tenant_id, relationship, created_at]
      properties:
        msp_id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        relationship: { $ref: "#/components/schemas/MSPRelationship" }
        created_at: { type: string, format: date-time }
    MSPAssignTenantRequest:
      type: object
      properties:
        relationship: { $ref: "#/components/schemas/MSPRelationship" }
      description: |
        Optional body. When omitted, the binding defaults to
        `owner` and cascades to set `tenants.msp_id`.
    MSPBulkOutcome:
      type: object
      required: [tenant_id]
      properties:
        tenant_id: { type: string, format: uuid }
        error:
          type: string
          description: per-tenant failure message; omitted on success
        policy_version:
          type: integer
          description: new policy graph version (ApplyPolicyTemplate only)
        site_id:
          type: string
          format: uuid
          description: provisioned site id (BulkProvisionSites only)
        claim_tokens:
          type: array
          items: { type: string }
          description: |
            plaintext claim tokens issued (BulkGenerateClaimTokens
            only). Captured ONCE in this response; never
            persisted in plaintext anywhere else.
    MSPBulkResult:
      type: object
      required: [successes, failures, started_at, ended_at]
      properties:
        successes:
          type: array
          items: { $ref: "#/components/schemas/MSPBulkOutcome" }
        failures:
          type: array
          items: { $ref: "#/components/schemas/MSPBulkOutcome" }
        started_at: { type: string, format: date-time }
        ended_at: { type: string, format: date-time }
    APIKeyCreateRequest:
      type: object
      required: [name, subject]
      properties:
        name: { type: string, description: "human-readable label, e.g. ci-prod" }
        subject: { type: string, description: "stable identity injected into auth context, e.g. bot:ci" }
        expires_at:
          type: string
          format: date-time
          description: optional RFC3339 absolute deadline; omit for non-expiring
    APIKey:
      type: object
      required: [id, tenant_id, name, subject, status, created_at]
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        name: { type: string }
        subject: { type: string }
        status: { type: string, enum: [active, revoked] }
        expires_at: { type: string, format: date-time }
        last_used_at: { type: string, format: date-time }
        created_by: { type: string, format: uuid }
        created_at: { type: string, format: date-time }
        revoked_at: { type: string, format: date-time }
        plaintext: { type: string, description: only returned on create }
    AppRegistry:
      type: object
      required: [id, name, traffic_class, scope, domains, is_system, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        vendor: { type: string }
        traffic_class:
          type: string
          enum: [trusted_direct, trusted_media_bypass, inspect_lite, inspect_full, tunnel_private, block]
        scope: { type: string, enum: [global, regional] }
        regions:
          type: array
          items: { type: string }
        domains:
          type: array
          items: { type: string }
        ip_ranges:
          type: array
          items: { type: string }
        cert_pins:
          type: array
          items: { type: string }
        metadata_url: { type: string }
        category: { type: string }
        is_system: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    AppRegistryRequest:
      type: object
      description: |
        Create / update body for the global app catalog.

        Optional scalar fields (`vendor`, `metadata_url`, `category`)
        follow PUT-replacement semantics: omitting the field from
        the JSON body inherits the existing value (or leaves it
        empty on create), while setting the field to an empty
        string explicitly clears it. This lets clients fully
        replace an entry on PUT without having to delete and
        recreate it.
      required: [name, traffic_class, scope, domains]
      properties:
        name: { type: string }
        vendor:
          type: string
          description: |
            Vendor name. Send `""` on PUT to clear; omit to
            inherit the existing value.
        traffic_class:
          type: string
          enum: [trusted_direct, trusted_media_bypass, inspect_lite, inspect_full, tunnel_private, block]
        scope: { type: string, enum: [global, regional] }
        regions:
          type: array
          items: { type: string }
        domains:
          type: array
          items: { type: string }
        ip_ranges:
          type: array
          items: { type: string }
        cert_pins:
          type: array
          items: { type: string }
        metadata_url:
          type: string
          description: |
            Vendor-published endpoint document URL (auto-sync
            source). Send `""` on PUT to clear; omit to inherit.
        category:
          type: string
          description: |
            Category label. Send `""` on PUT to clear; omit to
            inherit.
        is_system: { type: boolean }
    AppRegistryOverride:
      type: object
      required: [id, tenant_id, traffic_class_override, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        app_id: { type: string, format: uuid, description: "set when override targets a global app entry" }
        custom_domains:
          type: array
          items: { type: string }
          description: "set when override targets domains not present in the global catalog"
        traffic_class_override:
          type: string
          enum: [trusted_direct, trusted_media_bypass, inspect_lite, inspect_full, tunnel_private, block]
        reason: { type: string }
        expires_at: { type: string, format: date-time, description: "TTL-based auto-cleanup; omit for permanent" }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    AppRegistryOverrideRequest:
      type: object
      required: [traffic_class_override]
      description: |
        Exactly one of `app_id` or `custom_domains` must be set.
        - `app_id` references an entry in the global `app_registry`.
        - `custom_domains` defines a tenant-local pattern list for
          apps that are not in the global catalog.
        Supplying neither (or both) returns 400
        `invalid_override_target`. Empty / whitespace-only
        custom-domain entries return 400 `invalid_custom_domain`
        because they would never match any flow and would install
        a silently-dead override.
      properties:
        app_id: { type: string, format: uuid }
        custom_domains:
          type: array
          items: { type: string }
        traffic_class_override:
          type: string
          enum: [trusted_direct, trusted_media_bypass, inspect_lite, inspect_full, tunnel_private, block]
        reason: { type: string }
        expires_at: { type: string, format: date-time }
    EffectiveApp:
      type: object
      required: [app, effective_class, source]
      properties:
        app: { $ref: "#/components/schemas/AppRegistry" }
        effective_class:
          type: string
          enum: [trusted_direct, trusted_media_bypass, inspect_lite, inspect_full, tunnel_private, block]
        source: { type: string, enum: [global, override] }
        override_id: { type: string, format: uuid }
        override_expires_at: { type: string, format: date-time }
        override_reason: { type: string }
    TrafficClassStat:
      type: object
      required: [class, events, bytes]
      properties:
        class: { type: string }
        events: { type: integer, format: int64 }
        bytes: { type: integer, format: int64 }
    SyncResult:
      type: object
      required: [app_id, app_name, metadata_url]
      properties:
        app_id: { type: string, format: uuid }
        app_name: { type: string }
        metadata_url: { type: string }
        domains_before: { type: integer }
        domains_after: { type: integer }
        ip_ranges_before: { type: integer }
        ip_ranges_after: { type: integer }
        updated: { type: boolean }
        error: { type: string }
    BaselineModel:
      type: object
      required:
        - id
        - tenant_id
        - dimension
        - window_seconds
        - samples
        - mean
        - stddev
        - ewma
        - ewma_stddev
        - alpha
        - z_threshold
        - created_at
        - version
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        dimension: { type: string }
        window_seconds: { type: integer, format: int64 }
        samples: { type: integer, format: int64 }
        mean: { type: number, format: double }
        stddev: { type: number, format: double }
        ewma: { type: number, format: double }
        ewma_stddev: { type: number, format: double }
        alpha: { type: number, format: double }
        z_threshold: { type: number, format: double }
        last_observed_at: { type: string, format: date-time }
        last_updated_at: { type: string, format: date-time }
        created_at: { type: string, format: date-time }
        version: { type: integer, format: int64 }
    Alert:
      type: object
      required:
        - id
        - tenant_id
        - kind
        - severity
        - dimension
        - observed_value
        - baseline_mean
        - baseline_stddev
        - z_score
        - window_start
        - window_end
        - window_seconds
        - summary
        - state
        - created_at
        - updated_at
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        kind: { type: string, description: "Detector kind, e.g. baseline_zscore_anomaly." }
        severity: { type: string, enum: [info, warning, critical] }
        dimension: { type: string, description: "Baseline dimension the alert was generated against." }
        observed_value: { type: number, format: double, description: "Observation that tripped the detector." }
        baseline_mean: { type: number, format: double }
        baseline_stddev: { type: number, format: double }
        z_score:
          description: max(|z_welford|, |z_ewma|) — the deviation score that tripped the detector
          type: number
          format: double
        window_start: { type: string, format: date-time }
        window_end: { type: string, format: date-time }
        window_seconds:
          type: integer
          minimum: 1
          description: "Baseline window size (in seconds) the alert was generated against. Identifies which (dimension, window_seconds) baseline bucket emitted this alert — the same dimension can have multiple buckets (e.g. 60 vs 3600)."
        summary: { type: string, description: "Human-readable rationale string the detector emitted with the alert." }
        evidence:
          description: "Detector-supplied JSON payload (statistical context, thresholds, etc.)."
          type: object
          additionalProperties: true
        state: { type: string, enum: [open, acknowledged, resolved, suppressed] }
        suppressed_by: { type: string, format: uuid, description: "Suppression rule ID that auto-routed this alert to the suppressed state, if any." }
        acknowledged_by: { type: string, format: uuid }
        acknowledged_at: { type: string, format: date-time }
        resolved_by: { type: string, format: uuid }
        resolved_at: { type: string, format: date-time }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    AlertSuppression:
      type: object
      required: [id, tenant_id, reason, created_at]
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        kind:
          type: string
          description: "Alert kind matched by this rule. Either kind or dimension (or both) is set; nil means match any kind within the supplied dimension."
        dimension:
          type: string
          description: "Baseline dimension matched by this rule. Either kind or dimension (or both) is set; nil means match any dimension within the supplied kind."
        reason: { type: string }
        created_by:
          type: string
          format: uuid
          description: "Operator who created the rule. Derived from the JWT sub / API-key owner server-side."
        created_at: { type: string, format: date-time }
        expires_at: { type: string, format: date-time }
    AlertFeedback:
      type: object
      required: [id, alert_id, tenant_id, decision, created_at]
      properties:
        id: { type: string, format: uuid }
        alert_id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        decision: { type: string, enum: [true_positive, false_positive, noise] }
        notes: { type: string }
        created_by:
          type: string
          format: uuid
          description: "Operator who recorded the feedback. Derived from the JWT sub / API-key owner server-side — clients must not set this."
        created_at: { type: string, format: date-time }
    # --- SCIM schemas --------------------------------------------------------
    SCIMUser:
      type: object
      required: [schemas, userName]
      properties:
        schemas:
          type: array
          items: { type: string }
        id: { type: string, format: uuid }
        externalId: { type: string }
        userName: { type: string }
        name:
          type: object
          properties:
            formatted: { type: string }
            familyName: { type: string }
            givenName: { type: string }
        displayName: { type: string }
        emails:
          type: array
          items:
            type: object
            properties:
              value: { type: string }
              type: { type: string }
              primary: { type: boolean }
        active: { type: boolean }
        meta:
          type: object
          properties:
            resourceType: { type: string }
            created: { type: string, format: date-time }
            lastModified: { type: string, format: date-time }
            location: { type: string }
    SCIMGroup:
      type: object
      required: [schemas, displayName]
      properties:
        schemas:
          type: array
          items: { type: string }
        id: { type: string, format: uuid }
        externalId: { type: string }
        displayName: { type: string }
        members:
          type: array
          items:
            type: object
            properties:
              value: { type: string }
              display: { type: string }
              $ref: { type: string }
        meta:
          type: object
          properties:
            resourceType: { type: string }
            created: { type: string, format: date-time }
            lastModified: { type: string, format: date-time }
            location: { type: string }
    SCIMListResponse:
      type: object
      required: [schemas, totalResults, startIndex, itemsPerPage, Resources]
      properties:
        schemas:
          type: array
          items: { type: string }
        totalResults: { type: integer }
        startIndex: { type: integer }
        itemsPerPage: { type: integer }
        Resources:
          type: array
          items: { type: object }
    SCIMPatchRequest:
      type: object
      required: [schemas, Operations]
      properties:
        schemas:
          type: array
          items: { type: string }
        Operations:
          type: array
          items:
            type: object
            required: [op]
            properties:
              op: { type: string, enum: [add, remove, replace] }
              path: { type: string }
              value: {}
    SCIMError:
      type: object
      required: [schemas, status]
      properties:
        schemas:
          type: array
          items: { type: string }
        status: { type: string }
        scimType: { type: string }
        detail: { type: string }
    # --- Enrollment schemas --------------------------------------------------
    EnrollDeviceRequest:
      type: object
      required: [claim_token, tenant_id, device_id, public_key_ed25519]
      properties:
        claim_token: { type: string }
        tenant_id: { type: string, format: uuid }
        device_id: { type: string, format: uuid }
        public_key_ed25519: { type: string, description: "Base64-encoded Ed25519 public key (32 bytes)" }
    EnrollDeviceResponse:
      type: object
      required: [device_id, tenant_id, status, cert_pem, expires_at]
      properties:
        device_id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        status: { type: string, enum: [enrolled, active, revoked] }
        cert_pem: { type: string }
        expires_at: { type: string, format: date-time }
    RefreshCertResponse:
      type: object
      required: [cert_pem, expires_at]
      properties:
        cert_pem: { type: string }
        expires_at: { type: string, format: date-time }
    EnrollmentStatusResponse:
      type: object
      required: [device_id, tenant_id, status, enrolled_at]
      properties:
        device_id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        status: { type: string, enum: [enrolled, active, revoked] }
        enrolled_at: { type: string, format: date-time }
        last_cert_issued_at: { type: string, format: date-time }
        revoked_at: { type: string, format: date-time }
