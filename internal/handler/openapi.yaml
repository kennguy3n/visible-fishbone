openapi: 3.1.0
info:
  title: ShieldNet Gateway Control Plane API
  description: |
    REST API for ShieldNet Gateway (SNG) — multi-tenant control plane.
    All operator endpoints are mounted under `/api/v1`. Auth is
    either a bearer JWT (operator console) or `X-SNG-API-Key`
    (machine-to-machine).
  version: "0.1.0"
  contact:
    name: ShieldNet Gateway Team
servers:
  - url: https://control.shieldnet.example/api/v1
    description: Production
  - url: http://localhost:8080/api/v1
    description: Local dev
security:
  - BearerJWT: []
  - APIKey: []
tags:
  - name: tenants
  - name: sites
  - name: devices
  - name: rbac
  - name: policy
  - name: audit
  - name: webhooks
paths:
  /tenants:
    post:
      tags: [tenants]
      operationId: createTenant
      summary: Create a tenant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TenantCreateRequest"
      responses:
        "201": { $ref: "#/components/responses/Tenant" }
        "400": { $ref: "#/components/responses/Error" }
        "409": { $ref: "#/components/responses/Error" }
    get:
      tags: [tenants]
      operationId: listTenants
      summary: List tenants
      parameters:
        - $ref: "#/components/parameters/After"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: page of tenants
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/Tenant" }
                  next_cursor: { type: string }
  /tenants/{tenant_id}:
    parameters: [ { $ref: "#/components/parameters/TenantPathID" } ]
    get:
      tags: [tenants]
      operationId: getTenant
      summary: Get tenant by id
      responses:
        "200": { $ref: "#/components/responses/Tenant" }
        "404": { $ref: "#/components/responses/Error" }
    patch:
      tags: [tenants]
      operationId: updateTenant
      summary: Update tenant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TenantUpdateRequest"
      responses:
        "200": { $ref: "#/components/responses/Tenant" }
    delete:
      tags: [tenants]
      operationId: deleteTenant
      summary: Soft-delete tenant
      responses:
        "204": { description: deleted }
  /tenants/{tenant_id}/suspend:
    parameters: [ { $ref: "#/components/parameters/TenantPathID" } ]
    post:
      tags: [tenants]
      operationId: suspendTenant
      summary: Suspend tenant
      responses:
        "200": { $ref: "#/components/responses/Tenant" }
  /tenants/{tenant_id}/sites:
    parameters: [ { $ref: "#/components/parameters/TenantPathID" } ]
    get:
      tags: [sites]
      operationId: listSites
      summary: List sites
      responses:
        "200":
          description: page of sites
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/Site" }
                  next_cursor: { type: string }
    post:
      tags: [sites]
      operationId: createSite
      summary: Create site
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SiteCreateRequest" }
      responses:
        "201": { $ref: "#/components/responses/Site" }
  /tenants/{tenant_id}/sites/{id}:
    parameters:
      - $ref: "#/components/parameters/TenantPathID"
      - $ref: "#/components/parameters/ResourceID"
    get:
      tags: [sites]
      operationId: getSite
      summary: Get site
      responses:
        "200": { $ref: "#/components/responses/Site" }
    patch:
      tags: [sites]
      operationId: updateSite
      summary: Update site
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SiteUpdateRequest" }
      responses:
        "200": { $ref: "#/components/responses/Site" }
    delete:
      tags: [sites]
      operationId: deleteSite
      summary: Delete site
      responses:
        "204": { description: deleted }
  /tenants/{tenant_id}/claim-tokens:
    parameters: [ { $ref: "#/components/parameters/TenantPathID" } ]
    post:
      tags: [devices]
      operationId: createClaimToken
      summary: Generate a single-use claim token for device enrolment
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                ttl_seconds: { type: integer, minimum: 60 }
      responses:
        "201":
          description: token created (plaintext returned once)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ClaimToken" }
  /tenants/{tenant_id}/devices/enroll:
    parameters: [ { $ref: "#/components/parameters/TenantPathID" } ]
    post:
      tags: [devices]
      operationId: enrollDevice
      summary: Redeem claim token and enrol a device
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DeviceEnrollRequest" }
      responses:
        "201": { $ref: "#/components/responses/Device" }
        "404": { $ref: "#/components/responses/Error" }
  /tenants/{tenant_id}/devices:
    parameters: [ { $ref: "#/components/parameters/TenantPathID" } ]
    get:
      tags: [devices]
      operationId: listDevices
      summary: List enrolled devices
      parameters:
        - in: query
          name: platform
          schema: { $ref: "#/components/schemas/DevicePlatform" }
        - in: query
          name: status
          schema: { type: string, enum: [pending, active, retired] }
        - in: query
          name: site_id
          schema: { type: string, format: uuid }
        - $ref: "#/components/parameters/After"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: page of devices
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/Device" }
                  next_cursor: { type: string }
  /tenants/{tenant_id}/devices/{id}:
    parameters:
      - $ref: "#/components/parameters/TenantPathID"
      - $ref: "#/components/parameters/ResourceID"
    get:
      tags: [devices]
      operationId: getDevice
      summary: Get device by id
      responses:
        "200": { $ref: "#/components/responses/Device" }
  /tenants/{tenant_id}/roles:
    parameters: [ { $ref: "#/components/parameters/TenantPathID" } ]
    get:
      tags: [rbac]
      operationId: listRoles
      summary: List roles
      responses:
        "200":
          description: roles
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/Role" }
    post:
      tags: [rbac]
      operationId: createRole
      summary: Create custom role
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RoleCreateRequest" }
      responses:
        "201":
          description: created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Role" }
  /tenants/{tenant_id}/users/{user_id}/roles:
    parameters:
      - $ref: "#/components/parameters/TenantPathID"
      - in: path
        name: user_id
        required: true
        schema: { type: string, format: uuid }
    post:
      tags: [rbac]
      operationId: assignUserRole
      summary: Assign role to user
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RoleAssignRequest" }
      responses:
        "204": { description: assigned }
  /tenants/{tenant_id}/users/{user_id}/roles/{role_id}:
    parameters:
      - $ref: "#/components/parameters/TenantPathID"
      - in: path
        name: user_id
        required: true
        schema: { type: string, format: uuid }
      - in: path
        name: role_id
        required: true
        schema: { type: string, format: uuid }
    delete:
      tags: [rbac]
      operationId: revokeUserRole
      summary: Revoke role
      responses:
        "204": { description: revoked }
  /tenants/{tenant_id}/policy:
    parameters: [ { $ref: "#/components/parameters/TenantPathID" } ]
    get:
      tags: [policy]
      operationId: getPolicyGraph
      summary: Get latest policy graph
      responses:
        "200":
          description: graph
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PolicyGraph" }
    put:
      tags: [policy]
      operationId: updatePolicyGraph
      summary: Publish a new policy graph version
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        "201":
          description: graph
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PolicyGraph" }
  /tenants/{tenant_id}/policy/compile:
    parameters: [ { $ref: "#/components/parameters/TenantPathID" } ]
    post:
      tags: [policy]
      operationId: compilePolicyBundles
      summary: Compile the latest graph into signed bundles
      responses:
        "202":
          description: compile result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PolicyCompileResult" }
  /tenants/{tenant_id}/policy/bundles/{target_type}:
    parameters:
      - $ref: "#/components/parameters/TenantPathID"
      - in: path
        name: target_type
        required: true
        schema:
          type: string
          enum: [edge, endpoint, cloud, mobile]
    get:
      tags: [policy]
      operationId: getPolicyBundleMetadata
      summary: Fetch latest signed bundle for a target
      responses:
        "200":
          description: bundle (bytes are base64-encoded)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PolicyBundle" }
  /tenants/{tenant_id}/policy/bundles/{target_type}/payload:
    parameters:
      - $ref: "#/components/parameters/TenantPathID"
      - in: path
        name: target_type
        required: true
        schema:
          type: string
          enum: [edge, endpoint, cloud, mobile]
    get:
      tags: [policy]
      operationId: getPolicyBundlePayload
      summary: Download the raw signed bundle payload (agent-pull)
      description: |
        Returns the MessagePack-encoded bundle bytes for agent
        consumption. The Ed25519 signature is delivered in the
        `X-Sng-Policy-Signature` response header (base64) and the
        signing key id in `X-Sng-Policy-Key-Id` so the agent can
        fetch the matching public key from the publication
        endpoint. Supports `If-None-Match` against the strong
        ETag (`sha256(bundle)`) for cache validation.
      parameters:
        - in: header
          name: If-None-Match
          schema: { type: string }
      responses:
        "200":
          description: bundle bytes
          headers:
            ETag:
              schema: { type: string }
              description: Strong validator (sha256 of bundle bytes).
            X-Sng-Policy-Signature:
              schema: { type: string }
              description: Base64-encoded Ed25519 signature over the bundle bytes.
            X-Sng-Policy-Key-Id:
              schema: { type: string }
              description: Stable short id of the signing key.
            X-Sng-Policy-Bundle-Id:
              schema: { type: string }
            X-Sng-Policy-Graph-Id:
              schema: { type: string }
          content:
            application/vnd.sng.policy-bundle:
              schema: { type: string, format: binary }
        "304":
          description: bundle unchanged (ETag matched If-None-Match)
    head:
      tags: [policy]
      operationId: headPolicyBundlePayload
      summary: Probe latest bundle ETag without transferring bytes
      responses:
        "200":
          description: bundle metadata in headers
  /tenants/{tenant_id}/policy/signing-keys:
    parameters: [ { $ref: "#/components/parameters/TenantPathID" } ]
    get:
      tags: [policy]
      operationId: listPolicySigningKeys
      summary: List the tenant's signing-key rotation history
      responses:
        "200":
          description: page of signing keys
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/PolicySigningKey" }
  /tenants/{tenant_id}/policy/signing-keys/rotate:
    parameters: [ { $ref: "#/components/parameters/TenantPathID" } ]
    post:
      tags: [policy]
      operationId: rotatePolicySigningKey
      summary: Provision an initial key, or rotate the current active key
      responses:
        "200":
          description: rotated key (active key existed)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PolicySigningKey" }
        "201":
          description: created key (no active key existed)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PolicySigningKey" }
  /tenants/{tenant_id}/policy/signing-keys/{key_id}/revoke:
    parameters:
      - $ref: "#/components/parameters/TenantPathID"
      - in: path
        name: key_id
        required: true
        schema: { type: string }
    post:
      tags: [policy]
      operationId: revokePolicySigningKey
      summary: Revoke a signing key
      responses:
        "200":
          description: revoked key
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PolicySigningKey" }
  /tenants/{tenant_id}/policy/signing-keys/{key_id}/public-key:
    parameters:
      - $ref: "#/components/parameters/TenantPathID"
      - in: path
        name: key_id
        required: true
        schema: { type: string, description: "key_id or the literal 'active'" }
    get:
      tags: [policy]
      operationId: getPolicySigningKeyPublic
      summary: Publish a signing key's public half for bundle verification
      description: |
        Returns the public half of the signing key that produced a
        given bundle's `kid`. Receivers verifying a bundle pulled
        from this tenant resolve the `kid` here.

        When the deployment is running in file-backed signing mode
        (POLICY_SIGNING_KEY_PATH set), the file-backed signer's kid
        and the literal 'active' both resolve to the same uniform
        key for every tenant — the file-backed signer is
        process-global. The same response (key_id, public_key,
        status='active') is returned across all tenant scopes.
        Other key_ids fall through to the DB-backed rotation history
        so historical (pre-file-backed) bundles still resolve.
      responses:
        "200":
          description: public key
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PolicyPublicKey" }
  /tenants/{tenant_id}/audit-log:
    parameters: [ { $ref: "#/components/parameters/TenantPathID" } ]
    get:
      tags: [audit]
      operationId: listAuditLog
      summary: List audit entries (append-only)
      parameters:
        - in: query
          name: resource_type
          schema: { type: string }
        - in: query
          name: action
          schema: { type: string }
        - in: query
          name: actor_id
          schema: { type: string, format: uuid }
        - in: query
          name: from
          schema: { type: string, format: date-time }
        - in: query
          name: to
          schema: { type: string, format: date-time }
        - $ref: "#/components/parameters/After"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: page of audit entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/AuditEntry" }
                  next_cursor: { type: string }
  /tenants/{tenant_id}/webhooks:
    parameters: [ { $ref: "#/components/parameters/TenantPathID" } ]
    post:
      tags: [webhooks]
      operationId: createWebhook
      summary: Register an outbound webhook endpoint
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/WebhookCreateRequest" }
      responses:
        "201":
          description: registered (secret returned once)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WebhookEndpoint" }
    get:
      tags: [webhooks]
      operationId: listWebhooks
      summary: List webhook endpoints
      responses:
        "200":
          description: list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/WebhookEndpoint" }
  /tenants/{tenant_id}/webhooks/{id}:
    parameters:
      - $ref: "#/components/parameters/TenantPathID"
      - $ref: "#/components/parameters/ResourceID"
    delete:
      tags: [webhooks]
      operationId: deleteWebhook
      summary: Unregister webhook
      responses:
        "204": { description: removed }
  /tenants/{tenant_id}/api-keys:
    parameters: [ { $ref: "#/components/parameters/TenantPathID" } ]
    post:
      tags: [api-keys]
      operationId: createApiKey
      summary: Mint a tenant API key
      description: |
        Creates a new tenant-scoped API key. The plaintext secret is
        returned in the response body of THIS request only — it is
        never persisted in plaintext and cannot be recovered. The
        operator is expected to surface it to the human owner
        immediately and discard it.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/APIKeyCreateRequest" }
      responses:
        "201":
          description: minted (plaintext returned once)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/APIKey" }
        "429":
          description: |
            tenant has reached the per-tenant active-key cap; the
            response body carries `error.code = "resource_exhausted"`
            with a human-readable message identifying the current
            count and the cap. Callers should revoke unused keys
            or escalate to the platform owner to raise the cap
            (configured via AUTH_API_KEY_MAX_ACTIVE_PER_TENANT).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    get:
      tags: [api-keys]
      operationId: listApiKeys
      summary: List tenant API keys
      responses:
        "200":
          description: list (plaintext omitted)
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/APIKey" }
  /tenants/{tenant_id}/api-keys/{id}:
    parameters:
      - $ref: "#/components/parameters/TenantPathID"
      - $ref: "#/components/parameters/ResourceID"
    get:
      tags: [api-keys]
      operationId: getApiKey
      summary: Get tenant API key metadata
      responses:
        "200":
          description: api key
          content:
            application/json:
              schema: { $ref: "#/components/schemas/APIKey" }
    delete:
      tags: [api-keys]
      operationId: deleteApiKey
      summary: Revoke tenant API key
      responses:
        "204": { description: revoked }
  /tenants/{tenant_id}/app-registry:
    parameters:
      - $ref: "#/components/parameters/TenantPathID"
    get:
      tags: [app-registry]
      operationId: listTenantAppRegistry
      summary: List effective app classifications (global + tenant overrides)
      responses:
        "200":
          description: effective classifications
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/EffectiveApp" }
  /tenants/{tenant_id}/app-registry/overrides:
    parameters:
      - $ref: "#/components/parameters/TenantPathID"
    get:
      tags: [app-registry]
      operationId: listTenantAppRegistryOverrides
      summary: List tenant app-classification overrides
      responses:
        "200":
          description: overrides
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/AppRegistryOverride" }
                  next_cursor: { type: string }
    post:
      tags: [app-registry]
      operationId: createTenantAppRegistryOverride
      summary: Create a tenant override (promote / demote an app or custom domain)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AppRegistryOverrideRequest" }
      responses:
        "201":
          description: created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AppRegistryOverride" }
  /tenants/{tenant_id}/app-registry/overrides/{id}:
    parameters:
      - $ref: "#/components/parameters/TenantPathID"
      - $ref: "#/components/parameters/ResourceID"
    delete:
      tags: [app-registry]
      operationId: deleteTenantAppRegistryOverride
      summary: Remove a tenant override
      responses:
        "204": { description: removed }
  /tenants/{tenant_id}/app-registry/stats:
    parameters:
      - $ref: "#/components/parameters/TenantPathID"
    get:
      tags: [app-registry]
      operationId: getTenantAppRegistryStats
      summary: Per-class traffic distribution from telemetry
      description: |
        Returns the per-class event / byte distribution over a
        time window. The window's lower bound can be specified
        in one of two mutually-exclusive ways: `window_hours`
        (relative) or `since` (absolute RFC3339 timestamp).
        Passing both yields HTTP 400 `conflicting_window`. When
        neither is set, the window defaults to the trailing 7
        days.
      parameters:
        - name: window_hours
          in: query
          description: |
            Trailing window size in hours. Mutually exclusive
            with `since`.
          schema: { type: integer, minimum: 1 }
        - name: since
          in: query
          description: |
            Absolute lower bound (inclusive) for the window.
            Mutually exclusive with `window_hours`.
          schema: { type: string, format: date-time }
      responses:
        "200":
          description: per-class distribution
          content:
            application/json:
              schema:
                type: object
                properties:
                  since: { type: string, format: date-time }
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/TrafficClassStat" }
        "400":
          description: conflicting_window — both since and window_hours supplied
        "503":
          description: telemetry pipeline disabled
  /admin/app-registry:
    get:
      tags: [admin, app-registry]
      operationId: adminListAppRegistry
      summary: List global app catalog entries
      responses:
        "200":
          description: catalog
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/AppRegistry" }
                  next_cursor: { type: string }
    post:
      tags: [admin, app-registry]
      operationId: adminCreateAppRegistry
      summary: Create a global app entry
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AppRegistryRequest" }
      responses:
        "201":
          description: created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AppRegistry" }
  /admin/app-registry/{id}:
    parameters:
      - $ref: "#/components/parameters/ResourceID"
    put:
      tags: [admin, app-registry]
      operationId: adminUpdateAppRegistry
      summary: Update a global app entry
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AppRegistryRequest" }
      responses:
        "200":
          description: updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AppRegistry" }
    delete:
      tags: [admin, app-registry]
      operationId: adminDeleteAppRegistry
      summary: Delete a global app entry
      responses:
        "204": { description: deleted }
  /admin/app-registry/sync:
    post:
      tags: [admin, app-registry]
      operationId: adminSyncAppRegistry
      summary: Trigger vendor-endpoint sync (Microsoft / Google / AWS / generic)
      responses:
        "200":
          description: sync results (one row per app with metadata_url)
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items: { $ref: "#/components/schemas/SyncResult" }
        "503":
          description: vendor sync not configured
  /tenants/{tenant_id}/baselines:
    parameters:
      - $ref: "#/components/parameters/TenantPathID"
    get:
      tags: [baseline]
      operationId: listBaselineModels
      summary: List baseline statistical models for the tenant
      description: |
        Returns one row per (dimension, window) currently
        modelled. Each row carries Welford + EWMA state plus
        the configured z-score threshold used by the anomaly
        detector.
      parameters:
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 200 }
        - name: cursor
          in: query
          schema: { type: string }
      responses:
        "200":
          description: page of baseline models
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/BaselineModel" }
                  next_cursor: { type: string }
  /tenants/{tenant_id}/baselines/{dimension}/{window_seconds}:
    parameters:
      - $ref: "#/components/parameters/TenantPathID"
      - name: dimension
        in: path
        required: true
        schema: { type: string }
      - name: window_seconds
        in: path
        required: true
        schema: { type: integer, minimum: 1 }
    get:
      tags: [baseline]
      operationId: getBaselineModel
      summary: Fetch a single baseline model
      responses:
        "200":
          description: baseline model
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BaselineModel" }
        "404":
          description: model not found
  /tenants/{tenant_id}/baselines/{dimension}/{window_seconds}/threshold:
    parameters:
      - $ref: "#/components/parameters/TenantPathID"
      - name: dimension
        in: path
        required: true
        schema: { type: string }
      - name: window_seconds
        in: path
        required: true
        schema: { type: integer, minimum: 1 }
    put:
      tags: [baseline]
      operationId: updateBaselineThreshold
      summary: Override the z-score threshold for this baseline
      description: |
        Threshold updates take effect on the next anomaly
        evaluation; the in-flight observation pipeline is not
        interrupted. The Feedback service may later re-tune
        this value from operator feedback.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [z_threshold]
              properties:
                z_threshold:
                  type: number
                  format: double
                  minimum: 0
      responses:
        "200":
          description: updated model
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BaselineModel" }
        "404":
          description: model not found
  /tenants/{tenant_id}/alerts:
    parameters:
      - $ref: "#/components/parameters/TenantPathID"
    get:
      tags: [alert]
      operationId: listAlerts
      summary: List alerts for the tenant
      parameters:
        - name: state
          in: query
          schema: { type: string, enum: [open, acknowledged, resolved, suppressed] }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 200 }
        - name: cursor
          in: query
          schema: { type: string }
      responses:
        "200":
          description: page of alerts
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/Alert" }
                  next_cursor: { type: string }
  /tenants/{tenant_id}/alerts/{alert_id}:
    parameters:
      - $ref: "#/components/parameters/TenantPathID"
      - name: alert_id
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [alert]
      operationId: getAlert
      summary: Fetch a single alert
      responses:
        "200":
          description: alert
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Alert" }
        "404":
          description: alert not found
  /tenants/{tenant_id}/alerts/{alert_id}/acknowledge:
    parameters:
      - $ref: "#/components/parameters/TenantPathID"
      - name: alert_id
        in: path
        required: true
        schema: { type: string, format: uuid }
    post:
      tags: [alert]
      operationId: acknowledgeAlert
      summary: Move an alert to the acknowledged state
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                actor: { type: string, format: uuid }
                note: { type: string }
      responses:
        "200":
          description: updated alert
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Alert" }
        "404":
          description: alert not found
        "409":
          description: alert is in a terminal state and cannot be acknowledged
  /tenants/{tenant_id}/alerts/{alert_id}/resolve:
    parameters:
      - $ref: "#/components/parameters/TenantPathID"
      - name: alert_id
        in: path
        required: true
        schema: { type: string, format: uuid }
    post:
      tags: [alert]
      operationId: resolveAlert
      summary: Move an alert to the resolved state
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                actor: { type: string, format: uuid }
                note: { type: string }
      responses:
        "200":
          description: updated alert
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Alert" }
        "404":
          description: alert not found
        "409":
          description: alert is in a terminal state and cannot be resolved
  /tenants/{tenant_id}/alert-suppressions:
    parameters:
      - $ref: "#/components/parameters/TenantPathID"
    get:
      tags: [alert]
      operationId: listAlertSuppressions
      summary: List active suppression rules for the tenant
      responses:
        "200":
          description: page of suppression rules
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/AlertSuppression" }
                  next_cursor: { type: string }
    post:
      tags: [alert]
      operationId: createAlertSuppression
      summary: Add a (Kind, Dimension) suppression rule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [kind]
              properties:
                kind: { type: string }
                dimension: { type: string }
                reason: { type: string }
                expires_at: { type: string, format: date-time }
      responses:
        "201":
          description: rule created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AlertSuppression" }
  /tenants/{tenant_id}/alert-suppressions/{rule_id}:
    parameters:
      - $ref: "#/components/parameters/TenantPathID"
      - name: rule_id
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [alert]
      operationId: getAlertSuppression
      summary: Fetch a single suppression rule
      responses:
        "200":
          description: rule
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AlertSuppression" }
        "404":
          description: rule not found
    delete:
      tags: [alert]
      operationId: deleteAlertSuppression
      summary: Delete a suppression rule
      responses:
        "204":
          description: rule deleted
        "404":
          description: rule not found
  /tenants/{tenant_id}/alerts/{alert_id}/feedback:
    parameters:
      - $ref: "#/components/parameters/TenantPathID"
      - name: alert_id
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [alert]
      operationId: getAlertFeedback
      summary: Fetch operator feedback recorded for this alert
      responses:
        "200":
          description: feedback row
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AlertFeedback" }
        "404":
          description: no feedback recorded
    post:
      tags: [alert]
      operationId: submitAlertFeedback
      summary: Record operator feedback (true / false positive / noise)
      description: |
        Feedback is the input to the Feedback service's tuning
        loop. Submitting feedback may indirectly raise or lower
        the underlying baseline's z-score threshold the next
        time `Run` runs.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [classification]
              properties:
                classification:
                  type: string
                  enum: [true_positive, false_positive, noise]
                actor: { type: string, format: uuid }
                note: { type: string }
      responses:
        "201":
          description: feedback recorded
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AlertFeedback" }
    delete:
      tags: [alert]
      operationId: deleteAlertFeedback
      summary: Remove operator feedback for this alert
      responses:
        "204":
          description: feedback deleted
        "404":
          description: no feedback recorded
components:
  securitySchemes:
    BearerJWT:
      type: http
      scheme: bearer
      bearerFormat: JWT
    APIKey:
      type: apiKey
      in: header
      name: X-SNG-API-Key
  parameters:
    # All tenant-scoped routes use `{tenant_id}` uniformly so the
    # Go router's RequireTenant middleware (which keys off the
    # literal path-segment name `tenant_id`) can be applied with a
    # single MountTenantScoped wrapper. Generated SDKs end up with
    # a consistent `tenant_id` parameter name on every tenant
    # method, including the top-level `/tenants/{tenant_id}` CRUD
    # routes — a previous revision used `{id}` here, which
    # produced confusingly-named `id` parameters on a handful of
    # methods.
    TenantPathID:
      in: path
      name: tenant_id
      required: true
      schema: { type: string, format: uuid }
    ResourceID:
      in: path
      name: id
      required: true
      schema: { type: string, format: uuid }
    After:
      in: query
      name: after
      schema: { type: string }
    Limit:
      in: query
      name: limit
      schema: { type: integer, minimum: 1, maximum: 200 }
  responses:
    Tenant:
      description: tenant
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Tenant" }
    Site:
      description: site
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Site" }
    Device:
      description: device
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Device" }
    Error:
      description: error
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code: { type: string }
            message: { type: string }
            details: { }
    DevicePlatform:
      type: string
      enum: [windows, macos, linux, ios, android]
    TenantCreateRequest:
      type: object
      required: [name, tier]
      properties:
        name: { type: string }
        slug: { type: string }
        region: { type: string }
        tier: { type: string, enum: [starter, professional, enterprise] }
        settings: { type: object }
    TenantUpdateRequest:
      type: object
      properties:
        name: { type: string }
        region: { type: string }
        tier: { type: string, enum: [starter, professional, enterprise] }
        settings: { type: object }
    Tenant:
      type: object
      required: [id, name, slug, status, tier, settings, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        slug: { type: string }
        status: { type: string, enum: [active, suspended, deleted] }
        region: { type: string }
        tier: { type: string, enum: [starter, professional, enterprise] }
        settings: { type: object }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    SiteCreateRequest:
      type: object
      required: [name]
      properties:
        name: { type: string }
        slug: { type: string }
        template: { type: string, enum: [branch, hub, cloud_only, home_office] }
        config: { type: object }
    SiteUpdateRequest:
      type: object
      properties:
        name: { type: string }
        template: { type: string, enum: [branch, hub, cloud_only, home_office] }
        config: { type: object }
    Site:
      type: object
      required: [id, tenant_id, name, slug, template, config, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        name: { type: string }
        slug: { type: string }
        template: { type: string, enum: [branch, hub, cloud_only, home_office] }
        config: { type: object }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    ClaimToken:
      type: object
      required: [id, token, expires_at]
      properties:
        id: { type: string, format: uuid }
        token: { type: string, description: "plaintext, shown once" }
        expires_at: { type: string, format: date-time }
    DeviceEnrollRequest:
      type: object
      required: [claim_token, name, platform, public_key_ed25519]
      properties:
        claim_token: { type: string }
        name: { type: string }
        platform: { $ref: "#/components/schemas/DevicePlatform" }
        public_key_ed25519: { type: string }
        posture: { type: object }
    Device:
      type: object
      required: [id, tenant_id, name, platform, status, posture, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        site_id: { type: string, format: uuid }
        name: { type: string }
        platform: { $ref: "#/components/schemas/DevicePlatform" }
        public_key_ed25519: { type: string }
        enrolled_at: { type: string, format: date-time }
        last_seen_at: { type: string, format: date-time }
        status: { type: string, enum: [pending, active, retired] }
        posture: { type: object }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    Role:
      type: object
      required: [id, name, permissions, scope]
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        name: { type: string }
        permissions:
          type: array
          items: { type: string }
        scope: { type: string, enum: [platform, msp, tenant, site] }
    RoleCreateRequest:
      type: object
      required: [name, scope, permissions]
      properties:
        name: { type: string }
        scope: { type: string, enum: [platform, msp, tenant, site] }
        permissions:
          type: array
          items: { type: string }
    RoleAssignRequest:
      type: object
      required: [role_id]
      properties:
        role_id: { type: string, format: uuid }
        scope_id: { type: string, format: uuid }
    PolicyGraph:
      type: object
      required: [id, tenant_id, version, graph, created_at]
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        version: { type: integer }
        graph: { type: object }
        compiled_at: { type: string, format: date-time }
        compiler_version: { type: string }
        created_at: { type: string, format: date-time }
    PolicyBundle:
      type: object
      required: [id, policy_graph_id, target_type, created_at]
      properties:
        id: { type: string, format: uuid }
        policy_graph_id: { type: string, format: uuid }
        target_type: { type: string, enum: [edge, endpoint, cloud, mobile] }
        key_id: { type: string, description: stable short id of the signing key }
        bundle: { type: string, description: base64 of MessagePack payload }
        signature: { type: string, description: base64 of Ed25519 signature }
        created_at: { type: string, format: date-time }
    PolicySigningKey:
      type: object
      required: [id, tenant_id, key_id, algorithm, public_key, status, activated_at, created_at]
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        key_id: { type: string }
        algorithm: { type: string, enum: [ed25519] }
        public_key: { type: string, description: base64 of the Ed25519 public key (32 bytes) }
        status: { type: string, enum: [active, rotated, revoked] }
        activated_at: { type: string, format: date-time }
        rotated_at: { type: string, format: date-time }
        revoked_at: { type: string, format: date-time }
        created_at: { type: string, format: date-time }
    PolicyPublicKey:
      type: object
      required: [key_id, algorithm, public_key, status]
      properties:
        key_id: { type: string }
        algorithm: { type: string, enum: [ed25519] }
        public_key: { type: string, description: base64 of the Ed25519 public key (32 bytes) }
        status: { type: string, enum: [active, rotated, revoked] }
    PolicyCompileResult:
      type: object
      required: [graph_id, compiled_at, bundles]
      properties:
        graph_id: { type: string, format: uuid }
        compiled_at: { type: string, format: date-time }
        bundles:
          type: array
          items: { $ref: "#/components/schemas/PolicyBundle" }
    AuditEntry:
      type: object
      required: [id, tenant_id, action, resource_type, created_at]
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        actor_id: { type: string, format: uuid }
        action: { type: string }
        resource_type: { type: string }
        resource_id: { type: string, format: uuid }
        details: { type: object }
        created_at: { type: string, format: date-time }
    WebhookCreateRequest:
      type: object
      required: [url, events]
      properties:
        url: { type: string, format: uri }
        events:
          type: array
          items: { type: string }
    WebhookEndpoint:
      type: object
      required: [id, tenant_id, url, events, status, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        url: { type: string }
        events:
          type: array
          items: { type: string }
        secret: { type: string, description: only returned at create time }
        status: { type: string, enum: [active, disabled] }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    APIKeyCreateRequest:
      type: object
      required: [name, subject]
      properties:
        name: { type: string, description: "human-readable label, e.g. ci-prod" }
        subject: { type: string, description: "stable identity injected into auth context, e.g. bot:ci" }
        expires_at:
          type: string
          format: date-time
          description: optional RFC3339 absolute deadline; omit for non-expiring
    APIKey:
      type: object
      required: [id, tenant_id, name, subject, status, created_at]
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        name: { type: string }
        subject: { type: string }
        status: { type: string, enum: [active, revoked] }
        expires_at: { type: string, format: date-time }
        last_used_at: { type: string, format: date-time }
        created_by: { type: string, format: uuid }
        created_at: { type: string, format: date-time }
        revoked_at: { type: string, format: date-time }
        plaintext: { type: string, description: only returned on create }
    AppRegistry:
      type: object
      required: [id, name, traffic_class, scope, domains, is_system, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        vendor: { type: string }
        traffic_class:
          type: string
          enum: [trusted_direct, trusted_media_bypass, inspect_lite, inspect_full, tunnel_private, block]
        scope: { type: string, enum: [global, regional] }
        regions:
          type: array
          items: { type: string }
        domains:
          type: array
          items: { type: string }
        ip_ranges:
          type: array
          items: { type: string }
        cert_pins:
          type: array
          items: { type: string }
        metadata_url: { type: string }
        category: { type: string }
        is_system: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    AppRegistryRequest:
      type: object
      description: |
        Create / update body for the global app catalog.

        Optional scalar fields (`vendor`, `metadata_url`, `category`)
        follow PUT-replacement semantics: omitting the field from
        the JSON body inherits the existing value (or leaves it
        empty on create), while setting the field to an empty
        string explicitly clears it. This lets clients fully
        replace an entry on PUT without having to delete and
        recreate it.
      required: [name, traffic_class, scope, domains]
      properties:
        name: { type: string }
        vendor:
          type: string
          description: |
            Vendor name. Send `""` on PUT to clear; omit to
            inherit the existing value.
        traffic_class:
          type: string
          enum: [trusted_direct, trusted_media_bypass, inspect_lite, inspect_full, tunnel_private, block]
        scope: { type: string, enum: [global, regional] }
        regions:
          type: array
          items: { type: string }
        domains:
          type: array
          items: { type: string }
        ip_ranges:
          type: array
          items: { type: string }
        cert_pins:
          type: array
          items: { type: string }
        metadata_url:
          type: string
          description: |
            Vendor-published endpoint document URL (auto-sync
            source). Send `""` on PUT to clear; omit to inherit.
        category:
          type: string
          description: |
            Category label. Send `""` on PUT to clear; omit to
            inherit.
        is_system: { type: boolean }
    AppRegistryOverride:
      type: object
      required: [id, tenant_id, traffic_class_override, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        app_id: { type: string, format: uuid, description: "set when override targets a global app entry" }
        custom_domains:
          type: array
          items: { type: string }
          description: "set when override targets domains not present in the global catalog"
        traffic_class_override:
          type: string
          enum: [trusted_direct, trusted_media_bypass, inspect_lite, inspect_full, tunnel_private, block]
        reason: { type: string }
        expires_at: { type: string, format: date-time, description: "TTL-based auto-cleanup; omit for permanent" }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    AppRegistryOverrideRequest:
      type: object
      required: [traffic_class_override]
      description: |
        Exactly one of `app_id` or `custom_domains` must be set.
        - `app_id` references an entry in the global `app_registry`.
        - `custom_domains` defines a tenant-local pattern list for
          apps that are not in the global catalog.
        Supplying neither (or both) returns 400
        `invalid_override_target`. Empty / whitespace-only
        custom-domain entries return 400 `invalid_custom_domain`
        because they would never match any flow and would install
        a silently-dead override.
      properties:
        app_id: { type: string, format: uuid }
        custom_domains:
          type: array
          items: { type: string }
        traffic_class_override:
          type: string
          enum: [trusted_direct, trusted_media_bypass, inspect_lite, inspect_full, tunnel_private, block]
        reason: { type: string }
        expires_at: { type: string, format: date-time }
    EffectiveApp:
      type: object
      required: [app, effective_class, source]
      properties:
        app: { $ref: "#/components/schemas/AppRegistry" }
        effective_class:
          type: string
          enum: [trusted_direct, trusted_media_bypass, inspect_lite, inspect_full, tunnel_private, block]
        source: { type: string, enum: [global, override] }
        override_id: { type: string, format: uuid }
        override_expires_at: { type: string, format: date-time }
        override_reason: { type: string }
    TrafficClassStat:
      type: object
      required: [class, events, bytes]
      properties:
        class: { type: string }
        events: { type: integer, format: int64 }
        bytes: { type: integer, format: int64 }
    SyncResult:
      type: object
      required: [app_id, app_name, metadata_url]
      properties:
        app_id: { type: string, format: uuid }
        app_name: { type: string }
        metadata_url: { type: string }
        domains_before: { type: integer }
        domains_after: { type: integer }
        ip_ranges_before: { type: integer }
        ip_ranges_after: { type: integer }
        updated: { type: boolean }
        error: { type: string }
    BaselineModel:
      type: object
      required: [tenant_id, dimension, window_seconds, mean, variance, ewma, z_threshold, samples, updated_at]
      properties:
        tenant_id: { type: string, format: uuid }
        dimension: { type: string }
        window_seconds: { type: integer, format: int64 }
        mean: { type: number, format: double }
        variance: { type: number, format: double }
        ewma: { type: number, format: double }
        ewma_variance: { type: number, format: double }
        z_threshold: { type: number, format: double }
        samples: { type: integer, format: int64 }
        last_observed_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    Alert:
      type: object
      required: [id, tenant_id, kind, dimension, value, score, state, opened_at]
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        kind: { type: string }
