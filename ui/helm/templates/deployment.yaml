apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sng-ui.fullname" . }}
  labels:
    {{- include "sng-ui.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "sng-ui.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "sng-ui.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: ui
          image: {{ include "sng-ui.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
          env:
            - name: SNG_API_BASE_URL
              value: {{ .Values.config.apiBaseUrl | quote }}
            - name: SNG_AUTH_MODE
              value: {{ .Values.config.authMode | quote }}
            - name: SNG_OIDC_ISSUER
              value: {{ .Values.config.oidcIssuer | quote }}
            - name: SNG_OIDC_CLIENT_ID
              value: {{ .Values.config.oidcClientId | quote }}
            - name: SNG_OIDC_SCOPE
              value: {{ .Values.config.oidcScope | quote }}
          readinessProbe:
            httpGet:
              path: /index.html
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /index.html
              port: http
            initialDelaySeconds: 5
            periodSeconds: 20
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
