# Default Content-Security-Policy — a safe, bootable fallback.
#
# The container entrypoint (docker-entrypoint.sh) overwrites this file at start
# with a policy whose `connect-src` is narrowed to the configured backend
# origins. This baked-in default keeps `include /etc/nginx/snippets/sng-csp.conf`
# valid (so nginx boots) even if the entrypoint is bypassed; it intentionally
# uses the broad `connect-src 'self' https:` so the SPA still functions in that
# degraded case.
add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' https:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;
