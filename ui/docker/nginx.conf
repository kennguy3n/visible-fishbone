server {
    listen       8080;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Never cache the runtime config or the HTML entrypoint so config and
    # asset-hash references are always fresh after a redeploy.
    location = /config.js {
        add_header Cache-Control "no-store";
    }
    location = /index.html {
        add_header Cache-Control "no-store";
    }

    # Fingerprinted build assets are immutable and safe to cache long-term.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA history fallback: unknown paths resolve to the app shell.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Basic hardening headers.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
