server {
    listen       8080;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Hardening headers for server-level responses (e.g. error pages) that
    # are not produced by one of the location blocks below. Each location
    # re-includes the same snippet because a location that sets its own
    # add_header does not inherit these.
    include /etc/nginx/snippets/sng-security-headers.conf;

    # Never cache the runtime config or the HTML entrypoint so config and
    # asset-hash references are always fresh after a redeploy.
    location = /config.js {
        include /etc/nginx/snippets/sng-security-headers.conf;
        add_header Cache-Control "no-store";
    }
    location = /index.html {
        include /etc/nginx/snippets/sng-security-headers.conf;
        add_header Cache-Control "no-store";
    }

    # Fingerprinted build assets are immutable and safe to cache long-term.
    location /assets/ {
        include /etc/nginx/snippets/sng-security-headers.conf;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA history fallback: unknown paths resolve to the app shell.
    location / {
        include /etc/nginx/snippets/sng-security-headers.conf;
        try_files $uri $uri/ /index.html;
    }
}
