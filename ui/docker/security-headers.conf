# Hardening headers shared by every location. nginx does NOT inherit
# server-level `add_header` directives into a location that defines its
# own `add_header`, so this snippet is `include`d in each location block
# to guarantee the headers are present everywhere (app shell, runtime
# config, hashed assets, and the SPA fallback).
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
# Content-Security-Policy. The full policy lives in sng-csp.conf, which the
# container entrypoint regenerates at start so `connect-src` lists only the
# configured backend origins (the API and OIDC IdP, injected at deploy time)
# instead of a blanket `https:`. The rest of the policy is fixed: the
# production index.html references only external scripts (the hashed bundle and
# /config.js), so `script-src 'self'` blocks any injected inline script without
# a nonce; `style-src` keeps 'unsafe-inline' because React element styles
# (style={{…}}) and Recharts emit inline style attributes (a far weaker
# injection vector than scripts); `frame-ancestors 'none'` mirrors
# X-Frame-Options for browsers that honour CSP framing. A permissive default is
# baked into the image (see Dockerfile) so nginx still boots if the entrypoint
# is bypassed; in normal operation the entrypoint overwrites it before start.
include /etc/nginx/snippets/sng-csp.conf;
