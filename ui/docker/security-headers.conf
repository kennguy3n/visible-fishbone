# Hardening headers shared by every location. nginx does NOT inherit
# server-level `add_header` directives into a location that defines its
# own `add_header`, so this snippet is `include`d in each location block
# to guarantee the headers are present everywhere (app shell, runtime
# config, hashed assets, and the SPA fallback).
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
# Content-Security-Policy. The production index.html references only external
# scripts (the hashed bundle and /config.js), so `script-src 'self'` blocks any
# injected inline script without needing a nonce. `style-src` keeps
# 'unsafe-inline' because React element styles (style={{…}}) and Recharts emit
# inline style attributes/tags; styles are a far weaker injection vector than
# scripts. `connect-src` allows same-origin plus any https endpoint because the
# API base URL is injected at deploy time (window.__SNG_CONFIG__) and is
# commonly a different origin than the UI host — that origin isn't known when
# this image is built, so it can't be narrowed further here without abandoning
# the single-image, runtime-configured deployment model. The app uses no
# WebSockets, so `wss:` is intentionally omitted. frame-ancestors 'none'
# mirrors X-Frame-Options for browsers that honour CSP framing.
add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' https:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;
