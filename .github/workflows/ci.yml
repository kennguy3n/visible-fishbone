# GitHub Actions CI for the ShieldNet Gateway (SNG) control plane.
#
# Pipeline shape mirrors the Makefile targets so a `make all` run
# locally exercises the same gates that CI does. Jobs are organised
# into two tiers:
#
#   * Fast PR gate (runs on every PR + push):
#       lint, unit, tidy, openapi-lint
#     These complete in roughly one minute on a warm cache and are
#     the gates a contributor has to clear before review.
#
#   * Full suite (PR + push, slower):
#       integration (testcontainers), build (artifact upload)
#     These run on PRs as well so a regression caught in
#     integration tests blocks the merge, but they sit behind the
#     fast jobs so a typo doesn't burn 5 minutes of integration
#     spin-up before the lint failure surfaces.
#
#   * Main-only suite (push to main + manual dispatch):
#       migration-dry-run
#     Migration runs against a real postgres service container,
#     applying every up + down migration to verify the embedded
#     SQL files actually round-trip.
#
# Concurrency: cancel-in-progress is enabled per ref so a
# force-push to a feature branch supersedes any in-flight CI for
# that branch. main is excluded so a merge does not get cancelled
# by a follow-up merge.

name: ci

on:
  pull_request:
    branches: ["**"]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  GO_VERSION: "1.25"
  GOLANGCI_LINT_VERSION: "v2.5.0"

jobs:
  lint:
    name: lint (go vet + golangci-lint)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: go vet
        run: go vet ./...
      - name: golangci-lint (default tags)
        uses: golangci/golangci-lint-action@v7
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          args: --timeout 5m
      # The integration build tag pulls in test files that the
      # default lint pass does not see. Run a second lint pass
      # under -tags=integration so a stale import or unused param
      # in the integration-only files surfaces in CI rather than
      # the next local run.
      - name: golangci-lint (integration tag)
        uses: golangci/golangci-lint-action@v7
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          args: --timeout 5m --build-tags=integration

  openapi-lint:
    name: openapi lint (spectral)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install spectral
        run: npm install -g @stoplight/spectral-cli@6.15.0
      - name: spectral lint api/openapi.yaml
        run: spectral lint --ruleset .spectral.yaml api/openapi.yaml
      # The handler package embeds a byte-identical copy of the
      # spec via `go:embed openapi.yaml` (see internal/handler/spec.go).
      # A contributor who edits only `api/openapi.yaml` would ship a
      # spec drift that the runtime `/api/v1/openapi.yaml` endpoint
      # returns the stale version of. Guard the invariant in CI
      # rather than relying on a checklist.
      - name: assert openapi.yaml is in sync with internal/handler/openapi.yaml
        run: |
          if ! diff -q api/openapi.yaml internal/handler/openapi.yaml; then
            echo "::error::api/openapi.yaml and internal/handler/openapi.yaml have drifted; copy api/openapi.yaml over internal/handler/openapi.yaml and re-commit"
            exit 1
          fi

  build:
    name: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: go build
        run: |
          go build ./...
          go build -o bin/sng-control ./cmd/sng-control
          go build -o bin/sng-migrate ./cmd/sng-migrate
      - name: upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: sng-binaries-${{ github.sha }}
          path: bin/
          retention-days: 7

  unit:
    name: unit tests (-race)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: go test -race
        # Exclude the integration build tag so unit tests do not
        # spin up testcontainers. The integration job handles that.
        run: go test -race -timeout 120s ./...
      - name: go test -race (coverage)
        if: always()
        run: |
          go test -race -timeout 120s -coverprofile=coverage.out ./...
          go tool cover -func=coverage.out | tail -1
      - name: upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.sha }}
          path: coverage.out
          retention-days: 7

  integration:
    name: integration tests (testcontainers)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # GitHub-hosted runners ship Docker pre-installed, which is
    # all testcontainers needs. No `services:` block is required.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: go test -tags=integration -race
        env:
          # testcontainers downloads images on first run; allow
          # extra time for the initial pull so a cold cache does
          # not flake the suite.
          TESTCONTAINERS_RYUK_DISABLED: "false"
        run: go test -race -timeout 600s -tags=integration ./...

  tidy:
    name: go mod tidy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: verify go.mod / go.sum are tidy
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum || {
            echo "::error::go.mod / go.sum are not tidy. Run 'go mod tidy' locally and commit the result."
            exit 1
          }

  migration-dry-run:
    name: migration dry-run (postgres)
    # Migration round-trip is gated to pushes to main (and manual
    # dispatch). The fast PR gate above already runs `go build`
    # against the migrate command and the unit/integration suites
    # exercise the embedded SQL through the `internal/migrate`
    # runner. This job is the belt-and-braces check that every
    # migration applies cleanly and rolls back cleanly against a
    # real Postgres 16, which is the same image dev + prod ship.
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: sng
          POSTGRES_PASSWORD: sng
          POSTGRES_DB: sng
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sng -d sng"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      # sng-migrate consumes the same PG_* env vars as the main
      # control-plane binary. Setting them here lets `make
      # migrate-{up,down,status}` work without a .env file.
      PG_HOST: 127.0.0.1
      PG_PORT: "5432"
      PG_USER: sng
      PG_PASSWORD: sng
      PG_DATABASE: sng
      PG_SSLMODE: disable
      # PG_APP_ROLE must be a non-empty value the migrate command
      # accepts; the role does not need to exist in the dry-run
      # database because migrations themselves create it where
      # required.
      PG_APP_ROLE: sng_app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: install postgres client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client
      - name: provision sng_app runtime role
        # `migrations/002_role_bootstrap.up.sql` refuses to run if
        # `sng_app` does not already exist (role lifecycle is an
        # operator concern, not a schema concern — see docs/deploy.md).
        # Create it here as the postgres superuser, then grant it to
        # `sng` so the migration runner can SET SESSION ROLE later.
        env:
          PGPASSWORD: sng
        run: |
          psql -h 127.0.0.1 -U sng -d sng -v ON_ERROR_STOP=1 -c \
            "CREATE ROLE sng_app NOLOGIN; GRANT sng_app TO sng;"
      - name: build sng-migrate
        run: make build-migrate
      - name: migrate up
        run: bin/sng-migrate up
      - name: migrate status (after up)
        run: bin/sng-migrate status
      - name: migrate down (full round-trip)
        # Roll back every applied migration. Step count is derived
        # from the actual number of `.up.sql` files under
        # `migrations/` so new migrations do not require this step
        # to be edited.
        #
        # `set -euo pipefail` makes the find-failure surface as a
        # job failure instead of a silent `N=`; the explicit
        # `N <= 0` guard then asserts the count is positive — the
        # CLI rejects `down 0` and the migrate step above would
        # also have already failed if there were no migrations,
        # so this is a defence-in-depth assertion rather than a
        # workaround.
        run: |
          set -euo pipefail
          N=$(find migrations -maxdepth 1 -name "*.up.sql" -type f | wc -l)
          if [ "$N" -le 0 ]; then
            echo "::error::no migrations found under migrations/ — refusing to invoke 'sng-migrate down 0'"
            exit 1
          fi
          echo "rolling back $N migrations"
          bin/sng-migrate down "$N"
      - name: migrate up (re-apply)
        run: bin/sng-migrate up
      - name: migrate status (final)
        run: bin/sng-migrate status
