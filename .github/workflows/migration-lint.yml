# Migration lock-safety lint.
#
# Statically analyses the `.up.sql` migrations a pull request ADDS or
# MODIFIES and fails the PR if any of them use a DDL pattern that
# takes a heavyweight lock for the length of a table rewrite — the
# class of change that, at 5,000 tenants, turns a routine migration
# into a global outage. The rules live in
# internal/migrate/validator.go (MigrationValidator); this workflow
# is the CI surface that runs them.
#
# Scope: only files changed in the PR are checked, so pre-existing
# migrations are never re-litigated. Added/modified migrations are
# validated with --strict (no grandfathering) — a brand-new migration
# is never on the frozen baseline, so it must be lock-safe on its own
# merits. The generated consolidation baseline (migrations/baseline/)
# is excluded here: it concatenates historical migrations that pre-date
# the validator, and its correctness is guaranteed instead by the
# migration-baseline job below, which proves it is regenerable.
#
# Two jobs:
#   migration-lint     — lock-safety lint of the migrations a PR adds.
#   migration-baseline  — proves migrations/baseline/ is exactly what
#                         `sng-migrate squash --through` regenerates,
#                         so the consolidated baseline can never drift
#                         from the individual migration files.

name: migration-lint

on:
  pull_request:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: migration-lint-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  GO_VERSION: "1.25"

jobs:
  migration-lint:
    name: migration lock-safety lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the base..head diff can be computed.
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: build sng-migrate
        run: go build -o bin/sng-migrate ./cmd/sng-migrate
      - name: collect changed up.sql migrations
        id: changed
        # github.base_ref reaches the shell through an env var, never
        # interpolated into the script: a hostile branch name (git
        # permits `$`, backticks, …) cannot then be evaluated by the
        # shell.
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          # github.base_ref is only set for pull_request events; on a
          # manual workflow_dispatch it is empty, which would make the
          # ref "origin/" and fail the diff. Fall back to origin/main
          # so manual runs diff against the default branch.
          if [ -z "$BASE_REF" ]; then
            base="origin/main"
          else
            base="origin/${BASE_REF}"
          fi
          # Added or modified up.sql migrations only; deletions are not
          # forward-migration risks and are skipped.
          # Exclude migrations/baseline/: the consolidated baseline is
          # a generated concatenation of historical (grandfathered)
          # migrations and is checked by the migration-baseline job.
          files="$(git diff --name-only --diff-filter=AM "$base"...HEAD -- 'migrations/*.up.sql' ':(exclude)migrations/baseline/**' | tr '\n' ' ')"
          echo "files=$files" >> "$GITHUB_OUTPUT"
          if [ -z "$files" ]; then
            echo "No added/modified up.sql migrations in this PR."
          else
            echo "Changed migrations: $files"
          fi
      - name: validate lock safety
        if: steps.changed.outputs.files != ''
        # Likewise pass the file list via the environment. ${{ }}
        # interpolation would paste the (PR-author-controlled)
        # filenames straight into the script, so a file named e.g.
        # `migrations/$(…).up.sql` would execute. A shell variable is
        # only word-split, never re-evaluated for command
        # substitution; word-splitting is what we want, since the list
        # is space-separated and migration names contain no spaces.
        env:
          CHANGED_FILES: ${{ steps.changed.outputs.files }}
        # --strict: a newly added/modified migration is held to the
        # lock-safety rules with no baseline grandfathering.
        run: ./bin/sng-migrate validate --strict $CHANGED_FILES
      - name: no migrations changed
        if: steps.changed.outputs.files == ''
        run: echo "migration-lint: nothing to validate"

  migration-baseline:
    name: consolidated baseline is regenerable
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: build sng-migrate
        run: go build -o bin/sng-migrate ./cmd/sng-migrate
      - name: regenerate baseline and diff against committed
        # The committed migrations/baseline/ must be exactly what
        # `sng-migrate squash` produces from the individual migration
        # files up to the cut line, otherwise the baseline a fresh
        # deployment applies has silently diverged from the history an
        # existing deployment replays. We derive the cut version from
        # the committed filename (NNN_consolidated_baseline.up.sql),
        # regenerate, and diff — ignoring only the generation-timestamp
        # header line, which is non-deterministic by construction.
        run: |
          set -euo pipefail
          up="$(ls migrations/baseline/*_consolidated_baseline.up.sql 2>/dev/null || true)"
          if [ -z "$up" ]; then
            echo "::error::no consolidated baseline found under migrations/baseline/"
            exit 1
          fi
          n="$(basename "$up")"
          through="$((10#${n%%_*}))"   # 041_... -> 41, base-10 (leading zero safe)
          echo "regenerating baseline through version $through"
          ./bin/sng-migrate squash --through "$through" --out /tmp/baseline --force
          # Strip only the non-deterministic "Code generated ... on <ts>"
          # header line before comparing content.
          strip() { sed -E '/^-- Code generated by /d' "$1"; }
          rc=0
          for d in up down; do
            committed="migrations/baseline/${n%.up.sql}.${d}.sql"
            regenerated="/tmp/baseline/${n%.up.sql}.${d}.sql"
            if ! diff -u <(strip "$committed") <(strip "$regenerated"); then
              echo "::error::migrations/baseline/${n%.up.sql}.${d}.sql is stale — run 'sng-migrate squash --through $through' and commit the result"
              rc=1
            fi
          done
          if [ "$rc" -eq 0 ]; then
            echo "consolidated baseline is up to date"
          fi
          exit "$rc"
