# release-provenance.yml — SLSA Build Level 2 provenance for the
# Rust enforcement-plane release artifacts: the `sng-edge` VM-image
# payload and the `sng-agent` endpoint installer payloads.
#
# Why a dedicated workflow (vs. the `build` job in ci.yml):
#   ci.yml builds the Go control-plane binaries on every PR as a fast
#   gate; it is not a release pipeline and produces no signed
#   provenance. SLSA L2 requires that a *release* artifact carry
#   provenance generated by the build platform and cryptographically
#   signed so its origin (source repo, commit, workflow, builder) is
#   non-falsifiable. That is a release-time concern, so it lives in its
#   own tag-triggered workflow rather than bloating the PR gate.
#
# What "SLSA Build L2" means here (slsa.dev v1.0):
#   - Provenance EXISTS for every released artifact (the .intoto.jsonl
#     attestation produced by actions/attest-build-provenance).
#   - Provenance is generated by a hosted build platform (GitHub
#     Actions), not by the developer's machine.
#   - Provenance is SIGNED (Sigstore/Fulcio keyless, bound to this
#     workflow's GitHub OIDC identity) so it is authentic and
#     tamper-evident — consumers verify with `gh attestation verify`
#     or any cosign/SLSA verifier before install.
#   This is the supply-chain attestation referenced in ARCHITECTURE.md
#   §8 ("supply-chain attestations (SLSA-class) on container images")
#   and SECURITY.md ("Signed artifacts + SBOM"), now made concrete for
#   the edge image and agent installers.
#
# Verification (consumer side), e.g. before a dual-bank edge upgrade:
#   gh attestation verify sng-edge-image-<ver>-linux-x86_64.tar.gz \
#     --repo kennguy3n/visible-fishbone
#
# Note on packaging: the edge ships as a VM image and the agent as
# per-OS installers. Those packaging steps wrap the release binary
# built here; this workflow attests the build artifact (the binary
# payload archive + its sha256), which is the subject the downstream
# image/installer packaging consumes. Extending packaging (OVA/qcow2,
# MSI/pkg/deb) keeps the same attested binary as its input.

name: release-provenance

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref (tag/SHA) to build provenance for"
        required: false
        type: string

# Default to least privilege; jobs that mint provenance elevate
# id-token/attestations locally.
permissions:
  contents: read

concurrency:
  group: release-provenance-${{ github.ref }}
  cancel-in-progress: false

env:
  # Must match the workspace Cargo.toml rust-version pin, same forcing
  # function documented in ci.yml.
  RUST_TOOLCHAIN: "1.91"
  CARGO_TERM_COLOR: always

jobs:
  edge-image:
    name: sng-edge image provenance (linux/x86_64)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write      # keyless signing via GitHub OIDC
      attestations: write  # write the provenance attestation
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: x86_64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-${{ runner.os }}
      - name: build sng-edge (release)
        run: cargo build --release --locked -p sng-edge --target x86_64-unknown-linux-gnu
      - name: assemble edge image payload
        id: pack
        run: |
          set -euo pipefail
          ver="${GITHUB_REF_NAME:-dev}"
          art="sng-edge-image-${ver}-linux-x86_64.tar.gz"
          mkdir -p dist/edge
          cp target/x86_64-unknown-linux-gnu/release/sng-edge dist/edge/
          tar -C dist/edge -czf "dist/${art}" sng-edge
          ( cd dist && sha256sum "${art}" > "${art}.sha256" )
          echo "artifact=dist/${art}" >> "$GITHUB_OUTPUT"
          echo "checksum=dist/${art}.sha256" >> "$GITHUB_OUTPUT"
      - name: generate SLSA build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: ${{ steps.pack.outputs.artifact }}
      - name: upload artifact + provenance inputs
        uses: actions/upload-artifact@v4
        with:
          name: sng-edge-image-${{ github.ref_name }}
          path: |
            ${{ steps.pack.outputs.artifact }}
            ${{ steps.pack.outputs.checksum }}
          retention-days: 30

  agent-installer:
    name: sng-agent installer provenance
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            os: linux
            target: x86_64-unknown-linux-gnu
            bin: sng-agent
          - runner: macos-latest
            os: macos
            target: aarch64-apple-darwin
            bin: sng-agent
          - runner: windows-latest
            os: windows
            target: x86_64-pc-windows-msvc
            bin: sng-agent.exe
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-${{ runner.os }}
      - name: build sng-agent (release)
        run: cargo build --release --locked -p sng-agent --target ${{ matrix.target }}
      - name: assemble agent installer payload
        id: pack
        shell: bash
        run: |
          set -euo pipefail
          ver="${GITHUB_REF_NAME:-dev}"
          art="sng-agent-installer-${ver}-${{ matrix.os }}-${{ matrix.target }}.tar.gz"
          mkdir -p dist/agent
          cp "target/${{ matrix.target }}/release/${{ matrix.bin }}" dist/agent/
          tar -C dist/agent -czf "dist/${art}" "${{ matrix.bin }}"
          ( cd dist && sha256sum "${art}" > "${art}.sha256" )
          echo "artifact=dist/${art}" >> "$GITHUB_OUTPUT"
          echo "checksum=dist/${art}.sha256" >> "$GITHUB_OUTPUT"
      - name: generate SLSA build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: ${{ steps.pack.outputs.artifact }}
      - name: upload artifact + provenance inputs
        uses: actions/upload-artifact@v4
        with:
          name: sng-agent-installer-${{ github.ref_name }}-${{ matrix.os }}
          path: |
            ${{ steps.pack.outputs.artifact }}
            ${{ steps.pack.outputs.checksum }}
          retention-days: 30
