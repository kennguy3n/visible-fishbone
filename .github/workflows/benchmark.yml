# Weekly edge data-path benchmark for the SNG `bench/` harness.
#
# This is intentionally separate from `ci.yml`: the benchmark crate is a
# STANDALONE cargo workspace under `bench/` (not a member of the root
# workspace), so none of the per-PR Rust gates build or run it. Pulling a
# full benchmark sweep into every PR would be wasteful; instead it runs on
# a weekly schedule (and on demand via workflow_dispatch).
#
# What it does each run:
#   * builds the `sng-bench` harness in release mode,
#   * sweeps every edge SKU profile across the three measurement modes,
#   * writes one JSON report per (profile, mode) into `bench/results/`,
#   * compares each fresh throughput report against the committed baseline
#     (`bench/results/baseline-<profile>.json`) and FAILS the job — and
#     files a tracking issue — if throughput regresses by more than the
#     configured threshold (default 10%),
#   * uploads every report as a build artifact, and on the scheduled run
#     commits the refreshed reports back to the repository.
#
# Traffic generation: the live modes transmit real frames over AF_PACKET
# and require CAP_NET_RAW plus an edge in-path, which a stock
# GitHub-hosted runner does not provide. The default sweep therefore runs
# in `--dry-run` mode (full craft + measure + report pipeline, no wire
# I/O), which keeps the pipeline self-testing on a hosted runner. Point
# `BENCH_RUNNER` at a dedicated self-hosted runner wired in-path with the
# edge under test and set `BENCH_DRY_RUN=` (empty) to publish real
# line-rate numbers.

name: benchmark

on:
  schedule:
    # 07:00 UTC every Monday.
    - cron: "0 7 * * 1"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run in dry-run mode (no AF_PACKET wire I/O)"
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: benchmark-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  # Must match `rust-version` in the bench workspace Cargo.toml.
  RUST_TOOLCHAIN: "1.91"
  CARGO_TERM_COLOR: always
  # Per-mode wall-clock. Kept small for the hosted dry-run sweep; raise it
  # on a dedicated runner where you want a statistically stable sample.
  BENCH_DURATION: "15"
  # Per-mode wall-clock for the real-wire sweep. The dedicated in-path
  # runner can afford a longer, statistically stabler sample than the
  # hosted dry-run sweep.
  BENCH_WIRE_DURATION: "30"
  # Throughput regression threshold (fractional drop) the compare gate
  # alerts on. 0.10 == a >10% throughput drop fails the run.
  BENCH_THROUGHPUT_DROP: "0.10"
  # Latency regression threshold (fractional increase).
  BENCH_LATENCY_INCREASE: "0.10"

jobs:
  benchmark:
    name: benchmark (${{ matrix.profile }})
    # ubuntu-latest runs the self-testing dry-run sweep. Swap to a
    # self-hosted, in-path runner label to capture real line-rate numbers.
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      # `alert on regression` files a tracking issue via github-script.
      issues: write
    strategy:
      fail-fast: false
      matrix:
        profile: [branch-small, branch-medium, branch-large]
    defaults:
      run:
        working-directory: bench
    # No job-level `outputs` here: with a matrix, GitHub keeps only the
    # last-finishing leg's value, which would silently mask a regression
    # in another profile. The regression gate is enforced per-leg via the
    # `alert on regression` step below instead.
    steps:
      - uses: actions/checkout@v4

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: bench
          shared-key: bench-${{ runner.os }}

      - name: build harness (release)
        run: cargo build --release --locked

      - name: run benchmark sweep
        env:
          # workflow_dispatch can disable dry-run; the scheduled run is
          # always dry-run on a hosted runner. Set to empty on a dedicated
          # in-path runner to transmit real traffic.
          BENCH_DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run == false && '' || '--dry-run' }}
        run: |
          set -euo pipefail
          bin=target/release/sng-bench
          profile=profiles/${{ matrix.profile }}.toml
          mkdir -p results
          # Representative slice of the dimension matrix: a small-frame
          # pps-bound point and a jumbo-frame bandwidth-bound point, each
          # at the mid policy-complexity tier. Widen on a dedicated runner.
          for mode in throughput latency concurrent-flows; do
            echo "::group::${mode} / ${{ matrix.profile }}"
            "$bin" "$mode" \
              --profile "$profile" \
              --duration "${BENCH_DURATION}" \
              --packet-size 1500 \
              --policy-rules 100 \
              --inspection url-cat \
              --out-dir results \
              --git-sha "${GITHUB_SHA}" \
              ${BENCH_DRY_RUN}
            echo "::endgroup::"
          done

      - name: compare against baseline
        id: compare
        run: |
          set -uo pipefail
          bin=target/release/sng-bench
          baseline="results/baseline-${{ matrix.profile }}.json"
          echo "regressed=false" >> "$GITHUB_OUTPUT"
          if [ ! -f "$baseline" ]; then
            echo "no committed baseline at ${baseline}; skipping regression gate (first run seeds it)"
            exit 0
          fi
          latest=$(ls -t results/${{ matrix.profile }}-throughput-*.json | head -n1)
          echo "comparing ${latest} against ${baseline}"
          set +e
          "$bin" compare \
            --baseline "$baseline" \
            --current "$latest" \
            --throughput-drop "${BENCH_THROUGHPUT_DROP}" \
            --latency-increase "${BENCH_LATENCY_INCREASE}"
          rc=$?
          set -e
          # Exit code 2 == ran fine but found a regression (see EXIT_REGRESSION
          # in bench/src/main.rs). Any other non-zero is a harness failure.
          if [ "$rc" -eq 2 ]; then
            echo "regressed=true" >> "$GITHUB_OUTPUT"
          elif [ "$rc" -ne 0 ]; then
            echo "::error::sng-bench compare failed with exit code ${rc}"
            exit "$rc"
          fi

      - name: upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-results-${{ matrix.profile }}-${{ github.run_id }}
          path: bench/results/${{ matrix.profile }}-*.json
          retention-days: 90

      - name: alert on regression
        if: steps.compare.outputs.regressed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const profile = '${{ matrix.profile }}';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = `Benchmark regression: ${profile} throughput dropped >${{ env.BENCH_THROUGHPUT_DROP }}`;
            const body = [
              `The weekly benchmark detected a throughput regression on the **${profile}** edge SKU `,
              `exceeding the ${{ env.BENCH_THROUGHPUT_DROP }} fractional threshold.`,
              ``,
              `- Run: ${runUrl}`,
              `- Commit: ${context.sha}`,
              ``,
              `Reports are attached to the run as the \`bench-results-${profile}-${context.runId}\` artifact. `,
              `Review the regression, then update \`bench/results/baseline-${profile}.json\` if the new number is the intended baseline.`,
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['benchmark', 'regression'],
            });

      - name: fail run on regression
        if: steps.compare.outputs.regressed == 'true'
        run: |
          echo "::error::throughput regression detected for ${{ matrix.profile }} (threshold ${BENCH_THROUGHPUT_DROP})"
          exit 1

  wire:
    name: wire (${{ matrix.profile }})
    # Real-wire numbers need a runner that can open AF_PACKET (CAP_NET_RAW)
    # with sng-edge in-path. The `bench-runner` Terraform module
    # (deploy/terraform/modules/bench-runner) provisions exactly this and
    # registers it with the `sng-bench-wire` label. If no such runner is
    # online the job simply queues — it never runs on a hosted runner, so
    # the wire numbers are always real.
    runs-on: [self-hosted, sng-bench-wire]
    # Wire runs are the scheduled source of truth; a manual dispatch can
    # also drive them. They never run on push (no self-hosted exposure to
    # untrusted PRs).
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 60
    permissions:
      contents: read
      issues: write
    strategy:
      fail-fast: false
      matrix:
        profile: [micro, small, medium, large]
    defaults:
      run:
        working-directory: bench
    steps:
      - uses: actions/checkout@v4

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: bench
          # Distinct key so the self-hosted wire cache never collides with
          # the hosted dry-run cache.
          shared-key: bench-wire-${{ runner.os }}

      - name: build harness (release)
        run: cargo build --release --locked

      - name: resolve wire interface
        run: |
          set -euo pipefail
          # The bench-runner module names the harness veth endpoint
          # `veth-bench`; allow an override via a runner-level env for rigs
          # wired differently.
          echo "BENCH_WIRE_IFACE=${BENCH_WIRE_IFACE:-veth-bench}" >> "$GITHUB_ENV"

      - name: forwarding sweep (4 inspection modes)
        run: |
          set -euo pipefail
          bin=target/release/sng-bench
          profile=profiles/skus/${{ matrix.profile }}.toml
          mkdir -p results/wire
          # The forwarding sweep characterises all four cumulative inspection
          # modes (raw-l3 / ngfw-verdict / full-stack / full-stack+TLS) per
          # traffic class and backend. This is the in-process datapath model;
          # the real AF_PACKET wire transmission happens in the next step. The
          # two are complementary: the model gives the per-mode breakdown, the
          # wire sweep gives the measured floor.
          echo "::group::forwarding (4 modes) / ${{ matrix.profile }}"
          "$bin" forwarding \
            --profile "$profile" \
            --out "results/wire/forwarding-${{ matrix.profile }}.json" \
            --git-sha "${GITHUB_SHA}"
          echo "::endgroup::"

      - name: real-wire throughput + latency (AF_PACKET)
        env:
          # Empty == real wire. The whole point of this job: frames leave on
          # ${BENCH_WIRE_IFACE} and traverse sng-edge in-path.
          BENCH_DRY_RUN: ""
        run: |
          set -euo pipefail
          bin=target/release/sng-bench
          profile=profiles/skus/${{ matrix.profile }}.toml
          mkdir -p results/wire
          # Sweep the full frame-size range on the wire at the deepest
          # inspection depth (the worst case an operator provisions for).
          for mode in throughput latency; do
            for ps in 64 512 1500 9000; do
              echo "::group::wire ${mode} ${ps}B / ${{ matrix.profile }}"
              "$bin" "$mode" \
                --profile "$profile" \
                --interface "${BENCH_WIRE_IFACE}" \
                --duration "${BENCH_WIRE_DURATION}" \
                --packet-size "$ps" \
                --policy-rules 100 \
                --inspection full-tls \
                --out-dir results/wire \
                --git-sha "${GITHUB_SHA}" \
                ${BENCH_DRY_RUN}
              echo "::endgroup::"
            done
          done

      - name: compare against wire baseline
        id: compare
        run: |
          set -uo pipefail
          bin=target/release/sng-bench
          baseline="results/wire/baseline-wire-${{ matrix.profile }}.json"
          echo "regressed=false" >> "$GITHUB_OUTPUT"
          if [ ! -f "$baseline" ]; then
            echo "no committed wire baseline at ${baseline}; skipping regression gate (first run seeds it)"
            exit 0
          fi
          latest=$(ls -t results/wire/${{ matrix.profile }}-throughput-*.json | head -n1)
          echo "comparing ${latest} against ${baseline}"
          set +e
          "$bin" compare \
            --baseline "$baseline" \
            --current "$latest" \
            --throughput-drop "${BENCH_THROUGHPUT_DROP}" \
            --latency-increase "${BENCH_LATENCY_INCREASE}"
          rc=$?
          set -e
          if [ "$rc" -eq 2 ]; then
            echo "regressed=true" >> "$GITHUB_OUTPUT"
          elif [ "$rc" -ne 0 ]; then
            echo "::error::sng-bench compare failed with exit code ${rc}"
            exit "$rc"
          fi

      - name: upload wire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-wire-${{ matrix.profile }}-${{ github.run_id }}
          path: bench/results/wire/*${{ matrix.profile }}*.json
          retention-days: 90

      - name: alert on wire regression
        if: steps.compare.outputs.regressed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const profile = '${{ matrix.profile }}';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = `Wire benchmark regression: ${profile} throughput dropped >${{ env.BENCH_THROUGHPUT_DROP }}`;
            const body = [
              `The weekly **real-wire** benchmark detected a throughput regression on the **${profile}** edge SKU `,
              `exceeding the ${{ env.BENCH_THROUGHPUT_DROP }} fractional threshold.`,
              ``,
              `- Run: ${runUrl}`,
              `- Commit: ${context.sha}`,
              ``,
              `Reports are attached as the \`bench-wire-${profile}-${context.runId}\` artifact. `,
              `Review, then update \`bench/results/wire/baseline-wire-${profile}.json\` if the new number is the intended baseline.`,
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['benchmark', 'regression', 'wire'],
            });

      - name: fail run on wire regression
        if: steps.compare.outputs.regressed == 'true'
        run: |
          echo "::error::wire throughput regression detected for ${{ matrix.profile }} (threshold ${BENCH_THROUGHPUT_DROP})"
          exit 1

  wire-datasheet:
    name: regenerate dual datasheet (dry-run + wire)
    needs: wire
    # Runs on the same in-path runner: the wire half of the datasheet must
    # be measured over AF_PACKET, so this cannot fall back to a hosted box.
    if: always() && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
    runs-on: [self-hosted, sng-bench-wire]
    timeout-minutes: 60
    permissions:
      contents: read
    defaults:
      run:
        working-directory: bench
    steps:
      - uses: actions/checkout@v4

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: bench
          shared-key: bench-wire-${{ runner.os }}

      - name: build harness (release)
        run: cargo build --release --locked

      - name: resolve wire interface
        run: |
          set -euo pipefail
          echo "BENCH_WIRE_IFACE=${BENCH_WIRE_IFACE:-veth-bench}" >> "$GITHUB_ENV"

      - name: sweep both passes and merge
        run: |
          set -euo pipefail
          bin=target/release/sng-bench
          mkdir -p results/datasheet
          # Dry-run pass (in-process ceiling) — runs anywhere.
          "$bin" business-report \
            --profiles-dir profiles/skus \
            --duration-ms 1000 \
            --packet-sizes 64,512,1500,9000 \
            --out-dir results/datasheet/dry \
            --git-sha "${GITHUB_SHA}" \
            --dry-run
          # Wire pass (real AF_PACKET over the in-path veth).
          "$bin" business-report \
            --profiles-dir profiles/skus \
            --interface "${BENCH_WIRE_IFACE}" \
            --duration-ms 1000 \
            --packet-sizes 64,512,1500,9000 \
            --out-dir results/datasheet/wire \
            --git-sha "${GITHUB_SHA}"
          dry=$(ls -t results/datasheet/dry/business-report-*.json | head -n1)
          wire=$(ls -t results/datasheet/wire/business-report-*.json | head -n1)
          "$bin" datasheet \
            --dry-run-json "$dry" \
            --wire-json "$wire" \
            --out-md ../blog/artifacts/edge-performance-datasheet.md \
            --out-json ../blog/artifacts/edge-performance-datasheet.json

      # This job runs on the privileged in-path self-hosted runner
      # (CAP_NET_RAW, sng-edge in-path), so it keeps contents:read and only
      # *uploads* the regenerated datasheet as a run artifact — it never pushes
      # to the repo itself. The separate hosted `publish-datasheet` job
      # (ubuntu-latest, contents:write) picks this artifact up and commits it,
      # keeping the write off the privileged runner.
      - name: upload datasheet
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: edge-performance-datasheet-${{ github.run_id }}
          path: |
            blog/artifacts/edge-performance-datasheet.md
            blog/artifacts/edge-performance-datasheet.json
          retention-days: 90

  publish:
    name: publish results to bench/results
    needs: benchmark
    # Only persist refreshed reports back to the repo on the scheduled
    # run; on-demand dispatches stay artifact-only so a manual experiment
    # never rewrites the committed history.
    if: github.event_name == 'schedule' && always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: download all reports
        uses: actions/download-artifact@v4
        with:
          pattern: bench-results-*
          path: incoming
          merge-multiple: true

      - name: stage and commit reports
        run: |
          set -euo pipefail
          mkdir -p bench/results
          # download-artifact flattens into incoming/; copy the per-run
          # reports into the tracked results directory.
          if ! ls incoming/*.json >/dev/null 2>&1; then
            echo "no reports to publish"
            exit 0
          fi
          cp incoming/*.json bench/results/
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bench/results
          # Stage first, then diff the index: the fresh reports are new,
          # uniquely-timestamped (untracked) files, which a working-tree
          # `git diff` cannot see — only `--cached` detects them.
          if git diff --cached --quiet -- bench/results; then
            echo "no changes to commit"
            exit 0
          fi
          git commit -m "bench: publish weekly results ($(date -u +%Y-%m-%d))"
          # Push to main, retrying the non-atomic fetch-rebase-push against the
          # sibling `publish-datasheet` job (or any other concurrent writer).
          # The two publish jobs touch disjoint paths (bench/results vs
          # blog/artifacts) so each rebase is a clean replay.
          bash .github/scripts/push-with-retry.sh

  publish-datasheet:
    name: publish dual datasheet to blog/artifacts
    needs: wire-datasheet
    # Mirror `publish`: only persist on the scheduled run so a manual
    # workflow_dispatch experiment never rewrites the committed datasheet.
    # `always()` so a single failed `wire` SKU leg does not skip the publish —
    # wire-datasheet runs its own sweep and uploads whatever it produced.
    # Kept as its own job (not folded into `publish`) so the weekly dry-run
    # `publish` is never blocked by the self-hosted wire runner's availability,
    # and the commit stays off the privileged in-path runner.
    if: github.event_name == 'schedule' && always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: download datasheet artifact
        # Tolerate a missing artifact (e.g. no wire runner was online, so
        # wire-datasheet produced nothing): the next step detects the absent
        # files and exits cleanly instead of failing the run.
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          pattern: edge-performance-datasheet-*
          path: incoming-datasheet
          merge-multiple: true

      - name: stage and commit datasheet
        run: |
          set -euo pipefail
          md="incoming-datasheet/edge-performance-datasheet.md"
          json="incoming-datasheet/edge-performance-datasheet.json"
          # The datasheet artifact only exists when wire-datasheet produced it.
          # If it is absent there is nothing to publish — exit cleanly.
          if [ ! -f "$md" ] || [ ! -f "$json" ]; then
            echo "no datasheet artifact to publish"
            exit 0
          fi
          mkdir -p blog/artifacts
          cp "$md" "$json" blog/artifacts/
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add blog/artifacts/edge-performance-datasheet.md \
            blog/artifacts/edge-performance-datasheet.json
          if git diff --cached --quiet -- blog/artifacts; then
            echo "datasheet unchanged; nothing to commit"
            exit 0
          fi
          git commit -m "bench: publish refreshed edge datasheet ($(date -u +%Y-%m-%d))"
          # See `publish`: rebase-then-push is not atomic, so reuse the shared
          # retry helper to survive a concurrent push to main (the sibling
          # `publish` job or any other writer).
          bash .github/scripts/push-with-retry.sh
