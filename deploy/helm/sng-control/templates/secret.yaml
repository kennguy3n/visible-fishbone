{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "sng-control.secretName" . }}
  labels:
    {{- include "sng-control.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- /* Only emit keys with a non-empty value so an unset secret is
         omitted entirely rather than injected as "" (which would, for
         example, make PG_PASSWORD an explicit empty password). */}}
  {{- range $key, $val := .Values.secrets.values }}
  {{- if $val }}
  {{ $key }}: {{ $val | quote }}
  {{- end }}
  {{- end }}
{{- end }}
