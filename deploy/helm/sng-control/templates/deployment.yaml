apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sng-control.fullname" . }}
  labels:
    {{- include "sng-control.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "sng-control.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        # Roll pods when the rendered config/secret changes.
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "sng-control.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "sng-control.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      {{- with .Values.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      containers:
        - name: sng-control
          image: {{ include "sng-control.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.config.HTTP_PORT | int }}
              protocol: TCP
            - name: metrics
              containerPort: {{ .Values.config.METRICS_PORT | int }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "sng-control.configMapName" . }}
          env:
            {{- /* Pull each secret key from the Secret, optional so an
                   unset secret does not block pod start. */}}
            {{- range $key, $_ := .Values.secrets.values }}
            - name: {{ $key }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "sng-control.secretName" $ }}
                  key: {{ $key }}
                  optional: true
            {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
        {{- if .Values.pgbouncer.enabled }}
        - name: pgbouncer
          image: "{{ .Values.pgbouncer.image.repository }}:{{ .Values.pgbouncer.image.tag }}"
          imagePullPolicy: {{ .Values.pgbouncer.image.pullPolicy }}
          ports:
            - name: pgbouncer
              containerPort: {{ .Values.pgbouncer.port | int }}
              protocol: TCP
          env:
            - name: POSTGRESQL_HOST
              value: {{ .Values.config.PG_HOST | quote }}
            - name: POSTGRESQL_PORT
              value: {{ .Values.config.PG_PORT | quote }}
            - name: POSTGRESQL_USERNAME
              value: {{ .Values.config.PG_USER | quote }}
            - name: POSTGRESQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "sng-control.secretName" . }}
                  key: PG_PASSWORD
                  optional: true
            - name: POSTGRESQL_DATABASE
              value: {{ .Values.config.PG_DATABASE | quote }}
            - name: PGBOUNCER_PORT
              value: {{ .Values.pgbouncer.port | quote }}
            - name: PGBOUNCER_POOL_MODE
              value: {{ .Values.pgbouncer.poolMode | quote }}
            - name: PGBOUNCER_MAX_CLIENT_CONN
              value: {{ .Values.pgbouncer.maxClientConn | quote }}
            - name: PGBOUNCER_DEFAULT_POOL_SIZE
              value: {{ .Values.pgbouncer.defaultPoolSize | quote }}
          resources:
            {{- toYaml .Values.pgbouncer.resources | nindent 12 }}
          volumeMounts:
            - name: pgbouncer-tmp
              mountPath: /opt/bitnami/pgbouncer/tmp
        {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
        {{- if .Values.pgbouncer.enabled }}
        - name: pgbouncer-tmp
          emptyDir: {}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
