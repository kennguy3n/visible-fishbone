{{- if and .Values.service.enabled .Values.args.healthBind }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "sng-edge.fullname" . }}
  labels:
    {{- include "sng-edge.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "sng-edge.selectorLabels" . | nindent 4 }}
  ports:
    - name: health
      port: {{ .Values.service.port }}
      targetPort: health
      protocol: TCP
{{- end }}
