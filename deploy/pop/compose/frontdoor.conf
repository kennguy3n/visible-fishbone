# ShieldNet Gateway — local multi-PoP simulation: front-door.
#
# Models the GeoDNS / anycast front-door's *failover* behaviour with a
# plain OSS-nginx reverse proxy. Real production steering happens in DNS
# (Route53 latency records emitted by internal/service/pop GeoDNSPublisher)
# or at L3 (anycast/BGP) — see docs/pop-topology.md. This proxy is only a
# single-host stand-in so the failover semantics are observable locally
# without DNS or a BGP fabric.
#
# OSS nginx has *passive* health checks only (active checks are NGINX
# Plus). max_fails/fail_timeout eject an unhealthy PoP after observed
# failures; `backup` makes pop-dach the failover target; proxy_next_upstream
# retries the next server within a single request so an in-flight request
# survives a primary failure.

upstream sng_pops {
    server pop-sea-edge:8080  max_fails=3 fail_timeout=10s;   # primary  (SEA)
    server pop-dach-edge:8080 backup;                          # failover (DACH)
}

server {
    listen 8080 default_server;
    server_name _;

    # Front-door's own health, for an upstream LB / k8s probe.
    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "frontdoor ok\n";
    }

    location / {
        proxy_pass http://sng_pops;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Fail a request over to the next (backup) PoP on connection
        # errors, timeouts, or 5xx from the primary.
        proxy_next_upstream     error timeout http_502 http_503 http_504;
        proxy_connect_timeout   2s;
        proxy_read_timeout      5s;
    }
}
