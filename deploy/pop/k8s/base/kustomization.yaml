apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Common edge workload shared by every PoP. Region-specific values live
# in overlays/pop-*/ (region-group label, replicas, anycast annotation,
# and the per-PoP edge.toml identity).
resources:
  - edge-deployment.yaml
  - edge-service.yaml
  - edge-configmap.yaml

labels:
  - pairs:
      app.kubernetes.io/part-of: shieldnet-gateway
    includeSelectors: false
