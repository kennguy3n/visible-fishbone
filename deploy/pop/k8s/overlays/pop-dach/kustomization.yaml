apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# DACH region-group PoP (eu-central-1; see deploy/terraform/regions and
# internal/region). Second PoP in the >=2-region reference topology.
namespace: sng-pop-dach

resources:
  - ../../base
  - namespace.yaml

labels:
  - pairs:
      sng/region-group: DACH
    includeSelectors: false

patches:
  - path: patch-deployment.yaml
  - path: patch-service.yaml

configMapGenerator:
  - name: sng-edge-config
    behavior: replace
    files:
      - edge.toml
generatorOptions:
  disableNameSuffixHash: true
