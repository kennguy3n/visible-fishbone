apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# SEA region-group PoP (ap-southeast-1; see deploy/terraform/regions and
# internal/region). One overlay per PoP; add more by copying this dir and
# changing the namespace, region-group label, anycast VIP, and edge.toml.
namespace: sng-pop-sea

resources:
  - ../../base
  - namespace.yaml

labels:
  - pairs:
      sng/region-group: SEA
    includeSelectors: false

patches:
  - path: patch-deployment.yaml
  - path: patch-service.yaml

# Per-PoP edge identity. disableNameSuffixHash keeps the fixed name the
# Deployment mounts; behavior=replace overrides the base placeholder.
configMapGenerator:
  - name: sng-edge-config
    behavior: replace
    files:
      - edge.toml
generatorOptions:
  disableNameSuffixHash: true
