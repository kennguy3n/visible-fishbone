# Per-tenant NATS user — defense-in-depth subject ACL.
#
# Render once per tenant, substituting:
#   {{TENANT_ID}}        lowercase tenant UUID (the token used in subjects)
#   {{TENANT_PASSWORD}}  a strong per-tenant secret (prefer nkey in prod)
#
# Splice the rendered block into the `users: [ ... ]` list of
# authorization.conf. See README.md.
#
# This credential is for a tenant's edge/endpoint fleet. It can ONLY
# publish its own telemetry and subscribe to its own policy bundles.
# Every allow-rule pins {{TENANT_ID}} so the credential cannot reach
# another tenant's subjects, the cross-tenant DLQ, or JetStream admin.
{
  user: "tenant-{{TENANT_ID}}"
  password: "{{TENANT_PASSWORD}}"
  permissions {
    publish {
      allow: [
        # Single-partition telemetry: sng.<tenant>.telemetry.<class>
        "sng.{{TENANT_ID}}.telemetry.>"
        # Fan-out / partitioned telemetry moves the tenant to the 2nd
        # token: sng.<partition>.<tenant>.telemetry.<class>. The `*`
        # matches exactly one partition token, NOT a cross-tenant wildcard.
        "sng.*.{{TENANT_ID}}.telemetry.>"
      ]
      # Belt-and-suspenders: never allow publishing to the DLQ or the
      # JetStream API, even if a future allow-rule is too broad.
      deny: [
        "sngdlq.>"
        "$JS.API.>"
      ]
    }
    subscribe {
      allow: [
        # The fleet consumes its own compiled policy bundles + events.
        "sng.{{TENANT_ID}}.policy.>"
        "sng.{{TENANT_ID}}.events.>"
        # Allow delivery on an ephemeral inbox for request/reply.
        "_INBOX.>"
      ]
      deny: [
        # No subscribing to any other tenant or the DLQ.
        "sngdlq.>"
        "$JS.API.>"
      ]
    }
  }
}
