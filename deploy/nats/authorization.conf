# NATS centralized authorization for the ShieldNet Gateway control
# plane (defense-in-depth tenant isolation at the transport layer).
#
# Include this from the main NATS server config:
#
#   include "authorization.conf"
#
# Two principal types:
#   1. The control plane (sng-control) — the only trusted multi-tenant
#      principal. Publishes policy/events for any tenant, consumes all
#      telemetry, owns the DLQ and JetStream management subjects.
#   2. Per-tenant edge/endpoint users — each fenced to a single
#      tenant's subjects. Rendered from tenant-user.template.conf; one
#      example tenant is shown below.
#
# In production prefer nkeys or decentralized account/operator JWTs;
# the subject allow/deny rules below are identical regardless of
# credential type. See README.md.
authorization {
  users: [
    # --- Control plane: trusted, multi-tenant -----------------------
    {
      user: "sng-control"
      password: "{{CONTROL_PLANE_PASSWORD}}"
      permissions {
        publish {
          # Policy + lifecycle events for ANY tenant, and the DLQ.
          allow: [
            "sng.*.policy.>"
            "sng.*.events.>"
            "sngdlq.>"
            "$JS.API.>"
          ]
        }
        subscribe {
          # Consume all telemetry (single + partitioned), DLQ replay,
          # and JetStream API responses.
          allow: [
            "sng.*.telemetry.>"
            "sng.*.*.telemetry.>"
            "sng.*.events.>"
            "sng.*.policy.>"
            "sngdlq.>"
            "$JS.API.>"
            "_INBOX.>"
          ]
        }
      }
    }

    # --- Example tenant (rendered from tenant-user.template.conf) ----
    # Replace this block with one rendered block per active tenant.
    {
      user: "tenant-11111111-1111-1111-1111-111111111111"
      password: "{{TENANT_PASSWORD}}"
      permissions {
        publish {
          allow: [
            "sng.11111111-1111-1111-1111-111111111111.telemetry.>"
            "sng.*.11111111-1111-1111-1111-111111111111.telemetry.>"
          ]
          deny: [
            "sngdlq.>"
            "$JS.API.>"
          ]
        }
        subscribe {
          allow: [
            "sng.11111111-1111-1111-1111-111111111111.policy.>"
            "sng.11111111-1111-1111-1111-111111111111.events.>"
            "_INBOX.>"
          ]
          deny: [
            "sngdlq.>"
            "$JS.API.>"
          ]
        }
      }
    }
  ]
}
