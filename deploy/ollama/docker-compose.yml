services:
  # Self-hosted, OpenAI-compatible LLM for the ShieldNet AI assistant.
  # Serves Ternary-Bonsai-8B via Ollama. sng-control and access-ai-agent
  # both point at http://ollama:11434/v1/chat/completions.
  ollama:
    image: ollama/ollama:0.6.8
    container_name: sng-ollama
    # Bind to loopback so the model server is not exposed on the LAN.
    # In production this runs on an internal network; expose it only to
    # the control plane.
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - sng-ollama-models:/root/.ollama
    healthcheck:
      # Ollama serves an OpenAI-compatible API; /api/tags is a cheap
      # readiness probe that returns the locally available models.
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  # One-shot init container that pulls Ternary-Bonsai-8B into the shared
  # model volume on first boot, then exits. Idempotent: `ollama pull` is
  # a no-op when the model is already present.
  ollama-pull:
    image: ollama/ollama:0.6.8
    container_name: sng-ollama-pull
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
      # Override to pin a different quantization/tag if desired.
      SNG_LLM_MODEL: "${SNG_LLM_MODEL:-prism-ml/Ternary-Bonsai-8B-gguf}"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - 'ollama pull "$$SNG_LLM_MODEL"'
    restart: "no"

  # Pinned 2-bit (Q2_0) Ternary-Bonsai-8B served by llama.cpp's
  # llama-server. This is the supported path for the Q2_0 (ternary)
  # format, which mainline Ollama cannot load yet. The image builds the
  # prism fork and bakes the checksum-verified GGUF (see
  # Dockerfile.llamacpp) for an air-gapped, reproducible deployment.
  #
  # Opt-in (does not run with a bare `up`, so the default Ollama path is
  # unaffected):
  #   docker compose -f deploy/ollama/docker-compose.yml --profile q2 up -d bonsai-q2
  #
  # Then point the control plane at it (these are the bundled defaults):
  #   AI_LLM_ENDPOINT=http://localhost:8081/v1/chat/completions
  #   AI_LLM_MODEL=Ternary-Bonsai-8B   # == --alias and ai.DefaultModel
  bonsai-q2:
    profiles: ["q2"]
    build:
      # Context is the repo root so the verify script (scripts/) is in scope.
      context: ../..
      dockerfile: deploy/ollama/Dockerfile.llamacpp
      args:
        SNG_LLM_VARIANT: "${SNG_LLM_VARIANT:-Q2_0}"
    image: sng-bonsai-q2:local
    container_name: sng-bonsai-q2
    # Single source of truth for the port: the container binds it (the
    # entrypoint reads SNG_LLM_PORT), the publish maps it, and the
    # healthcheck probes it — override SNG_LLM_PORT once to move all three.
    environment:
      SNG_LLM_PORT: "${SNG_LLM_PORT:-8081}"
      # Context window the server allocates KV cache for; see mem_limit below.
      SNG_LLM_CTX: "${SNG_LLM_CTX:-4096}"
    ports:
      - "127.0.0.1:${SNG_LLM_PORT:-8081}:${SNG_LLM_PORT:-8081}"
    # Q2 8B is ~3 GB resident at the default -c 4096, so 4 GiB caps a runaway
    # without starving co-located services. The KV cache grows with context,
    # so if you raise SNG_LLM_CTX (or enable parallel slots) bump this in
    # lockstep, e.g. SNG_LLM_CTX=8192 SNG_LLM_MEM_LIMIT=6g docker compose ...
    mem_limit: "${SNG_LLM_MEM_LIMIT:-4g}"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS \"http://127.0.0.1:${SNG_LLM_PORT:-8081}/health\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s
    restart: unless-stopped

volumes:
  sng-ollama-models:
